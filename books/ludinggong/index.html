<style>

*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:"PingFang SC","Hiragino Sans GB","Songti SC","STSong",serif;font-size:16px;line-height:1.9}
.header{background:linear-gradient(135deg,#2c1810,#4a3020,#6b3a20);color:#e8d5b7;padding:40px 32px;text-align:center;border-bottom:3px solid var(--gold)}
.header h1{font-size:28px;letter-spacing:6px;font-weight:500;margin-bottom:8px}
.header .tagline{font-size:13px;opacity:0.65;letter-spacing:2px}
.header .meta{margin-top:16px;display:flex;gap:24px;justify-content:center;font-size:11px;opacity:0.5}

.layout{display:flex;max-width:1200px;margin:0 auto;min-height:100vh}
.sidebar{width:200px;background:#fff;border-right:1px solid var(--border);padding:24px 0;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0}

.sidebar .chap:hover{background:var(--tag-bg);color:var(--accent)}

.page-section{margin-bottom:48px}
.page-header{display:flex;align-items:baseline;gap:12px;margin-bottom:20px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.page-header .num{font-size:13px;color:var(--text2);opacity:0.5;min-width:36px}
.page-header .chap-name{font-size:11px;color:var(--accent);opacity:0.6;letter-spacing:1px}
.ocr-text{font-size:16px;line-height:2;color:var(--text)}
.ocr-text .post{margin-bottom:24px;padding:20px 24px;background:var(--card);border-radius:8px;border:1px solid var(--border)}

.ocr-text .post .reply .who{color:var(--accent);font-weight:600}
.img-page{text-align:center;margin-bottom:32px}
.img-page img{max-width:100%;border:1px solid var(--border);border-radius:4px;background:#fff}
.img-page .cap{font-size:11px;color:var(--text2);opacity:0.5;margin-top:6px}
.nav-bar{position:fixed;bottom:0;left:200px;right:0;background:#fff;border-top:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:12px;z-index:100}
.nav-bar .btn{padding:7px 18px;border:1px solid var(--border);border-radius:20px;background:#fff;color:var(--text2);font-size:12px;cursor:pointer;transition:all 0.15s}
.nav-bar .btn:hover{background:var(--tag-bg);border-color:var(--accent);color:var(--accent)}
.nav-bar input{width:50px;text-align:center;border:1px solid var(--border);border-radius:4px;padding:6px;font-size:12px}
.nav-bar input:focus{outline:none;border-color:var(--accent)}
.nav-bar .indicator{font-size:11px;color:var(--text2);opacity:0.5;min-width:80px;text-align:center}
@media(max-width:900px){.sidebar{display:none}.content{padding:20px}.nav-bar{left:0}}
</style>

<body>

<script>
const TOTAL=414,IMG_BASE='pages/';
let currentPage=1;
const chapters=[{name:"关于本书",start:1,end:3},{name:"目录",start:4,end:9},{name:"一、投资的理念",start:10,end:63},{name:"二、技术分析及交易",start:64,end:84},{name:"三、大盘和个股",start:85,end:90},{name:"四、关于风险",start:91,end:103},{name:"五、产业与周期",start:104,end:186},{name:"六、煤炭和电力能源",start:187,end:240},{name:"七、人口与趋势",start:241,end:333},{name:"八、局势及竞争",start:334,end:351},{name:"九、闲言碎语",start:352,end:414}];
const ocrData={"1": "超级鹿鼎公\n资料集", "2": "关于本册资料\n超级鹿鼎公是一位长期保持无年度亏损的投资者。他的投资理念是：价值选股，趋势选时，估值定仓，波动降本。\n鹿鼎公注重价值投资，也对技术分析着迷。他既像一位朴素的格雷厄姆式价值投资者，又是一位擅长运用乌龟流策略（如搬砖、做T等）的交易员。\n鹿鼎公的文章具有宏观视角，具有时代性和穿透力。他擅长从国家历史经纬里，从他国的社会经济发展进程中，锚定及分析当前我国各行业所在的微妙处境。", "4": "目录\n一、投资的理念：价值之锚、现金与穿越牛熊、独孤九剑与易筋经、波动的数学题、深爱老熊、管财主对撞宁静、认清自己很难、形成自己的盈利模式、别人眼里的最坏无非这两种情况、现金流才是价值之锚、龟速赚钱只要赚钱就行、没有利润下跌空间的低估、关于长期年化12%收益是不是好的问题、总结下我现在的投资理念、IBM与新泽西石油、11%年化确定性收益的投资有多珍贵、股市能不能财富自由、合理估值", "5": "二、技术分析及交易：关于搬砖党、看的远但是不能做的远、技术玩法的弱点、4大流派的前世今生、关于做T的态度、完美的底部、成功的技术高手素描、网格交易、看K线少用复权\n三、大盘和个股：1.看大盘：都是老滑头的A股、从纯技术分析角度看大盘、从统计学派的角度看大盘；2.说个股：从营销角度看美的格力的王者之争、从陕煤回购说起、好股票、垄断才是长期高额利润的基础、永续组合、中煤能源2022年报、AH股30年长期投资组合、茅台数学题\n四、关于风险：高风险与低风险是相对的、常识与逻辑之一风险敞口、未雨绸缪很重要、紧急与重要\n五、产业与周期：1.地产行业 2.银行金融 3.互联网 4.钢铁业 5.其他产业 6.周期", "6": "六、煤炭和电力能源：1.煤炭行业：谈谈煤炭的淡季不淡旺季不旺、从历史气候开始的乱谈、国际煤炭大局势、煤炭企业的优势分类、煤电博弈是虚幻、未来煤炭的出路、关于中国神华长协价、为什么更看好焦煤、煤价变化与持股企业盈利的变化、煤炭板块低估值原因分析、业内专家对于煤炭供应衰退的看法、电煤的消耗会有几个变数；2.电力能源：未来的用电量顶峰区域、等不来的均值回归、没有燃气机组调峰的中国电力还得靠煤电、这12年以来的煤电恩怨；3.神华与淮北：月线看神华、淮北矿业之优劣", "7": "七、人口与趋势：食品消费股与人口结构、从日本人口变化与经济谈起、关于养老送终、人口老龄化后的经济（台湾）、60年后的7亿人口与200年后的7亿人口的差异、中日韩三国人口下降其实才刚刚开始、2023年后出生的中国孩子有多幸运\n八、局势及竞争：1.局势：通缩期的库存挤出效应、债务谭、美国的通胀是个无解的局、不能收割就很痛；2.竞争：日本的低欲望社会、越南注定是韭菜的命、关于印度、摸着鬼子走、日本股市和消费的经验\n九、闲言碎语：股市的好处与坏处、抄作业4个关键、推翻常识、想象的彼岸、怎么样看出别人的水平高低", "12": "2014-05-06 来自雪球\n海螺水泥和中国神华将是夕阳行业中的强企，俗称沙漠之花。万科还不能真正看出是不是沙漠之花。\n网友：万科管理还是远强于海螺，问题是万科无法垄断。海螺天生就在垄断行业，有级差地租。\n鹿鼎公：是的，所有高毛利全部来自垄断，不管是行政垄断，还是品牌垄断，或者资源垄断，又或是技术垄断。海螺的垄断来自资源、资金、布局的优势；神华来自资源、铁路、码头和上下游一体以及资金。", "14": "2014-05-28 来自雪球\n个人特别在意分红，原因其实很简单：在股价大幅度低于1PB的背景下，分红就是给你0.9-0.95PB套现的机会。股价没填权，就是给你极低PB买入的机会。这是我拿建设、工行、北京银行的逻辑。当然选择这三家，还有个主要原因是，都是风控最好的企业。", "15": "2014-06-05 来自雪球\n我的投资逻辑在最近1年又有一些变化。以前主要思路是低估值+安全+稳定成长，现在的思路+行业垄断。3家银行都是低估值，银行会倒闭，但是不会全部倒闭，所以选择最安全的3家。\n\n2014-11-06 来自雪球\n不符合低PE、低PB、行业垄断、高ROE、长远有确定性增长、上市满5年这个标准的，我一律不买，包括新股。\n\n2014-07-05 来自雪球\n能够长期保持超越95%普通投资者的有水平的人，基本上没人愿意帮人理财、帮人炒股票。自己的钱滚滚雪球收益足以养活自己。", "16": "2014-12-26 来自雪球\n只有以产业投资的眼光买股票，靠穿越经济周期的业绩增长，稳定提高的分红；以够低的合理价格买入，耐心持有，直到不再低估或发现了更好的才卖出。对商业模式定性是必要条件，对发展前景定量是充分条件，确定性则是王者之道，复利是最伟大的奇迹。\n\n2015-01-02 来自雪球\n俺在股市的风格完全是乌龟流，安全永远是俺的第一考量。不想跑赢别人多少，只想跑赢自己内心的贪婪。", "17": "2015-02-27 来自雪球\n投资标的如同来来往往飞奔的兔子，只有撞到大树的那只才属于你的。因此，投资就是守株待兔。不成熟的投资者往往会举着一棵小树疲于奔命追兔子，效果适得其反。成熟的，往往在交通要道上找根大树，静静守着。\n\n2015-03-31 来自雪球\n孙子曰：欲胜敌，先为不可胜。股票语言翻译：想赚钱，先做到不亏钱。所以俺的逻辑是赚钱事小，亏钱事大。", "18": "2015-05-06 来自雪球\n大额度融资上杠杆的线在哪里？1、股票业绩没有大幅度下降风险；2、分红覆盖融资利率。俺个人理解，这种情况下俺认为可以大比例融资。要知道大多数股神都是死在融资上的。\n\n2015-05-13 来自雪球\n交易的极致，无非是两种，一种是追最猛的强势，赚最快的钱；另外一种是买最深的底，赚最安全的钱。俺自认是后者。\n\n涨时看势，跌时看质。", "19": "2015-05-20 来自雪球\n一个优秀的交易高手的定义应该是：能够连续多年获得稳定持续的连续复利回报，经年累月地赚钱而不是一朝暴富，常赚而不是大赚。资本市场的高额利润应来源于长期累积低风险下的持续利润的结果。\n\n2015-05-30 来自雪球\n有人说：懂巴老的理念不太难，坚持巴老的投资理念难于上青天。段永平回答：坚持不了的人就是不懂！这里懂的意思是骨子里相信。其实价值投资是所谓投资的唯一一条路。", "20": "2015-07-10 来自雪球 · 深读：价值之锚\n所有想在股市有所收获的投资者，首先要解决的一个问题就是：形成自己的操作体系。这个操作体系必须是你自己喜欢的风格，必须是能够长期盈利，并且有风控的保证回撤有限度的。\n\n股市主要盈利方法有三种方式：1、追逐最强的风；2、抱紧最低估值的好票；3、抓住确定性的技术走法的波动。", "21": "2015-07-11 来自雪球\n盈利，虽然都体现为账户数字的增加，但有逻辑的盈利和没逻辑的盈利，短期看长相类似，长期看是生死之别。\n\n银行的底线在哪里？未来业绩没有大幅度下降预期的8-9%现金分红价，就是股价的底锚。不信你去看看历史，几乎所有的好股票，即使在最烂的大熊市，都在这个区域之前构筑成底部。", "22": "2015-08-29 来自雪球\n价值投资也好，趋势投资也好，做短差也好，其实本质上没区别，目的是一个：赚钱。关键在于你是否找到了适合自己的方法。吾之蜜糖，汝之毒药。", "23": "2015-09-18 来自雪球\n价值选股，趋势选时，估值定仓，波动降本——大部分高手都是把这四条中的全部或者部分做到极致。俺是四条都做，但每条都做不到极致，所以收益也就中上水平。"};

function pad(n){return String(n).padStart(3,'0')}
function init(){buildSidebar();goTo(1);document.addEventListener('keydown',function(e){if(e.target.tagName==='INPUT')return;if(e.key==='ArrowRight'||e.key===' ')navPage('next'),e.preventDefault();if(e.key==='ArrowLeft')navPage('prev'),e.preventDefault();if(e.key==='Home')goTo(1);if(e.key==='End')goTo(TOTAL)})}
function buildSidebar(){var sb=document.getElementById('sidebar');sb.innerHTML='<h3>📖 目录导航</h3>';chapters.forEach(function(ch,i){var a=document.createElement('a');a.className='chap';a.setAttribute('data-chap',i);a.innerHTML=ch.name+'<span class="pg">p.'+ch.start+'-'+ch.end+'</span>';a.onclick=function(e){e.preventDefault();goTo(ch.start)};sb.appendChild(a)})}
function updateSidebar(){document.querySelectorAll('.chap').forEach(function(el,i){var ch=chapters[i];el.classList.toggle('active',currentPage>=ch.start&&currentPage<=ch.end)})}
function goTo(n){if(n<1)n=1;if(n>TOTAL)n=TOTAL;currentPage=n;var c=document.getElementById('content');var t=ocrData[String(n)];document.getElementById('pgInput').value=n;document.getElementById('pgIndicator').textContent='p.'+n;if(t){c.innerHTML=renderText(n,t)}else{c.innerHTML=renderImg(n)}updateSidebar();window.scrollTo({top:0,behavior:'smooth'});if(!ocrData[String(n)])preload(n);if(!ocrData[String(n+1)])preload(n+1)}
function renderText(n,text){var chap=chapters.find(function(c){return n>=c.start&&n<=c.end});var cn=chap?chap.name:'';var lines=text.split('\n').filter(function(l){return l.trim()});if(n>=4&&n<=8){var h='<div class="page-section"><div class="page-header"><span class="num">p.'+n+'</span><span class="chap-name">'+cn+'</span></div><div class="ocr-text" style="font-size:14px;line-height:2.2">';for(var i=0;i<lines.length;i++){var ln=lines[i].replace(/[一—]+$/,'').trim();if(!ln)continue;if(ln.match(/^[一二三四五六七八九十]、/)||ln.match(/^\d+[.．]/))h+='<p style="font-weight:600;color:var(--accent);margin-top:16px;text-indent:0">'+ln+'</p>';else if(ln.match(/^\d+[.．]/)||ln.indexOf('·')===0)h+='<p style="margin:2px 0 2px 20px;text-indent:0;font-size:13px;color:var(--text2)">'+ln+'</p>';else h+='<p>'+ln+'</p>'}h+='</div></div>';return h}var h='<div class="page-section"><div class="page-header"><span class="num">p.'+n+'</span><span class="chap-name">'+cn+'</span></div><div class="ocr-text">';var posts=text.split(/(?=20\d{2}[-—]\d{2}[-—]\d{2})/);for(var i=0;i<posts.length;i++){var p=posts[i];if(!p.trim())continue;var pl=p.trim().split('\n');var fl=pl[0]||'';var dm=fl.match(/(20\d{2}[-—]\d{2}[-—]\d{2}.*)/);h+='<div class="post">';if(dm){h+='<div class="date">📅 '+dm[1].replace(/[—]/g,'-')+'</div>';pl.shift()}for(var j=0;j<pl.length;j++){var cl=pl[j].trim();if(!cl)continue;if(cl.indexOf('网友')===0||cl.indexOf('鹿鼎公')===0){var who=cl.indexOf('网友')===0?'网友':'鹿鼎公';var txt=cl.replace(/^(网友|鹿鼎公)[：:]\s*/,'');h+='<div class="reply"><span class="who">'+who+'：</span>'+txt+'</div>'}else{h+='<p>'+cl+'</p>'}}h+='</div>'}h+='</div></div>';return h}
function renderImg(n){var chap=chapters.find(function(c){return n>=c.start&&n<=c.end});var cn=chap?chap.name:'';return '<div class="page-section"><div class="page-header"><span class="num">p.'+n+'</span><span class="chap-name">'+cn+'</span></div><div class="img-page"><img src="'+IMG_BASE+'p_'+pad(n)+'.webp" alt="p.'+n+'" onerror="this.parentElement.innerHTML=\'<p style=color:#b5a590;text-align:center;padding:40px>图片加载中…</p>\'"><div class="cap">第 '+n+' 页（文字提取进行中，暂显示扫描图）</div></div></div>'}
function preload(n){if(n<1||n>TOTAL)return;var l=document.createElement('link');l.rel='preload';l.as='image';l.href=IMG_BASE+'p_'+pad(n)+'.webp';document.head.appendChild(l)}
function navPage(d){if(d==='prev')goTo(currentPage-1);else goTo(currentPage+1)}
function scrollToToc(){goTo(4)}
window.addEventListener('DOMContentLoaded',init);
</script>
</body>
