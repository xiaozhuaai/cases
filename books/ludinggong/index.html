<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>超级鹿鼎公 · 投资体系</title>
<style>
:root{--bg:#f8f5f0;--card:#fff;--border:#e5dccf;--text:#2c2416;--text2:#6b5e4a;--accent:#8b4513;--gold:#c4a64a}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:"PingFang SC","Hiragino Sans GB","Songti SC","STSong",serif;font-size:15px;line-height:1.8}
.top-bar{background:linear-gradient(135deg,#2c1810,#4a3020);color:#e8d5b7;padding:14px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.top-bar h1{font-size:16px;letter-spacing:3px;font-weight:500}
.top-bar .nav-tags{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto}
.top-bar .nav-tag{padding:3px 12px;border-radius:12px;font-size:10px;cursor:pointer;border:1px solid rgba(200,170,100,0.3);color:#c4b89a;transition:all 0.2s}
.top-bar .nav-tag:hover,.top-bar .nav-tag.active{background:var(--gold);color:#2c1810;border-color:var(--gold)}
.hero{max-width:1000px;margin:0 auto;padding:32px 24px 24px;display:grid;grid-template-columns:1fr 2fr;gap:20px}
.author-card{background:var(--card);border-radius:12px;padding:24px;border:1px solid var(--border);text-align:center}
.author-card .avatar{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#6b3a20);color:#e8d5b7;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 12px}
.author-card h2{font-size:18px;letter-spacing:2px;margin-bottom:4px}
.author-card .sub{font-size:11px;color:var(--text2);margin-bottom:12px}
.author-card .stat-row{display:flex;justify-content:center;gap:20px;margin-top:12px}
.author-card .stat{text-align:center}
.author-card .stat .val{font-size:20px;color:var(--accent);font-weight:700}
.author-card .stat .lbl{font-size:10px;color:var(--text2)}
.philosophy-card{background:var(--card);border-radius:12px;padding:24px;border:1px solid var(--border);display:flex;flex-direction:column;justify-content:center}
.philosophy-card .quote{font-size:18px;color:var(--accent);letter-spacing:1px;margin-bottom:6px}
.philosophy-card .quote::before{content:'\201C';font-size:32px;color:var(--gold);margin-right:4px}
.philosophy-card .quote::after{content:'\201D';font-size:32px;color:var(--gold);margin-left:4px}
.philosophy-card .attribution{font-size:11px;color:var(--text2);text-align:right}
.philosophy-card .principles{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.philosophy-card .principle{padding:4px 12px;background:rgba(196,166,74,0.1);border-radius:12px;font-size:11px;color:var(--accent);border:1px solid rgba(196,166,74,0.2)}
.main{max-width:1000px;margin:0 auto;padding:0 24px 80px}
.section-title{font-size:13px;color:var(--text2);letter-spacing:2px;margin:32px 0 16px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.chapter-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:24px}
.chapter-card{background:var(--card);border-radius:10px;padding:20px;border:1px solid var(--border);cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.chapter-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.06);border-color:var(--gold)}
.chapter-card .ch-num{font-size:32px;font-weight:700;color:rgba(139,69,19,0.08);position:absolute;right:16px;top:8px}
.chapter-card h3{font-size:15px;color:var(--accent);margin-bottom:6px}
.chapter-card .ch-range{font-size:10px;color:var(--text2);opacity:0.5;margin-bottom:8px}
.chapter-card .ch-preview{font-size:12px;color:var(--text2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.chapter-card .ch-topics{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
.chapter-card .ch-topic{font-size:9px;padding:2px 8px;background:var(--bg);border-radius:8px;color:var(--text2)}
.chapter-detail{display:none;background:var(--card);border-radius:10px;padding:28px;border:1px solid var(--border);margin-bottom:20px}
.chapter-detail.open{display:block}
.chapter-detail h3{font-size:17px;color:var(--accent);margin-bottom:16px}
.chapter-detail .close-btn{float:right;background:none;border:none;font-size:18px;cursor:pointer;color:var(--text2);padding:4px 8px}
.chapter-detail .post{margin-bottom:18px;padding-bottom:18px;border-bottom:1px dashed var(--border)}
.chapter-detail .post:last-child{border-bottom:none}
.chapter-detail .post .date{font-size:10px;color:var(--gold);margin-bottom:6px}
.chapter-detail .post p{text-indent:2em;margin-bottom:6px;font-size:14px}
.chapter-detail .post .reply{font-size:13px;color:var(--text2);margin:4px 0 4px 16px;text-indent:0;padding-left:10px;border-left:2px solid var(--border)}
.chapter-detail .post .reply .who{color:var(--accent);font-weight:600}
.timeline{position:relative;padding-left:24px}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--border)}
.timeline-item{margin-bottom:16px;position:relative}
.timeline-item::before{content:'';position:absolute;left:-20px;top:8px;width:8px;height:8px;border-radius:50%;background:var(--gold)}
.timeline-item .tl-date{font-size:10px;color:var(--gold);margin-bottom:2px}
.timeline-item .tl-text{font-size:13px;color:var(--text);line-height:1.7}
.timeline-item .tl-text .highlight{color:var(--accent);font-weight:600}
.tag-cloud{display:flex;flex-wrap:wrap;gap:6px;margin:16px 0}
.tag-cloud .tag{padding:5px 14px;border:1px solid var(--border);border-radius:16px;font-size:11px;color:var(--text2);cursor:pointer;transition:all 0.15s}
.tag-cloud .tag:hover,.tag-cloud .tag.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.hidden{display:none}
.filtered-out{display:none!important}
@media(max-width:768px){.hero{grid-template-columns:1fr}.chapter-grid{grid-template-columns:1fr}.top-bar .nav-tags{display:none}}
</style>
</head>
<body>

<div class="top-bar">
  <h1>🦌 超级鹿鼎公 · 投资体系</h1>
  <div class="nav-tags" id="topTags"></div>
</div>

<div class="hero">
  <div class="author-card">
    <div class="avatar">鹿</div>
    <h2>超级鹿鼎公</h2>
    <div class="sub">雪球知名投资者 · 长期无年度亏损</div>
    <div class="stat-row">
      <div class="stat"><div class="val">414</div><div class="lbl">篇投资帖</div></div>
      <div class="stat"><div class="val">9</div><div class="lbl">大体系</div></div>
      <div class="stat"><div class="val">10年</div><div class="lbl">跨越</div></div>
    </div>
  </div>
  <div class="philosophy-card">
    <div class="quote">价值选股，趋势选时，估值定仓，波动降本</div>
    <div class="attribution">—— 超级鹿鼎公投资十六字诀</div>
    <div class="principles">
      <span class="principle">低PE低PB</span>
      <span class="principle">行业垄断</span>
      <span class="principle">高ROE</span>
      <span class="principle">高分红</span>
      <span class="principle">乌龟流</span>
      <span class="principle">复利为王</span>
    </div>
  </div>
</div>

<div class="main">
  <div class="section-title">📚 九大投资体系</div>
  <div class="chapter-grid" id="chapterGrid"></div>

  <div class="section-title">📅 精选时间线</div>
  <div class="timeline" id="timeline"></div>

  <div class="section-title">🏷️ 话题标签</div>
  <div class="tag-cloud" id="tagCloud"></div>
  
  <div class="section-title">📖 全文阅读</div>
  <p style="font-size:12px;color:var(--text2);margin-bottom:16px">414页连续全文。OCR文字逐步补全：<span id="ocrProgress">-</span>/414。</p>
  <div id="fullText"></div>
</div>

<script src="app.js"></script>
</body>
</html>
