没有满足给予条件（考虑第21段的要求）而未给予，例如对方没有完成一段特定期间的服务，或者是业绩条件没有满足，则不应确认取得的商品或服务的金额。”\n三、案例解析\n问题（1）：\n上市公司因预计无法满足业绩条件而终止股权激励计划，相关会计处理的关键在于是“作废”还是“取消”的认定。根据企业会计准则及相关规定，若权益工具因未满足提前设定的可行权条件而被取消（即股权激励计划的“作废”），公司无须作为加速行权处理，而应冲销前期已确认的相关费用；除上述情形外导致的提前终止，视为股权激励计划的“取消”，公司应加速确认剩余等待期内的相关费用。这一规定导致上市公司在预计未来无法满足业绩条件时面临两种选择：一是选择继续等待，直至公司实际无法满足业绩条件，股权激励自然“作废”；二是选择提前终止计划，导致股权激励主动“取消”。两种选择的业务实质类似（均为公司无法满足业绩条件且激励对象无法取得相应股份），但是相应的会计处理却差异甚大，后者相较于前者将确认大额股权激励费用。上市公司处在激烈的市场竞争中，需通过有效的激励方案吸引和激励人才，等待已失去激励作用的股权激励计划自然作废，可能导致公司流失人才或错失商业机会。因此，即便需要加速确认激励费用，部分上市公司仍选择主动终止股权激励计划。\n在本案例中，A上市公司2x17年度实际上未满足当年的业绩条件，从而导致第一期限制性股票未能解锁，属于股份支付的“作废”，应按照“作废”来进行会计处理。因此，A公司应冲回之前已确认的与第一期限制性股票相关的股权激励费用，使2x17年度累计确认的与这一部分相关的股权激励费用为零。\n对于本案例中的第二期和第三期解锁部分属于股份支付的“作废”还是“取消”，在实务中存在不同观点。一种观点认为，在公司业绩出现下滑且预期无法满足业绩条件的情况下，公司主动“取消”激励计划的实质与等待激励计划自然“作废”一致，均为公司无法满足业绩条件而导致职工不能解锁相关限制性股票，因此上述情况下公司主动“取消”的会计处理应与等待自然“作废”保持一致，即冲销前期已确认的激励费用。另一种观点认为，会计准则并未针对不同情形下“取消”股份支付的会计处理作出不同规定，只要公司不是在“实际上”没有满足业绩条件的情况下终止激励计划，就应严格按照“取消”来进行会计处理，即加速确认相关激励费用。\n我们倾向于第二种观点，即作为股份支付计划的“取消”处理。\n问题（2）：\n根据企业会计准则的规定，公司在取消股份支付计划时，应立即确认原本应在剩余等待期内确认的激励费用金额。对于“原本应在剩余等待期内确认的激励费用金额”，在实务中存在不同的理解。\n观点一认为，公司应视同该股权激励计划的可行权条件在取消当日已全部满足，并将剩余等待期内的股权激励费用全部计入取消当期，而不考虑公司对未来可行权数量的估计情况。就本案例来看，该观点下，A公司应当在取消日加速确认第二期、第三期的全部激励费用8,400万元。\n观点二认为，公司应在取消当日估计未来能够满足可行权条件的权益工具数量（在假定没有终止股权激励计划的情况下），据此预计原本应在剩余等待期内确认的股权激励费用金额，并将该金额一次性计入取消当期。就本案例来看，该观点下，A公司应当在取消日判断第二期、第三期能够满足业绩条件的可能性，并据此确认相关激励费用；若A公司预计无法满足第二期、第三期的业绩条件，则预计未来能够满足可行权条件的权益工具数量为零，其累计确认的第二期、第三期激励费用为零。\n问题（3）：\n股票价格属于市场条件。根据企业会计准则的规定，市场条件不影响公司对可行权权益工具数量的估计。假如A公司仅仅是因为股票价格下跌、激励计划丧失激励效果而提前终止该计划，亦无法采用上述问题（2）中的观点2，并不存在问题（2）所述对“原本应在剩余等待期内确认的激励费用金额”产生不同理解的可能，因此A公司应立即确认原本应在剩余等待期内确认的全部激励费用8,400万元。"}, {"title": "案例9-10 限制性股票回购价格高于市场价格的会计处理", "content": "一、案例背景\nA上市公司在2x17年1月1日，向20名公司高级管理人员授予了1,000万股限制性股票，授予价格为8元/股，授予后锁定3年，解锁条件包括员工服务期限条件和公司经营业绩条件。\nA公司2x17年度净利润大幅下滑，没有满足经营业绩条件。2x18年5月15日，A公司召开董事会，公司预测股权激励计划解锁条件中关于经营业绩的指标无法实现，故决定终止实施原股权激励计划，激励对象已获授的限制性股票由公司回购并注销。2x18年5月30日，A公司股东大会审议通过了上述终止及回购方案。\n2x18年6月15日，A公司以8元/股的授予价格回购上述限制性股票，并予以注销。A公司股票在2x18年6月15日的市场价格为5元/股。\n问题：对于限制性股票回购价格（8元/股）高于该股票在回购日市场价格（5元/股）的差额部分，A公司是否应将其计入当期损益？\n二、会计准则及相关规定\n《企业会计准则讲解（2010）》第十二章“股份支付”规定：“如果企业在等待期内取消了所授予的权益工具或结算了所授予的权益工具（因未满足可行权条件而被取消的除外），企业应当……在取消或结算时支付给职工的所有款项均应作为权益的回购处理，回购支付的金额高于该权益工具在回购日公允价值的部分，计入当期费用。”\n《企业会计准则解释第7号》规定：“对于因回购产生的义务确认的负债，应当按照《企业会计准则第22号——金融工具确认和计量》的相关规定进行会计处理。上市公司未达到限制性股票解锁条件而需回购的股票，按照应支付的金额，借记‘其他应付款——限制性股票回购义务’等科目，贷记‘银行存款’等科目；同时，按照注销的限制性股票数量相对应的股本金额，借记‘股本’科目，按照注销的限制性股票数量相对应的库存股的账面价值，贷记‘库存股’科目，按其差额，借记‘资本公积——股本溢价’科目。”\n《国际财务报告准则第2号——以股份为基础的支付》第28段规定：“如果主体在等待期间内，取消了所授予的权益工具或是对所授予的权益工具进行结算（因未满足给予条件作废而被取消的除外）：……在取消或结算时支付给雇员的所有款项均应作为权益的回购处理，即作为权益的减项，除非支付的金额超过了所授予权益工具在回购日的公允价值。所有超过部分均应确认为费用。但是，如果以股份为基础的支付安排包含负债成分，主体应重新计量在取消日或结算日负债的公允价值。所有用于结算负债成分的款项均应作为负债清偿进行处理。”\n三、案例解析\n提前终止限制性股票激励计划的上市公司需按照约定价格（通常为授予价格）回购原授予职工的限制性股票。对于回购价格高于回购日股票市价之间的差额是否应计入当期损益的问题，在实务中存在不同的理解和做法。\n观点一认为，应将公司支付的款项作为权益的回购处理，回购支付的金额高于该权益工具在回购日公允价值的部分（在本案例中，为8-5=3元/股），计入当期费用。\n观点二认为，如果上市公司根据与限制性股票授予对象签订的相关协议，已经将回购限制性股票的义务确认为金融负债的，则后续无论是因为未达到解锁条件而回购股票还是因为终止激励计划而回购股票，均仅涉及金融负债的清偿，无须就股票回购价格与回购日市场价格之间的差额确认损益影响。\n我们倾向于上述观点二，即上市公司取消限制性股票激励计划并按照约定价格回购股票的，仅涉及金融负债的清偿，无须就股票回购价格与回购日市场价格之间的差额确认对损益的影响。根据《企业会计准则解释第7号》，限制性股票回购义务产生的负债，应当按照金融工具准则进行会计处理，公司因未达到解锁条件而回购股票的行为属于金融负债的清偿，无论回购价格高于抑或低于回购日的股票市价，公司均不应确认其对损益的影响。同时，观点二也符合《国际财务报告准则第2号——以股份为基础的支付》对于取消股份支付计划的规定，即股份支付安排包含负债成分的，所有用于结算负债成分的款项均应作为负债清偿进行处理。\n然而，如果上市公司除了相关协议约定的回购价格之外，因提前终止限制性股票激励计划而给予了员工额外补偿，该额外补偿应计入当期费用。例如，假如A上市公司未按照激励协议约定的回购价格8元/股回购限制性股票，而是以10元/股的价格回购限制性股票，那么A公司实际上支付给了员工2元/股的额外补偿，A公司应将该额外补偿计入当期费用。"}, {"title": "案例9-11 股权激励计划形成的递延所得税资产的会计处理", "content": "一、案例背景\nA上市公司在2x17年1月1日授予职工1,000万份限制性股票股权激励计划，服务期限条件为2年，A公司预计1,000万份限制性股票在2年后均可行权。限制性股票的授予价格为10元/股，A公司股票在授予日的市场价格为19元/股。假定A公司满足确认递延所得税资产的条件，适用的所得税税率为25%。\n问题：A公司应如何核算该股权激励计划的递延所得税影响？\n二、会计准则及相关规定\n中国证监会《2013年上市公司年报会计监管报告》指出：“根据相关税法规定，对于带有业绩条件或服务条件的股权激励计划，企业按照会计准则的相关规定确认的成本费用在等待期内不得税前抵扣，待股权激励计划可行权时方可抵扣，可抵扣的金额为实际行权时的股票公允价格与激励对象支付的行权价格之间的差额。因此，上市公司未来可以在税前抵扣的金额与等待期内确认的成本费用金额很可能存在差异。根据会计准则的相关规定，上市公司应根据期末存在的信息估计未来可以税前抵扣的金额，以未来期间很可能取得的应纳税所得额为限确认递延所得税资产。此外，如果预计未来期间可抵扣的金额超过等待期内确认的成本费用，超出部分形成的递延所得税资产应直接计入所有者权益，而不是计入当期损益。”\n《国际会计准则第12号——所得税》第68A段规定：“在一些税务管辖区域内，主体获得以股份、股份期权或主体中其他权益工具支付的报酬相关的所得税抵扣（即在确定应税利润时可抵扣的金额）。该所得税抵扣的金额可能不同于相关的累计报酬费用，并且可能在以后的会计期间产生。例如，在一些税务管辖区域内，主体可能按照《国际财务报告准则第2号——以股份为基础的支付》，将所消耗的雇员劳务确认为费用并以之作为授予股份期权的对价，但是，可能直到履行该期权时，才获得以行权日主体的股票价格为基础计量的所得税抵扣。”\n《国际会计准则第12号——所得税》第68B段规定：“如同本准则中第9段和第26段（2）中所讨论的研究成本，所获取的雇员劳务的计税基础（税务部门允许在未来期间抵扣的金额）与零账面价值之间的差额，是一项产生递延所得税资产的可抵扣暂时性差异。如果在本期末不知道税务部门允许在未来期间进行抵扣的金额，则应以本期末可获得的信息为基础进行估计。例如，如果税务部门允许在未来期间抵扣的金额以主体未来某日的股票价格为基础，则可抵扣暂时性差异的计量应以本期末主体的股票价格为基础。”\n《国际会计准则第12号——所得税》第68C段规定：“如在第68A段中解释的，所得税抵扣（或根据第68B段计量的估计未来所得税抵扣）的金额可能与相关的累计报酬不同。本准则第58段要求当期和递延所得税应当确认为收益或费用，并计入当期损益，除非所得税产生于（1）在相同或不同的期间不确认为损益的交易或事项，或者（2）企业合并（投资性主体对须按公允价值计量且其变动计入损益的子公司的收购除外）。如果所得税抵扣（或估计的未来所得税抵扣）的金额超过相关的累计报酬费用的金额，这表明所得税抵扣同时与报酬费用和权益项目相关。在这种情况下，与当期或递延所得税相关的超额部分应直接确认为权益。”\n三、案例解析\n在2x17年12月31日，A公司确认股份支付费用的会计处理如下：\n借：管理费用等 （1,000×9×1/2）4,500\n贷：资本公积——其他资本公积 4,500\n假设A公司股票在2x17年12月31日的市场价格为17元/股，A公司估计未来可税前抵扣的金额为7元/股（17-10），未来可税前抵扣的总额为7,000万元（1,000×7）。A公司确认递延所得税的会计处理如下：\n借：递延所得税资产 （7,000×1/2×25%）875\n贷：所得税费用 875\n在2x18年12月31日，A公司确认股份支付费用的会计处理如下：\n借：管理费用等 （1,000×9-4,500）4,500\n贷：资本公积——其他资本公积 4,500\n假设A公司股票在2x18年12月31日的市场价格为22元/股，A公司估计未来可税前抵扣的金额为12元/股（22-10），未来可税前抵扣的总额为12,000万元（1,000×12）。A公司估计未来可税前抵扣的金额（12,000万元）超过等待期内确认的股份支付费用（累计为9,000万元），超出部分（12,000-9,000=3,000万元）形成的递延所得税资产应直接计入所有者权益。A公司确认递延所得税的会计处理如下：\n借：递延所得税资产 （12,000×25%-875）2,125\n贷：所得税费用 （9,000×25%-875）1,375\n资本公积——其他资本公积 （3,000×25%）750"}, {"title": "案例9-12 股份支付中“非等比例增资”的计算原则", "content": "一、案例背景\nA公司拟计划IPO上市，自然人甲和公司乙分别持有A公司20%和80%的股份，其中甲同时为A公司的员工，担任A公司的董事长。\n2021年，甲和A公司的部分员工共同成立持股平台丙低价增资A公司，认购股份20万股。增资日，A公司股份的公允价值为10元/股，持股平台\n丙获得股份的对价为2元/股。与此同时，A公司还引入了一个新的第三方股东D公司，D公司按10元/股向A公司增资，认购新增股份30万股。\n增资前，A公司的股份数量为100万股，增资后A公司的股份数量变为150万股。\n情形一：自然人甲持有持股平台60%的份额，此次增资中自然人甲通过持股平台间接获得A公司12万股股份。增资后，甲对于A公司的合并持股比例（包括原持股稀释后比例以及通过持股平台的持股比例）从原先的20%上升为21.3%，乙公司的持股比例降为53.3%，其他员工通过持股平台的持股比例为5.3%。D公司的持股比例为20%。相关持股情况见表9-6。\n表9-6 持股情况（情形一）\n增资前增资后穿透持股平台合计\n甲20万股20万股32万股\n乙公司80万股80万股80万股\n持股平台—20万股其他员工：8万股\nD公司—30万股30万股\n合计100万股150万股150万股\n\n情形二：甲持有持股平台10%的份额，此次增资中甲通过持股平台间接获得A公司2万股股份。增资后，甲对于A公司的合并持股比例（包括原持股稀释后比例以及通过持股平台的持股比例）从原先的20%下降为14.7%o乙公司的持股比例降为53.3%，其他员工通过持股平台的持股比例为12%。D公司的持股比例为20%。相关持股情况见表9-7。\n表9-7 持股情况（情形二）\n增资前增资后穿透持股平台合计\n甲20万股20万股22万股\n乙公司8。万股80万股80万股\n持股平台—20万股其他员工：18万股\nD公向—30万股30万股\n合计100万股150万股150万股\n\n问题：\n对于自然人甲通过持股平台低价获取的股份，是否构成股份支付及如何计算股份支付费用？\n二、会计准则及相关规定\n《企业会计准则第11号——股份支付》第二条指出：“股份支付是指企业为获取职工和其他方提供服务而授予权益工具或者承担以权益工具为基础确定的负债的交易……”\n《企业会计准则第11号——股份支付》第四条指出：“以权益结算的股份支付换取职工提供服务的，应当以授予日权益工具的公允价值计量。”\n《国际财务报告准则第2号——以股份为基础的支付》在示例11中提供了员工以低于股票公允价值购买股票的安排下确认股份支付费用的示例。\n《监管规则适用指引——发行类第5号》指出：“为发行人提供服务的实际控制人/老股东以低于股份公允价值的价格增资入股，且超过其原持股比例而获得的新增股份，应属于股份支付。如果增资协议约定，所有股东均有权按各自原持股比例获得新增股份，但股东之间转让新增股份受让权且构成集团内股份支付，导致实际控制人/老股东超过其原持股比例获得的新增股份，也属于股份支付。实际控制人/老股东原持股比例，应按照相关股东直接持有与穿透控股平台后间接持有的股份比例合并计算。”\n三、案例解析\n对于上述交易安排的会计处理，实务中存在如下两种观点：\n观点1：对于甲低价取得的股份应全部确认股份支付费用\n观点1认为，本案例中，A公司应当将自然人甲在持股平台所低价取得的全部股份，即情形一的12万股，或情形二中的2万股，全额确认股份支付费用。理由是甲为A公司的员工，为A公司提供服务，而此次增资中A公司的其他原股东乙未获得任何新增股份，表明该安排的商业实质并非是向老股东同比例配售新股，而是A公司为获取职工提供服务而授予员工权益工具的交易，应作为股份支付进行会计处理。\n情形一下股份支付费用=12万股×（10-2）=96（万元）\n情形二下股份支付费用=2万股×（10-2）=16（万元）\n观点2：仅对于甲超过其原持股比例而获得的新增股份确认股份支付费用，但在如何计算老股东超过其原持股比例而获得的新增股份，实务中又存在如下两种理解：\n观点2.1：若老股东持股比例降低，则不涉及股份支付。本案例中，甲原持股比例为20%，本次增资中共新增50万股，所以甲按照其原持股比例能获得的股份数为50×20%=10（万股）。\n情形一下甲获得12万股股份，增资后甲的合计持股比例为21%，甲超过其原持股比例获得的股份数为12-10=2（万股）。股份支付费用=2万股×（10-2）=16万元。\n情形二下，增资后甲的合计持股比例下降为14.6%，甲获得2万股股份，小于甲按照其原持股比例能获得的股份数10万股，不涉及股份，无须确认股份支付费用。仅员工持股平台中其他员工低价增资部分需作为股份支付处理。\n观点2.2：老股东持股比例变化应仅考虑老股东之间的相对持股比例，而非相对于总股本的持股比例。即对于老股东获得的新增股份数量，应当扣除该老股东按原持股比例应享有的本次增发给所有原股东（不包括新增股东）的股份后的差额，作为股份支付。\n情形一，甲原持股比例为20%，本次增资中给所有原股东（即甲和乙公司）的合计新增股份为12万股，所以甲按照其原持股比例能获得的股份数为12×20%=2.4（万股）。甲获得12万股股份，甲超过其原持股比例获得的股份数为12-2.4=9.6（万股）。股份支付费用=9.6万股×（10-2）=76.8（万元）。\n情形二，甲原持股比例为20%，本次增资中给所有原股东（即甲和乙公司）的合计新增股份为2万股，所以甲按照其原持股比例能获得的股份数为2×20%=0.4（万股）。甲获得2万股股份，甲超过其原持股比例获得的股份数为2-0.4=1.6（万股）。股份支付费用=1.6万股×（10-2）=12.8（万元）。\n我们赞成上述的观点2.2。"}]}, {"num": 10, "name": "会计政策、会计估计变更和差错更正", "cases": [{"title": "案例10-01 案件判决结果的变化是否应作为会计差错更正处理", "content": "一、案例背景\n2x11年8月17日，A公司所在市人民检察院（以下简称市检察院）以欺诈发行股票罪对A公司提起公诉。2x11年12月2日，A公司所在市区级人民法院（以下简称区级法院）对A公司作出刑事判决，判定A公司犯欺诈发行股票罪，判处罚金400万元。\n2x12年1月31日，市检察院以区级法院量刑偏轻为由对有关判决提出抗诉。2x12年3月29日，A公司所在市中级人民法院（以下简称中级法院）裁定撤销区级法院作出的刑事判决。\n虽然区级法院的判决被中级法院撤销，但A公司法律顾问（包括A公司的内部法律顾问及其聘请的代理律师）仍然认为，A公司很可能因本次诉讼案被判处罚金400万元。根据上述诉讼事实及法律顾问意见，A公司在2x11年度财务报表中计提了预计负债400万元。A公司2x11年度财务报表于2x12年4月24日经董事会批准对外披露。\n2x12年4月26日，市检察院以欺诈发行股票罪、伪造金融票证罪、故意销毁会计凭证罪再次对A公司提起公诉。2x12年5月7日，中级法院对A公司所涉案件进行开庭审理。2x13年2月7日，中级法院对A公司作出刑事判决，判定A公司犯欺诈发行股票罪、伪造金融票证罪、故意销毁会计凭证罪，分别判处罚金1,000万元、20万元、20万元，共处罚金1,040万元。上诉期内，A公司未对上述判决进行上诉。根据上述判决结果，A公司将中级法院所处罚金超过原已计提预计负债的部分认定为前期差错，追溯调整了2x11年原已计提的预计负债，并在2x12年度财务报表中进行了重述。A公司2x12年度财务报表于2x13年4月22日经董事会批准对外披露。\n问题：A公司将中级法院所处罚金超过原已计提预计负债的部分作为前期差错更正进行会计处理是否正确？\n二、会计准则及相关规定\n《企业会计准则第28号——会计政策、会计估计变更和差错更正》第八条规定：“企业据以进行估计的基础发生了变化，或者由于取得新信息、积累更多经验以及后来的发展变化，可能需要对会计估计进行修订。会计估计变更的依据应当真实、可靠。会计估计变更，是指由于资产和负债的当前状况及预期经济利益和义务发生了变化，从而对资产和负债的账面价值或者资产的定期消耗金额进行调整。”\n《企业会计准则第28号——会计政策、会计估计变更和差错更正》第十一条规定：“前期差错，是指由于没有运用或错误运用下列两种信息，而对前期财务报表造成省略或错报：（一）编报前期财务报表时预期能够取得并加以考虑的可靠信息；（二）前期财务报告批准报出时能够取得的可靠信息。”\n《企业会计准则讲解（2010）》第二十九章“会计政策、会计估计变更和差错更正”指出：“企业应当严格区分会计估计变更和前期差错更正，对于前期根据当时信息、假设等作了合理估计，在当期按照新的信息、假设等需要对前期估计金额作出变更的，应当作为会计估计变更处理，不应作为前期差错更正处理。”\n《国际会计准则第8号——会计政策、会计估计变更和差错》第32段规定：“由于商业活动中内在的不确定因素影响，许多财务报表中的项目不能精确地计量，而只能加以估计。估计涉及以最近可利用的、可靠的信息为基础所作的判断。”\n《国际会计准则第8号——会计政策、会计估计变更和差错》第34段规定：“如果据以进行估计的事实发生变化，或者由于新的信息或更多的经验，可能不得不对估计进行修正。按其性质，对估计的修正与前期无关并且不属于会计差错更正。”\n中国证监会《关于做好上市公司2010年财务报告及相关工作的公告》（证监会公告〔2010〕37号）规定：“会计估计是企业对结果不确定的交易或事项以历史积累的和最近可利用的信息为基础所作的判断。会计估计所涉及的交易或事项均有内在的不确定性，进行会计估计的过程是一种集主、客观因素于一体的综合判断过程。因此，不能简单以对或错来评价会计估计，而应评价会计估计确定过程及其依据的合理性。上市公司在年报编制过程中，应合理区分会计估计变更和会计差错更正，并按照会计准则规定进行会计处理，不得利用会计估计变更和差错更正在不同会计期间操纵利润。”\n《监管规则适用指引——会计类第1号》规定：“企业不应简单将会计估计与实际结果对比认定存在差错。如果企业前期作出会计估计时，未能合理使用报表编报时已经存在且能够取得的可靠信息，导致前期会计估计结果未恰当反映当时情况，则应属于前期差错，应当适用前期差错更正的会计处理方法；反之，如果企业前期的会计估计是以当时存在且预期能够取得的可靠信息为基础作出的，随后因资产和负债的当前状况及预期经济利益和义务发生了变化而变更会计估计的，则属于会计估计变更，应当适用会计估计变更的会计处理方法。”\n三、案例解析\n会计估计变更与差错更正有时难以区分，尤其是难以区分会计估计变更和由于会计估计错误导致的差错更正，区分这两者的关键是判定前期作出的会计估计是否存在错误。如果作出会计估计时，未考虑或未正确运用编制财务报表时能够合理预计取得的可靠信息，则该会计估计存在错误，属于前期差错，应遵循差错更正的会计处理方法。反之，如果作出会计估计时，已充分考虑当时存在的、预期能够取得的可靠事实，而后会计估计变更又是由于资产和负债的当前状况及预期未来经济利益和义务发生了变化作出的，则属于会计估计变更，适用会计估计变更的会计处理方法。\n根据企业会计准则相关规定，会计估计变更主要是因为赖以进行估计的基础发生变化，或者由于取得了新的信息、积累了更多的经验或后来的发展，可能不得不对会计估计进行修订。而会计估计发生前期差错主要是由于重大人为过失或舞弊等原因，未能合理使用前期财务报表编制时已经存在且能够取得的可靠信息，导致前期会计估计结果未能恰当反映当时的情况。从理论上讲，会计估计变更与差错更正之间存在明显的区别。但在实务中，因难以确定哪些信息属于作出会计估计时已经存在且能够取得的可靠信息，企业往往容易混淆会计估计变更与由于会计估计错误导致的前期差错更正。区分两者的关键是判断前期作出的会计估计是否存在错误。\n本案例中，截至2x11年度财务报表批准报出日（2x12年4月24日），A公司与诉讼案件相关且能够取得的可靠信息包括市检察院的起诉书、区级法院的刑事判决书、市检察院的刑事抗诉书、中级法院的刑事裁定书以及法律顾问的意见等。A公司根据上述信息，在2x11年度财务报表中计提了预计负债400万元，并将其计入当年年度损益。A公司上述会计估计是以编制2x11年度财务报表时存在且能够取得的可靠信息为基础作出的，并没有确凿证据表明A公司存在重大过失或舞弊等情形，从而导致其当时的会计估计存在差错。\n2x13年2月7日，中级法院对A公司作出刑事判决后，A公司编制2x12年度财务报表时能够取得的可靠信息为中级法院的刑事判决书。由于A公司未上诉，中级法院的刑事判决书中判处的罚金金额即实际结果。该实际结果与前期计提预计负债的金额存在差异，并不表明前期会计估计存在错误。相反，由于取得了最新的信息，使原先的会计估计与中级法院的判决结果存在差异，A公司应对原先的会计估计进行修订，该情形属于会计估计变更。\n因此，本案例中A公司会计处理错误，应将中级法院所处罚金超出2x11年度财务报表已计提预计负债部分作为会计估计变更处理，在2x12年度财务报表中补计负债640万元，并计入2x12年年度损益。\n【相关案例之一】法院判决结果与原估计存在重大差异时，如何区分会计估计变更还是会计差错更正\n（一）案例背景\nA上市公司原大股东B公司与A公司在2x09年7月至2x10年10月期间发生了一系列关联交易及不正常现金流入流出。此外，在此期间B公司还通过C公司等特定第三方与A公司发生了一系列不正常现金流入流出。A公司已向法院起诉上述交易与资金的不正常流入和流出，以及涉嫌资金挪用行为，该等事项涉及A公司与B公司及上述特定第三方应收、应付款项。\n上述案件发生后，A公司在2x10年年报中根据当时情况对相关应收款项的可回收性进行了估计，计提了相应坏账准备（约占应收账款的56%）。A公司在2x10年年报期间更换了管理层，管理层专门聘请了独立第三方对资产减值情况进行评估，并明确认为当时的“资产减值的估计、假设是合理的”。之后年度A公司基本未对坏账准备进行调整。根据相关法院判决，上述案件于2x11年年末已结案且A公司胜诉，但是由于相关被告已资不抵债，截至2x12年年末相关判决未得到执行。A公司管理层认为，2x12年12月31日该款项的可回收性与2x11年相比并无实质性差异，未调整以前年度已计提的坏账准备。截至2x12年12月31日，A公司对B公司和上述特定第三方公司应收款项余额为6亿元。A公司已对B公司和上述特定第三方公司的应收款项计提坏账准备3.36亿元，应收款项账面净值2.64亿元。A公司2x12年年度报表于2x13年3月280批准报出。\n2x13年4月1日，根据相关法院的执行通知书，A公司估计案件的分配比例约为55.5%，如按上述比例分配，A公司预计相关案件可收回金额约为3.33亿元。截至2x13年8月27日，A公司实际收到的案件执行款共计3.64亿元，与上述应收款账面净值2.64亿元差异约1亿元。\nA公司认为由于相关案件尚未最终执行完毕，待所有案件执行完毕后，A公司将根据所有案件最终的收回金额追溯调整以前年度各期财务报表。\n问题：法院判决结果与原估计之间存在的重大差异，应认定为会计估计变更还是会计差错更正？\n（二）案例解析\n该案件发生后，A公司在2x10年年报中根据当时的情况对相关应收款项的可回收性进行了估计，计提了相应坏账准备。公司在2x10年年报期间更换了管理层，管理层专门聘请了独立第三方对资产减值情况进行评估，并明确认为当时“资产减值的估计、假设是合理的”。虽然上述案件于2x11年年末已结案且A公司胜诉，但由于相关被告已资不抵债，截至2x12年年末相关判决未能得到执行。考虑到该案件具体清偿2例待执行后才可明确获知，因而A公司无法取得可靠的信息进一步明确其债权的可收回比例，也没有明确的迹象表明相关公司的偿债能力与以前年度相比有重大变化。如果既没有确凿证据表明前期会计估计本身存在人为差错或舞弊，也没有证据表明A公司没有运用或错误运用编报前期财务报表时以及前期财务报告批准报出时预期能够取得并加以考虑的可靠信息，而对前期财务报表造成错报，那么前期财务报告被批准报出时，A公司管理层认定其已根据当时的信息、假设等作了合理估计，而法院判决后续的执行情况是前期财务报告批准报出后A公司获取的新信息，A公司依据获取的新信息对前期估计金额作出的变更应被作为会计估计变更处理。即A公司不应根据实际收到法院执行款的情况追溯调整前期会计报表。\n在本案例中，值得关注的另外一点是，A公司2x12年年度财务报表报出日是2x13年3月28日；2x13年4月1日A公司依据法院的执行通知书就相关案件可收回金额作出了新的估计（3.33亿元）。如果该新估计所依据的案件最新进展情况的相关信息在财务报表报出日前可以获得，则属于“资产负债表日后取得确凿证据，表明某项资产在资产负债表日发生了减值或者需要调整该项资产原先确认的减值金额”的情形，相关估计变更应作为资产负债表日后调整事项计入2x12年年度财务报表。\n【相关案例之二】法院判决结果执行中相关情况变化时，如何区分会计估计变更还是会计差错更正\n（一）案例背景\nA公司为上市公司，B公司与A公司在2x10年1月1日前存在关联关系，2x10年1月1日后不再存在关联关系。2x08年，B公司以自身房产为抵押向银行借款4,000万元，A公司同时开具了面值为4,000万元的无期限商业承兑汇票作为质押。2x10年，因B公司无力偿还银行债务本金4,000万元（利息已经支付），银行起诉到法院。法院于2x10年作出一审判决，银行先执行B公司的抵押房产，该房产在2x10年年底的评估值为6,000万元。\n2x11年2月1日，法院二审判决，其中包括银行可以执行B公司的抵押房产以及银行可以要求A公司就B公司未偿还的银行借款承担质押票据的兑付责任。A公司与B公司、法院及银行进行了沟通，银行和法院均同意先执行B公司的抵押房产。2x11年3月，B公司的抵押房产经法院评估作价，准备拍卖，由于B公司不具有支付能力，A公司为促成房产拍卖代B公司支付了拍卖保证金。\nA公司在2x10年资产负债表日判断，由于B公司抵押房产价值约6,000万元，A公司与法院和债权人就该偿债事项进行沟通后，认为A公司不会产生连带偿债损失。2x11年4月1日，A公司公布2x10年年度报告，考虑到资产负债表日至法院判决日、财务报告报出日期间，B公司抵押房产价值未大幅下跌（跌破债务本金）A公司把上述事项作为或有负债进行披露（未计提预计负债）。\n2x11年4月到7月，由于B公司濒临破产等诸多因素，法院迟迟未能执行对B公司房产的拍卖。2x11年10月，银行要求A公司承担连带偿债责任，A公司为此被扣划了银行存款4,000万元。\n问题：A公司2x11年发生的4,000万元偿债损失应计入2x11年还是应追溯调整到2x10年？\n（二）案例解析\n在本案例中，首先应判断A公司2x10年年度财务报表是否存在会计差错。B公司2x08年以房产作抵押举债，2x10年，因B公司无力偿还银行债务本金4,000万元，银行提起起诉，法院已于2x10年作出一审判决，银行先执行B公司的抵押房产，且该房产在2x10年末价值已涨至6,000万元，比债务本金高出2,000万元。因此，就资产负债表日存在的情况判断，A公司很可能不需要履行连带责任，所以与这一或有事项有关的义务不满足预计负债确认条件。\n虽然在A公司2x10年财务报告报出日（2x11年4月1日）之前，该诉讼发生了新进展，即2x11年2月1日法院判决银行可以执行B公司的抵押房产以及银行可以要求A公司就B公司未偿还的银行借款承担质押票据的兑付责任，但考虑到法院和债权人同意先执行B公司的抵押房产，而该抵押房产已经在准备估价拍卖，B公司抵押房产的价值未出现大幅下跌（跌破债务本金情形），故可以合理预期B公司将通过拍卖房产所得偿还银行债务。因此，A公司仍然很可能不需要履行连带责任，与这一或有事项有关的义务仍不满足预计负债确认条件。\n我们认为，A公司在2x10年年报中将B公司的连带偿债责任作为或有事项披露是合理的。A公司在2x10年资产负债表日根据当时存在的、预期能够取得的证据进行了判断，且没有证据表明当时的判断存在差错，因此，该事项不属于前期差错。\n2x11年10月，由于法院迟迟未能执行对B公司房产的拍卖，A公司为此被扣划了银行存款4,000万元，这是该项偿债情况发生了变化，由此产生的对负债账面价值的重估和调整，应属于会计估计变更。根据准则规定，A公司2x11年发生的4,000万元偿债损失应计入2x11年的损益，不需要追溯调整2x10年的相关财务数据。"}, {"title": "案例10-02 关联方转移定价的特别纳税调整应认定为会计估计变更还是会计差错更正", "content": "一、案例背景\nA上市公司的经营范围为通信及计算机软硬件技术开发、生产、销售；通信及计算机网络工程技术咨询、技术培训；许可范围内的进出口业务。A公司的子公司持有B公司30%的股权，B公司为中外合资经营企业，主要经营范围为CDMA（码分多址）移动电话、移动信息终端技术及其他相关产品的研发、生产、销售和售后服务。\nB公司所在地国税局在2x12年年初进行了一次税收征管普查工作，根据普查结果，在2x13年2月1日向B公司下发《特别纳税调查调整通知书》，指不B公司于2x07年、2x08年、2x09年和2x10年纳税年度，违反《中华人民共和国外商投资企业和外国企业所得税法》《中华人民共和国企业所得税法》及其实施条例和《中华人民共和国税收征收管理法》及其实施细则中关于关联企业业务往来、特别纳税调整的有关规定，决定调增B公司应纳税所得额，并要求其补缴外商投资企业和外国企业所得税。B公司2x12年年度财务报告于2x13年3月12日经董事会批准报出。\nB公司认为，由于其业务特点，其采购受其控股股东控制，交易价格由其控股股东决定，因此B公司补缴以前年度税款系其控股股东违背关联企业业务往来在转让定价方面公平定价的原则，以致被中国税务机关追缴少缴的税款。该部分被追缴的税款应由B公司的控股股东单方面承担，B公司正积极与其控股股东沟通上述事项，但B公司应先向税务部门缴纳上述少缴税款，因此应先确认被追缴税款的损失。\n基于以上考虑，B公司将上述纳税调整事项作为前期会计差错更正，调整了2x12年年度财务报表相关项目期初数据，并在财务报表附注中作为其他对期初数的调整事项予以披露。\n问题：B公司是否应将特别纳税调整事项作为前期会计差错更正处理？\n二、会计准则及相关规定\n《企业会计准则第28号——会计政策、会计估计变更和差错更正》第十一条规定：“前期差错，是指由于没有运用或错误运用下列两种信息，而对前期财务报表造成省略或错报。（一）编报前期财务报表时预期能够取得并加以考虑的可靠信息。（二）前期财务报告批准报H1时能够取得的可靠信息。”“前期差错通常包括计算错误、应用会计政策错误、疏忽或曲解事实以及舞弊产生的影响以及存货、固定资产盘盈等。”\n《企业会计准则第29号——资产负债表日后事项》第五条规定：“企业发生的资产负债表日后调整事项，通常包括下列各项：（一）资产负债表日后诉讼案件结案，法院判决证实了企业在资产负债表日已经存在现时义务，需要调整原先确认的与该诉讼案件相关的预计负债，或确认一项新负债。”\n《企业会计准则讲解（2010）》第二十九章“会计政策、会计估计变更和差错更正”规定：“会计估计，是指企业对结果不确定的交易或者事项以最近可利用的信息为基础所作的判断由于商业活动中内在的不确定因素影响，许多财务报表中的项目不能精确地计量，而只能加以估计。估计涉及以最近可利用的、可靠的信息为基础所作的判断。会计估计的存在是由于经济活动中内在的不确定性因素的影响。进行会计估计时，往往以最近可利用的信息或资料为基础。”“企业应当严格区分会计估计变更和前期差错更正，对于前期根据当时的信息、假设等作了合理估计，在当期按照新的信息、假设等需要对前期估计金额作出变更的，应当作为会计估计变更处理，不应作为前期差错更正处理。”\n《监管规则适用指引——会计类第1号》规定：“企业不应简单将会计估计与实际结果对比认定存在差错。如果企业前期作出会计估计时，未能合理使用报表编报时已经存在且能够取得的可靠信息，导致前期会计估计结果未恰当反映当时情况，则应属于前期差错，应当适用前期差错更正的会计处理方法；反之，如果企业前期的会计估计是以当时存在且预期能够取得的可靠信息为基础作出的，随后因资产和负债的当前状况及预期经济利益和义务发生了变化而变更会计估计的，则属于会计估计变更，应当适用会计估计变更的会计处理方法。”\n三、案例解析\n特别纳税调整事项是一个较为复杂的事项，涉及很多对具体情形的判断。将此特别纳税调整事项作为前期会计差错更正还是作为会计估计变更处理，主要取决于B公司在编制前期年度财务报表，以及前期财务报告批准报出时，是否能够取得可靠信息以对该特别纳税事项进行恰当的会计处理。\n情形一：特别纳税调整事项作为会计估计变更处理。\n一方面，B公司作为独立的市场主体，在正常的生产经营过程中，可合理预计其能取得有关采购或销售的可靠定价信息。B公司在计算、缴纳所得税以及进行相关会计处理时，有条件充分考虑并正确运用上述可靠信息。若B公司在以前年度通过与其他独立第三方采购类似商品的价格或与市场类似商品价格进行比较后，没有发现其前期存在转让价格不合理的情况，且B公司相应年度的财务报告均已经会计师事务所审计并出具了标准无保留意见的审计报告，则上述特别纳税调整事项涉及的年度虽为2x07年至2x10年，但并不代表B公司在相关会计年度存在会计准则中会计差错定义所指的“没有考虑或错误运用”编报前期财务报表以及前期财务报告批准报出前预期能够取得并加以考虑的可靠信息。\n另一方面，B公司所在地国税局在特别纳税调整通知书中，也将此次调整明确界定为特别纳税调整事项。特别纳税调整的结果很大程度上取决于税收部门的判断及认定，而企业一般无法直接依照相关税收法律法规计算出需调整的金额。多数情况下，税务机关认定了特别纳税调整的具体金额，企业才能获知该信息。\n此外，此次特别纳税调整源于B公司所在地国税局在2x12年年初进行的一次税收征管普查工作，发生在B公司2x12年年度财务报告被批准报出前，当地国税局根据普查结果向B公司下发特别纳税调整通知书。因此，该税务调整事项依照相关会计准则规定应属于资产负债表日后事项中的调整事项，应将该事项的影响计入2x12年年度财务报表中。\n综上所述，在上述情况下，企业将该特别纳税调整事项计入2x12年年度财务报表中。\n情形二：特别纳税调整事项作为前期会计差错处理。\n特别纳税调整事项是否应作为前期会计差错处理应考虑该事项于资产负债表日是否已存在，企业是否已依据可获得的可靠信息作出了合理判断及会计处理。若B公司在以前年度可以通过与其他独立第三方采购类似商品的价格或与市场类似商品价格进行比较后，能够判断其与股东的转让定价明显不公允，需按照税法进行调整，而B公司没有进行这种比较或在显失公允的情况下没有进行应纳税所得额的调整，则这种计算错误应属于前期差错。此外，企业完成所得税汇算清缴并不意味着企业的税务事项完全符合相关税法的规定，企业仍然可能存在违反相关税收法规的情形，税务机关也可对企业进行查处。\n综上所述，国税局对B公司2x07年至2x10年纳税年度进行的特别纳税调整，是基于以前年度企业存在不符合独立交易原则，或者其他不具有合理商业目的安排的情况，即当初的税款计算及申报工作存在差错，因而针对2xO7年至2x10年纳税年度应补缴的相关税款应作为前期会计差错进行调整。\n【相关案例之一】对应交税金的估计与税务机关的批复不一致时，如何区分会计估计变更还是会计差错更正\n（一）案例背景\nA公司为上市公司。2x08年，A公司由于为与其有业务往来的B公司银行贷款提供担保而确认了相应预计负债，计入了当年度营业外支出。该担保与A公司应纳税所得额相关。2x10年，担保责任实际履行完毕，A公司在2x10年企业所得税汇算清缴期间向主管税务机关申请了3亿元担保损失税前扣除。若不考虑担保损失，A公司2x10年应纳税所得额为1亿元，所得税费用为2,500万元。A公司认为，上述担保损失符合税前扣除的条件，但能否扣除最终需主管税务机关认定，而税务机关的认定存在不确定性。A公司在披露2x10年年报时，尚未取得主管税务机关就担保损失扣税认定的批复文件，因此在2x10年年报中确认了应缴所得税负债2,500万元，并确认了同等金额的当期所得税费用。截至2x10年所得税缴纳截止日，A公司因未取得主管税务机关批复文件，一直未实际缴纳2x10年所得税。\n2x11年9月，A公司取得主管税务机关批复：为B公司银行贷款提供担保发生的担保损失共计3亿元，可以从应纳税所得额中扣除，并确定可从2x10年度应纳税所得额中扣除1亿元，剩下2亿元可在2x11年度（含）及以后年度的应纳税所得额中扣除。\n问题：A公司在2x11年取得主管税务机关批准，可以从2x10年应纳税所得额中扣除的1亿元担保损失及2,500万元所得税费用，应追溯调整计入2x10年度还是计入2x11年度？\n（二）案例解析\n在本案例中，A公司从2x08年起为B公司履行银行贷款担保责任，至2x10年履行完毕，共发生了3亿元贷款担保损失。A公司在披露2x10年年报之时，尚未取得主管税务机关批复文件（批准有关担保损失可以从应纳税所得额中扣除）。A公司于2x11年9月取得的主管税务机关批复文件，不属于编制A公司2x10年年度财务报告时“能够合理预计取得并应当加以考虑的可靠信息”，也不属于2x10年年度财务报告批准报出时“能够取得的可靠信息”。因此，A公司2x11年9月取得主管税务机关批复后对相应所得税费用和应缴所得税的调整，不属于前期差错。\n我们认为，A公司于2x11年9月取得的主管税务机关批复文件，直接导致与A公司2x11年度应纳税所得额和所得税费用相关的预期经济利益和缴税义务发生变化，应属于会计估计变更，应根据准则规定采用未来适用法进行会计处理。\n综上所述，在本案例中，主管税务机关批准可以从2x10年度应纳税所得额中扣除的1亿元担保损失，不应追溯调整2x10年年度财务报表，而应从2x11年度应纳税所得额中扣除。其余2亿元担保损失，可以根据A公司2x11年至2x14年应纳税所得额大小和主管税务机关批复文件规定进行相应会计处理。符合递延所得税资产确认条件的，应确认相关递延所得税资产。\n【相关案例之二】追缴财政基金是否属于会计差错更正\n（一）案例背景\nA公司为上市公司，于2x11年3月初公布2x10年年报。年报公布后仅数日，A公司收到省财政厅《关于〈xx省大中型水库库区基金征收使用管理细则（试行）〉的通知》，根据该文件要求，A公司应自2x09年5月1日起，对装机容量在2.5万千瓦及以上有发电收入的水库和水电站，按照上网电量8厘/千瓦时征收库区基金，按照该文件界定的征收范围，A公司所属已投产电站均需缴纳库区基金。经测算，执行上述规定后，A公司2x09年归属母公司股东的净利润减少约900万元，2x10年归属母公司股东的净利润减少约1,800万元。\n该文件同时规定：2x09年5月1日至2x10年12月31日应征收的大中型水库库区基金收入，由省电网公司代为追缴，并于2x11年4月1日前足额缴入省级国库，2x11年1月1日后征收的大中型水库库区基金收入，按《xx省大中型水库库区基金征收使用管理细则（试行）的通知》相关规定办理。\n问题：A公司在2x11年度补交的2x09年度至2x10年度的水库库区基金是否属于重大会计差错？是否需要就此进行追溯调整？\n（二）案例解析\n在本案例中，A公司于2x10年年度报告报出日后收到政府文件，不属于准则中规定的“编报前期财务报表时能够合理预计取得并应当加以考虑的可靠信息”，也不属于“前期财务报表批准报出时能够取得的可靠信息”，A公司在编制2x10年年度财务报表时无法取得或预计这一事项，该事项不属于前期差错，A公司2x09年至2x10年年度财务报告无须进行调整。\n根据准则规定，A公司无须进行追溯调整，但应对此事项进行专项信息披露。同时，应将2x09年度、2x10年度应计提的库区基金计入2x11年一季度财务报告。"}, {"title": "案例10-03 固定资产预计净残值变更是否属于会计估计变更", "content": "一、案例背景\n2x12年3月，A公司发布会计估计变更公告，将船舶预计净残值从1,350元/轻吨变更为2,860元/轻吨，变更后船舶的净残值自2x12年1月1日起执行。A公司认为船舶净残值的变更属于会计估计变更，因此采用未来适用法进行会计处理，增加当年净利润约5.96亿元。\n根据公开市场的价格信息，从2x10年初至2x12年初，由于铁矿石原料价格持续高涨等原因，国内重型废钢价格基本维持在2,900元/轻吨左右。两家A公司同行业上市公司均根据重型废钢价格变动情况，在2x11年1月1日发布会计估计变更公告，变更船舶预计净残值，并自变更日起采用未来适用法进行会计处理。\n问题：A公司对船舶净残值的变更是否属于会计估计变更？\n二、会计准则及相关规定\n《企业会计准则第4号——固定资产》第十九条规定：“企业至少应当于每年年度终了，对固定资产的使用寿命、预计净残值和折E方法进行复核。使用寿命预计数与原先估计数有差异的，应当调整固定资产使用寿命。预计净残值预计数与原先估计数有差异的，应当调整预计净残值。与固定资产有关的经济利益预期实现方式有重大改变的，应当改变固定资产折旧方法。固定资产使用寿命、预计净残值和折旧方法的改变应当作为会计估计变更。”\n《企业会计准则第28号——会计政策、会计估计变更和差错更正》第八条规定：“企业据以进行估计的基础发生了变化，或者由于取得新信息、积累更多经验以及后来的发展变化，可能需要对会计估计进行修订。会计估计变更的依据应当真实、可靠。会计估计变更，是指由于资产和负债的当前状况及预期经济利益和义务发生了变化，从而对资产和负债的账面价值或者资产的定期消耗金额进行调整。”\n《企业会计准则第28号——会计政策、会计估计变更和差错更正》第十一条规定：“前期差错，是指由于没有运用或错误运用下列两种信息，而对前期财务报表造成省略或错报：（一）编报前期财务报表时预期能够取得并加以考虑的可靠信息；（二）前期财务报告批准报出时能够取得的可靠信息。”\n《企业会计准则讲解（2010）》第二十九章“会计政策、会计估计变更和差错更正”指出：“企业应当严格区分会计估计变更和前期差错更正，对于前期根据当时信息、假设等作了合理估计，在当期按照新的信息、假设等需要对前期估计金额作出变更的，应当作为会计估计变更处理，不应作为前期差错更正处理。”\n中国证监会发布的《关于做好上市公司2010年财务报告及相关工作的公告》（证监会公告〔2010〕37号）规定：“会计估计是企业对结果不确定的交易或事项以历史积累的和最近可利用的信息为基础所作的判断。会计估计所涉及的交易或事项均有内在的不确定性，进行会计估计的过程是一种集主、客观因素于一体的综合判断过程。因此，不能简单以对或错来评价会计估计，而应评价会计估计确定过程及其依据的合理性。上市公司在年报编制过程中，应合理区分会计估计变更和会计差错更正，并按照会计准则规定进行会计处理，不得利用会计估计变更和差错更正在不同会计期间操纵利润。”\n《监管规则适用指引——会计类第1号》规定：“企业不应简单将会计估计与实际结果对比认定存在差错。如果企业前期作出会计估计时，未能合理使用报表编报时已经存在且能够取得的可靠信息，导致前期会计估计结果未恰当反映当时情况，则应属于前期差错，应当适用前期差错更正的会计处理方法；反之，如果企业前期的会计估计是以当时存在且预期能够取得的可靠信息为基础作出的，随后因资产和负债的当前状况及预期经济利益和义务发生了变化而变更会计估计的，则属于会计估计变更，应当适用会计估计变更的会计处理方法。”\n三、案例解析\n根据企业会计准则的相关规定，会计估计变更主要是因为赖以进行估计的基础发生变化，或者由于取得了新的信息、积累了更多的经验或后来的发展，可能不得不对会计估计进行修订。而会计估计发生前期差错主要是由于重大人为过失或舞弊等原因，未能合理使用前期财务报表编制时已经存在且能够取得的可靠信息，导致前期会计估计结果未能恰当反映当时的情况。从理论上讲，会计估计变更与前期差错更正存在明显的区别。但在实务中，因难以确定哪些是作出前期会计估计时已经存在且能够取得的可靠信息，企业往往容易混淆会计估计变更与由于会计估计错误导致的前期差错更正。区分两者的关键是判断前期作出的会计估计是否存在错误。如果企业在前期作出会计估计时，存在对前期能够取得的可靠信息（即编制前期财务报表时预期能够取得并加以考虑的可靠信息以及前期财务报表批准报出时能够取得的可靠信息）的忽略或不当使用的情形，则该会计估计就当时情况而言是不合理的，属于前期差错，应当适用前期差错更正的会计处理方法。如果企业前期的会计估计是以当时存在且能够获得的可靠信息为基础作出的，以后因资产和负债的当前状况及预期经济利益和义务发生了变化而变更会计估计的，则属于会计估计变更，应当适用会计估计变更的会计处理方法。\n本案例中，A公司按照预计废钢价格和船舶轻吨数估计船舶净残值，并在每个会计年度终了对船舶的使用寿命、预计净残值和折旧方法进行复核。根据案例内容，我们有理由认为A公司2x10年年度终了在复核船舶预计净残值时应当能够获得上述重型废钢价格变动以及同行业上市公司变更船舶预计净残值的信息，并根据这些信息对船舶预计净残值进行变更。但A公司2x10年年度终了在复核船舶预计净残值时忽略了相关信息，由此导致A公司2x11年对船舶净残值的估计发生错误。\n对于前期差错，企业应当根据其重要性判断该差错是否属于重要的前期差错，如果属于重要的前期差错且确定前期差错累计影响数切实可行，应当采用追溯重述法更正前期财务报表；反之，应调整发现当期与前期相同的相关项目。根据《企业会计准则讲解（2010）》第二十九章第四节，重要的前期差错是指足以影响财务报表使用者对企业财务状况、经营成果和现金流量作出正确判断的前期差错。A公司上述因会计估计错误导致的前期差错是否属于重要的前期差错，需要根据A公司的实际情况作出判断，并进行相应的会计处理。"}, {"title": "案例10-04 会计估计变更的处理", "content": "由于企业经营活动中内在的不确定因素，许多财务报表项目不能准确计量，只能加以估计，估if-过程涉及以最近可以得到的信息为基础所作的判断。但是，会计估计毕竟是就现有资料对未来所作的判断，随着时间的推移，如果赖以进行估计的基础发生变化，或者由于取得了新的信息、积累了更多的经验或后来的发展可能不得不对会计估计进行修订，企业对变更后的会计估计应当采用未来适用法。\n某些情况下，企业在变更会计估计后，对于应该从何时开始采用变更后的估计存在疑问，尤其是当涉及固定资产折旧方法、固定资产使用寿命及应收款项坏账准备计提方法变更时。究其原因，一般有以下几种：\n1．报告年度内新增的一些资产，其特征与原资产有所不同，从而对新资产采用新的会计估计。\n2．报告年度内发生了某一事件，导致原赖以估计的基础发生变化。例如，一项新技术研发成功，使某类机器设备的预计使用寿命从10年延长至15年。\n3．随着信息和经验的积累，企业逐渐发现原来的方法已经不再适用或者不够准确。例如，企业在对应收款项组合按照信用风险特征计提坏账准备时，以前并未区分关联方和非关联方款项，都视为具有同样的信用风险特征，随着经验的积累，发现在其他条件（如账龄）相同的情况下，对关联方应收款项发生坏账的比例比非关联方要低很多，因此决定变更坏账准备的计提方法。\n上述情况如属于会计估计变更，应从报告年度的期初、导致变更的事件发生日，还是从管理层批准会计估计变更的日期开始按照新的会计估计进行会计处理，实务中存在不同看法。\n一、案例背景\nA公司是上市公司。2x12年4月，A公司发布公告称，经公司董事会审议通过“关于公司固定资产折旧年限会计估计变更的议案”，决定调整公司固定资产预计使用寿命。其中房屋建筑物预计使用寿命从原定的20—30年调整为20—40年。A公司在公告中解释此项变更的原因为：A公司2x11年购置了一栋办公楼，该办公楼的预计使用寿命为40年。\n问题：A公司变更后的固定资产折旧年限应该从何时开始适用？\n二、会计准则及相关规定\n《企业会计准则第28号——会计政策、会计估计变更和差错更正》第八条规定：“会计估计变更，是指由于资产和负债的当前状况及预期未来经济利益和义务发生了变化，从而对资产或负债的账面价值或者资产的定期消耗金额进行的重估和调整。”第九条规定：“企业对会计估计变更应当采用未来适用法。会计估计变更仅影响变更当期的，其影响数应当在变更当期予以确认；既影响变更当期又影响未来期间的，其影响数应当在变更当期和未来期间予以确认。”\n《国际财务会计准则第8号——会计政策、会计估计变更和差错》第38段规定：“对某项会计估计变更影响采用未来适用法确认，意味着该变更适用于自估计变更日开始的交易。”\n三、案例解析\n实务中，企业普遍清楚地认识到会计估计变更应采用未来适用法，但在执行过程中，具体应该从何时开始采用变更后的会计估计仍存在不一致性。针对背景信息汇总所介绍的三种情况，我们认为应该作出不同的判断。\n1．报告年度内新增的一些资产，其特征与原资产有所不同，从而对新资产采用新的会计估计。这种情况是对新资产采用新会计估计，严格来讲并没有变更原来的会计估计。因此，应该对新资产初始确认后就采用新的会计估计，并在财务报告披露中予以体现。\n2．报告年度内发生了某一事件，导致原来赖以估计的基础发生变化。如果仅仅是由某一事件导致的会计估计变更，那么变更后的会计估计应该从该事件发生的时候开始；如果该项会计估计变更需要得到企业管理层的批准，则还需要结合会计估计变更的客观原因与管理层主观判断因素来综合考虑适用时间。\n3．随着信息和经验的积累，企业逐渐发现原来的方法已经不再适用或者不够准确，从而需要进行变更。由于是随着信息和经验的积累才发现需要对会计估计进行变更，企业很难找到某一个确切的时间点来作为估计变更的适用时间。在这种情况下，需要管理层在客观信息的基础上进行更多的主观判断和决策，因此通常应该以管理层作出改变会计估计的决定之后开始适用。为方便实务操作，新会计估计最早可以自最近一期尚未公布的定期报告（如季报、半年报）开始使用，原则上不能追溯到更早会计期间。\n本案例中，A公司原有房屋建筑物的预计使用寿命均为20—30年，而新增的办公楼预计使用寿命为40年。因此，需披露房屋建筑物的预计使用寿命为20—40年。这属于对新资产采用新的会计估计，并不是会计估计变更，应该从该办公楼达到预定可使用状态时按照40年计提折旧。\n【相关案例】\n（一）案例背景\nA公司是上市公司，2x14年12月31日发布公告称，由于A公司2x14年10月对部分车间的机器设备进行调整，以提高生产效率和机器设备的使用率。调整完成后，部分机器设备的预计使用寿命发生改变。以X设备为例，设备从M车间调整至N车间，根据N车间的生产计划，预计X设备的利用率将大幅提高，从而其预计使用寿命从10年缩短到8年，剩余使用寿命从4年缩短到2年。因此，A公司董事会决定将该机器设备的预计使用寿命从10年调整为8年。\n问题：A公司此项会计估计变更应该如何进行会计处理？\n（二）案例解析\n本案例中，由于X设备的使用方式发生了变化，导致其预计使用寿命缩短，属于某一特定事件导致的会计估计变更，应该从X设备转移到N车间使用（假定为2x14年10月1日）之后开始按照新的预计寿命计提折旧。\n此外，假设X设备原值1,000万元，预计净残值为0，截至2x14年9月30日累计折旧600万元，净值400万元，在改变了估计使用寿命之后，X设备在2x14年第4季度需计提的折旧为50万元（400万/2年x3/12），即固定资产净值在调整后的剩余年限中按直线法计提折旧，不调整以前各期折旧，也不计算累计影响数。"}, {"title": "案例10-05 差错更正的处理", "content": "一、案例背景\nA公司（2x17年至2x18年连续两年亏损，被实行退市风险警示）持有B新能源汽车公司35.82%的股权，采用权益法核算。2x19年B公司发现其2x17年度和2x18年度的部分新能源汽车采购的关键零部件发票信息与推荐目录公告不一致。A公司年报称根据工信部有关规定，该部分新能源汽车无法申报新能源汽车国家补贴，因而不能在销售当期确认国家补贴收入。B公司对前期差错进行了更正，追溯调减2x17年度营业收入及应收账款17,924万元、2x18年度营业收入及应收账款17,281万元。A公司据此亦对前期会计差错进行更正，追溯调减2x17年度长期股权投资及投资收益6,824万元、2x18年度长期股权投资及投资收益6,579万元。经调整，A公司2x19年度盈利5,620.49万元。\n问题：参股公司B公司进行前期差错更正、追溯调整以前年度财务报表，A公司据此追溯调整相关财务报表是否符合企业会计准则相关规定？\n二、案例解析\n根据《企业会计准则第2号——长期股权投资》（2014年修订）相关规定，运用权益法进行核算时，投资方取得长期股权投资后，应当按照应享有或应分担的被投资单位实现的净损益和其他综合收益的份额，分别确认投资收益和其他综合收益，同时调整长期股权投资的账面价值。被投资单位采用的会计政策及会计期间与投资方不一致的，应当按照投资方的会计政策及会计期间对被投资单位的财务报表进行调整，并据以确认投资收益和其他综合收益等。\nA公司应对B公司的财务信息进行复核，当B公司存在前期差错时，A公司应按照差错更正要求对前期财务报表进行更正调整。"}]}, {"num": 11, "name": "列报和披露", "cases": [{"title": "案例11-01 会计科目的使用与财务报表的列报", "content": "《企业会计准则——应用指南》在附录部分，依据企业会计准则有关规定，对企业的各类交易或者事项所涉及的会计科目和主要账务处理进行了全面规范。企业在不违反会计准则中确认、计量和报告规定的前提下，可以根据企业的实际情况自行增设、分拆、合并会计科目。此外，财政部还发布了一般企业财务报表格式、合并财务报表格式等报表格式，其报表项目来自《企业会计准则——应用指南》附录中的主要科H，并按照这些科H常见的余额情况在报表中相应列示。\n在实务中，一些上市公司教条地使用报表格式，简单地认为会计科目使用与财务报表列报科目应该完全一致，导致财务报表并未按照《企业会计准则——基本准则》的原则和《企业会计准则第30号——财务报表列报》（2014年修订）的要求进行列报。\n一、案例背景\nA公司为上市公司。该公司2x18年预付给供应商1,000万元用于进口某台机器设备。2x18年12月31日，该机器设备尚未到货。A公司查阅了《企业会计准则——应用指南》附录中的会计科目账务处理，注意到“1123 预付账款”中指出“企业进行在建工程预付的工程价款，也在本科目核算”。A公司因此将该笔1,000万元的预付设备采购款在“预付账款”科目进行核算。在编制2x18年年度财务报表时，由于一般企业财务报表格式将“预付款项”作为一个单独的报表项目列示于流动资产，因此，A公司将这1,000万元预付设备款包含在流动资产中的“预付款项”中进行列报。\n问题：用于购建固定资产的预付款项在资产负债表中应该如何列报？\n二、会计准则及相关规定\n《企业会计准则——基本准则》规定：“资产是指企业过去的交易或者事项形成的、由企业拥有或者控制的、预期会给企业带来经济利益的资源。”“负债是指企业过去的交易或者事项形成的、预期会导致经济利益流出企业的现时义务。”\n《企业会计准则第30号——财务报表列报》（2014年修订）第十七条规定：“资产满足下列条件之一的，应当归类为流动资产：\n（一）预计在一个正常营业周期中变现、出售或耗用。\n（二）主要为交易目的而持有。\n（三）预计在资产负债表日起一年内变现。\n（四）自资产负债表日起一年内，交换其他资产或清偿负债的能力不受限制的现金或现金等价物。”\n《企业会计准则第30号——财务报表列报》（2014年修订）第十九条规定：“负债满足下列条件之一的，应当归类为流动负债：\n（一）预计在一个正常营业周期中清偿。\n（二）主要为交易目的而持有。\n（三）自资产负债表日起一年内到期应予以清偿。\n（四）企业无权自主地将清偿推迟至资产负债表日后一年以上。负债在其对手方选择的情况下可通过发行权益进行清偿的条款与负债的流动性划分无关。”\n三、案例解析\n首先，企业不能仅仅根据日常核算时所使用的会计科目来决定资产负债表中的列报。《企业会计准则——应用指南》的附录只是对企业的会计科目设置和日常会计核算提供指引。企业编制财务报表、确定资产分类时，应该结合实际情况，按照《企业会计准则第30号——财务报表列报》（2014年修订）中关于资产/负债流动性分类的原则进行综合考虑。\n其次，用于购建固定资产的预付款项应该列报为流动资产还是非流动资产的问题，实务中存在不同的观点。\n一种观点认为，如何列报预付工程设备款应该取决于预付款结转为其所购买的资产的时间。如果预付款预计将在未来一年（或者一个营业周期）之内结转为其他资产，则预付款应作为流动资产列报，否则，应作为非流动资产列报。\n另一种观点认为，判断预付款作为流动资产还是非流动资产列报应该依据该预付款所购买的标的资产的类别来决定。例如，为购买存货而支付的预付款应当列报为流动资产，而为购买固定资产而支付的预付款则应该列报为非流动资产。\n根据《企业会计准则第30号——财务报表列报》（2014年修订）的有关规定，预计在资产负债表日起一年内或一个正常营业周期中变现、出售或耗用的资产为流动资产。从预付账款的性质分析，企业显然不是为了出售或耗用的目的而持有预付账款，因此在考虑预付款项的分类时，应当重点分析其“变现”的时间。我们认为，这里的“变现”并不是指将该项资产处置后收回现金，而是指该项资产的经济利益的预期实现方式。因此，我们需要从预付账款所包含的经济利益的实现方式和时间来分析其在资产负债表中的分类。从预付账款的性质来看，预付账款是企业为了购买某项资产而预先支付的合同价款。通常情况下，企业为取得某项资产而支付预付款，在评价其经济利益时，并不会以该笔预付款是否成功地转化为其所购买的资产作为依据，而是会将其视为该项资产的一部分，分析该项资产的经济利益是否实现。例如，企业为购买存货或固定资产而支付一笔预付款，企业不会以该笔预付账款已经结转为存货或固定资产为由，认为预付账款经济利益已经实现，而是根据该款项所购买的存货的出售或耗用情况，或者所购买的固定资产的使用情况来判断该笔预付款项经济利益的实现情况。因此，预付账款经济利益的预期实现方式取决于其最终形成的资产的经济利益实现的时间及方式，在分析时不能将预付账款与其所购买的资产割裂开来。\n此外，正常情况下，企业为购买长期资产而支付的预付账款不可能在短期内变现，而是会转化为一项非流动资产，企业在未来较长的时期内使用该项非流动资产并从中获利。在这种情况下，如果将预付账款分类为流动资产，则很可能会对报表使用者产生误导，使其对企业的流动性、短期偿债能力等作出错误的评价，进而影响报表使用者的经济决策。\n因此，我们认为，为购建固定资产而预付的款项，日常会计核算时在“预付账款”科目反映，在期末编制财务报表时，应分类为非流动资产，列示于其他非流动资产中，并在附注中披露其性质。\n公司应注意区分会计核算科目与报表列报项目的差异，原则上无论企业日常核算采用什么会计科目，在编制财务报表时，均应该按照《企业会计准则第30号——财务报表列报》（2014年修订）中关于流动性与非流动性的划分原则进行判断，合理确定相关项目在财务报表中的列报方式。"}, {"title": "案例11-02 现金流量的分类", "content": "现金流量表反映了企业一定期间现金和现金等价物的流入和流出。根据企业业务活动的性质和现金流量的来源，将现金流量分为经营活动、投资活动和筹资活动的现金流量，有利于帮助财务报表使用者评价企业获取现金的能力并预测企业未来的现金流量，并且从现金流量的角度了解企业收益的质量，从而为分析和判断企业的财务前景提供有用信息。\n《企业会计准则第31号——现金流量表》对于现金流量分类进行了系统规范。实务中，企业在编制现金流量表时，由于某些交易的性质较为特殊，可能导致不同企业对其所产生的现金流量的分类存在不同判断，不利于报表使用者对企业作出恰当的价值判断。\n一、案例背景\nA公司为上市公司，2x11年8月，A公司因销售商品取得6个月到期的银行承兑汇票1,000万元。为了加快资金回笼，A公司于2x11年12月31日将该票据贴现，取得现金995万元。\n问题：A公司在编制2x11年度现金流量表时，因贴现银行承兑汇票而取得的现金995万元应该如何进行分类？\n二、会计准则及相关规定\n《企业会计准则第31号——现金流量表》第二条规定：“现金流量表，是指反映企业在一定会计期间现金和现金等价物流入和流出的报表。现金，是指企业库存现金以及可以随时用于支付的存款。现金等价物，是指企业持有的期限短、流动性强、易于转换为已知金额现金、价值变动风险很小的投资。”\n《企业会计准则第31号——现金流量表》指出：“现金流量表应当分别经营活动、投资活动和筹资活动列报现金流量。其中，投资活动是指企业长期资产的购建和不包括在现金等价物范围内的投资及其处置活动，例如购建长期资产、对外投资、取得投资收益等；筹资活动是指导致企业资本及债务规模和构成发生变化的活动，例如吸收投资、取得借款、偿还债务和分配利润等；经营活动则是指企业投资活动和筹资活动以外的所有交易和事项，例如采购、销售商品、支付工资以及支付各项税费等。”\n三、案例解析\n根据现金流量表准则的有关要求，企业的业务活动按照其性质不同而被分类为经营活动、投资活动和筹资活动，不同业务活动产生的现金流量也依据其来源不同而被分类为经营活动现金流量、投资活动现金流量和筹资活动现金流量。企业在编制现金流量表时，应当首先根据现金流量表准则给出的原则区分产生该现金流量的业务活动的性质，进而确定现金流量的分类。\n在本案例中，企业的应收票据一般是通过销售商品或提供劳务取得的，如果不提前贴现，而是持有至到期再进行承兑，其现金流入通常可认定为与经营活动有关的现金流量。然而，在票据到期之前，对于将其向银行贴现取得现金流量的分类，实务中一直存在不同的观点。\n一种观点认为，票据贴现产生的现金流入应当作为筹资活动的现金流量，因为其实质是企业为了提前收回资金而向银行进行融资的行为。特别是在银行承兑汇票附有追索权，且在贴现时由于风险报酬没有转移而不符合终止确认条件的情况下，票据贴现通常会被视为企业以票据质押的方式向银行进行融资，相应取得的现金在资产负债表中会被确认为短期借款。根据《企业会计准则第31号——现金流量表》的有关规定，筹资活动是指导致企业资本及债务规模和构成发生变化的活动，取得借款属于企业的筹资活动，因此应收票据贴现取得的现金流量属于取得借款收到的现金，从而被分类为筹资活动的现金流量，这样的处理方式也能够使现金流量表与资产负债表的处理保持一致。\n然而，如果按照上述逻辑将应收票据贴现产生的现金流量归类为筹资活动产生的现金流量，可能会产生两方面问题：\n1．和一般的筹资活动不同，该“借款”在“归还”时并不会产生现金流出，而是将短期借款和应收票据相互抵销。\n2．在企业大量使用商业汇票进行结算并贴现的情况下，其经营活动产生的现金流量将相对很少。\n由于企业在编制现金流量表时不能对现金流量进行虚拟，因此上述两个问题很可能导致这样一个结果：每个会计期间，企业因销售商品确认的销售收入对应的现金（不考虑贴现息）虽然已经收回，但是在现金流量表中，因销售商品这一最重要的经营活动产生的现金流入却很少，而筹资活动的现金流入却很大，而且该筹资活动现金流入在未来不会有对应的现金流出。在这种情况下，现金流量表所表示的信息意味着该企业通过经营活动获取的现金流入的能力很差，日常经营所需的资金大部分需要通过筹资来实现，但这未必反映了企业经营模式的实质，也会使财务报表使用者在评价企业时产生误解。\n基于上述考虑，实务中另一种观点认为，票据贴现产生的现金流入应当作为经营活动的现金流量，因为无论是票据到期收回现金还是向银行贴现而提前收回现金，该现金流量的产生都是源于企业销售商品的行为。销售商品是企业的经营活动，因此其产生的现金流量也应当分类为经营活动产生的现金流量。\n这一列报方式能够避免上述第一种观点所导致的问题，但是也有其弊端。例如，如前所述，在贴现的票据不符合终止确认条件的情况下，因票据贴现取得的现金在资产负债表中会被确认为短期借款。此时，从报表之间相互勾稽的角度来看，如果在现金流量表中将其分类为经营活动产生的现金流量，则意味着把借款取得的现金分类为经营活动，显然与现金流量表的规定不符。另外，在某些情况下，如果企业确实因融资需求，而将持有的票据向银行贴现以取得现金，那么将票据贴现产生的现金全部作为经营活动的现金流量也没有反映该交易的经济实质。\n综上所述，在应收票据贴现且不符合金融资产终止确认条件的情况下，贴现现金流作为筹资活动流入似乎更符合准则中筹资活动的定义；在应收票据贴现符合金融资产终止确认条件的情况下，相关现金流入作为经营活动流入更能够反映其经济实质，也更符合准则规定。\n【相关案例】如何在现金流量表中反映定期存单的质押与解除质押业务\n（一）案例背景\nA公司为上市公司。2x11年出于资金管理需要，公司将其持有的2,000万元定期存单进行质押，获取短期流动借款2,000万元，借款期限为两个月。借款到期后，相关定期存单依约解除质押。\n问题：A公司在编制2x11年度现金流量表时，应如何反映上述定期存单的质押与解除质押业务？\n（二）案例解析\n首先要对定期存单的性质作出判断，即企业持有的定期存款本身是否存在限制、是否能够随时支取，这对于定期存单是否属于现金和现金等价物的判断有显著影响。如果定期存单存在上述限制则不应将其作为现金或现金等价物，在此情况下，无论是将定期存单质押或解除质押，并不会引起其性质的变化，也不会产生现金流量。但企业出于支付目的而持有的定期存款，如果可以随时支取且不存在限制，则其符合现金及现金等价物的定义。一旦将此类定期存款用于质押，由于后续不再能够随时用于支付，其性质将发生改变，不再满足被划分为现金及现金等价物的条件，将对企业现金流量产生影响。同理，相关定期存款的质押解除将使其重新符合企业会计准则对于现金及现金等价物的定义，其性质转变的同时将产生现金流量。\n另外，在判断相关活动产生的现金流量的归属时，应根据企业所属行业的特点对相关活动的类型进行判断。例如金融行业通过定期存款质押获取短期借款的活动相关现金流量被分类为经营活动现金流量，而非金融企业则可能被分类为筹资活动现金流量。"}, {"title": "案例11-03 非经常性损益", "content": "2023年，证监会修订发布了《公开发行证券的公司信息披露解释性公告第1号——非经常性损益（2023年修订）》（证监会公告〔2023〕65号，以下简称《1号解释性公告》），本次修订旨在解决原有规定执行过程中存在的突出问题，并与市场发展情况以及有关法规和监管规则的变化相适应。\n修订后的《1号解释性公告》相较原规定，主要进行了四方面内容更新：一是新增三项非经常性损益判断原则，明确非经常性损益应基于交易和事项的经济性质、结合行业特点和业务模式、遵循重要性原则进行认定，为公司恰当披露非经常性损益信息提供指引。二是明确实际执行中存在争议的问题，如规定公司因经营活动不再持续，或因税收、会计等法律法规调整等而对当期损益产生的一次性影响，应计入非经常性损益，减少实务执行争议。三是完善政府补助、金融资产、股份支付相关非经常性损益列举项目，明确相关业务损益计入非经常性损益的标准，帮助投资者恰当评价公司持续经营能力，提升财务信息披露规则与当前资本市场环境、发展阶段之间的契合性。四是结合近年《企业会计准则》和监管规则修订情况，完善《1号解释性公告》相关表述，在股份支付、交易价格显失公允的交易损益等列举项目上，与上市发行、退市环节有关要求保持一致。\n在《1号解释性公告》修订发布后，企业在认定非经常性损益时，应根据非经常性损益的定义，并结合三项非经常性损益判断原则进行综合分析，而不能机械式地将非经常性损益等同于《1号解释性公告》中所列举的项目。\n一、案例背景\n近年来，新上市公司因募集资金产生的利息收入普遍较上市前有较大增长，并且对公司当年利润贡献也较大。公司财务费用中的利息收入来源有两个途径：一是银行存款，二是资金拆借。创业板对于新上市公司严格的监管杜绝了拆借资金的可能性，募集资金存款成为利息收入大涨的主要原因。由于对存量募集资金高风险投资的监管限制，新上市公司纷纷采用定期存款、协定存款和通知存款（以下简称定期存款）等形式予以存放，其目的是在合规前提下，获取尽可能高于活期存款利息的收益。募集资金定期存款利息为一些新上市公司带来了一笔“外快”收入。\n问题：募集资金定期存款利息是否属于非经常性损益？\n二、会计准则及相关规定\n《公开发行证券的公司信息披露解释性公告第1号——非经常性损益（2023年修订）》规定：\n“一、非经常性损益的定义\n非经常性损益是指与公司正常经营业务无直接关系，以及虽与正常经营业务相关，但由于其性质特殊和偶发性，影响报表使用人对公司经营业绩和盈利能力作出正常判断的各项交易和事项产生的损益。”\n二、非经常性损益的界定，应以非经常性损益的定义为依据。在界定非经常性损益项目时，应遵循以下原则：\n（一）非经常性损益的认定应基于交易和事项的经济性质判断；\n（一）非经常性损益的认定应基于行业特点和业务模式判断；\n（三）非经常性损益的认定应遵循重要性原则。\n三、非经常性损益通常包括以下项目：\n（一）非流动性资产处置损益，包括已计提资产减值准备的冲销部分；\n（二）计入当期损益的政府补助，但与公司正常经营业务密切相关、符合国家政策规定、按照确定的标准享有、对公司损益产生持续影响的政府补助除外；\n（三）除同公司正常经营业务相关的有效套期保值业务外，非金融企业持有金融资产和金融负债产生的公允价值变动损益以及处置金融资产和金融负债产生的损益；\n（四）计入当期损益的对非金融企业收取的资金占用费；\n（五）委托他人投资或管理资产的损益；\n（六）对外委托贷款取得的损益；\n（七）因不可抗力因素，如遭受自然灾害而产生的各项资产损失；\n（八）单独进行减值测试的应收款项减值准备转回；\n（九）企业取得子公司、联营企业及合营企业的投资成本小于取得投资时应享有被投资单位可辨认净资产公允价值产生的收益；\n（十）同一控制下企业合并产生的子公司期初至合并日的当期净损益；\n（十一）非货币性资产交换损益；\n（十二）债务重组损益；\n（十三）企业因相关经营活动不再持续而发生的一次性费用，如安置职工的支出等；\n（十四）因税收、会计等法律、法规的调整对当期损益产生的一次性影响；\n（十五）因取消、修改股权激励计划一次性确认的股份支付费用；\n（十六）对于现金结算的股份支付，在可行权日之后，应付职工薪酬的公允价值变动产生的损益；\n（十七）采用公允价值模式进行后续计量的投资性房地产公允价值变动产生的损益；\n（十八）交易价格显失公允的交易产生的收益；\n（十九）与公司正常经营业务无关的或有事项产生的损益；\n（二十）受托经营取得的托管费收入；\n（二十一）除上述各项之外的其他营业外收入和支出；\n（二十二）其他符合非经常性损益定义的损益项目。”\n三、案例解析\n非经常性损益的界定，一方面必须考虑其定义中的三个要素，即“与正常经营业务的相关性”“性质特殊和偶发性”“体现公司正常的经营业绩和盈利能力”，同时还要根据三项判断原则在结合公司实际情况的基础上，参考列举的项目，综合进行判断。简单地把规则列举的项目认定为非经常性损益，或者把规则中未列举的项目认定为经常性损益都可能存在问题。规则允许并强调公司可以在考虑定义、列举项目和实际情况的基础上，把规则中列举项目认定为经常性损益，或者把规则中未列举项目认定为非经常性损益。如果公司把规则中列举项目认定为经常性损益的，应当在附注中披露规则中已列举但未被公司认定为非经常性损益项目的名称、金额及原因。如果公司把规则中未列举的项目认定为非经常性损益的，若金额不重大，应将其计入“其他符合非经常性损益定义的损益项目”列报，若金额重大，则应单列其项目名称和金额；同时，还应在附注中披露该项目名称、金额及原因。\n在本案例中，单独从募集资金产生定期存款利息的性质来看，的确与上市公司日常经营活动无关，从募集资金利息的发生频率来看，也确实存在偶发性的特点。\n但是，上市公司发行股份募集资金，本质上属于一种融资行为，一方面增加上市公司的资产，另一方面增加其股本和资本公积。在募集资金投入使用之前，以定期存款的方式产生利息收入，其收益率为定期存款利率；在募集资金被用于募投项目并投产之后，带来项目投资收益。两者只是资产以不同的形态存在从而带来不同的收益。而且，相比之下，定期存款的利率还很可能相对较低。\n此外，从净资产收益率、每股收益等指标来看，在上市公司发行股份募集资金之后，作为分母的净资产账面价值与股份数都有所增加，如果将募集资金产生的存款利息收入从分子中扣除，反而会导致不匹配的结果。\n综上所述，募集资金的利息在使用之前产生的定期存款利息不属于非经常性损益。\n【相关案例之一】增值税退税款是否属于非经常性损益\n（一）案例背景\nA公司为上市公司，主营业务收入主要来自电子信息数据软件销售和服务。根据国家税务总局于2011年10月印发的《关于软件产品增值税政策的通知》（财税〔2011〕100号）的相关规定，经国家有关税务部门审核批准，A公司享受如下增值税优惠政策：销售自行开发生产的软件产品按17%的法定税率征收增值税后，对增值税实际税负超过3%的部分实行即征即退。A公司已于报告期内收到2x11年软件产品增值税退税款5,000万元，作为政府补助计入2x11年营业外收入，作为经常性损益。\n问题：A公司收到的增值税退税款是否属于非经常性损益？\n（二）案例解析\n增值税退税是否属于非经常性损益，由于在非经常性损益的列举项目中，仅仅排除了“与公司正常经营业务密切相关、符合国家政策规定、按照确定的标准享有、对公司损益产生持续影响的政府补助”，所以这里判断的关键是：（1）增值税退税是否与公司正常经营业务密切相关；（2）是否属于按确定的标准享有、对公司损益产生持续影响的政府补助。\n首先，是否与公司正常经营业务密切相关。由于A公司的主营业务就是软件销售，因此与软件销售相关的增值税退税与公司正常经营业务密切相关。\n其次，是否属于按确定的标准享有、对公司损益产生持续影响的政府补助。非经常性损益判断标准侧重于此项政府补助是否属于国家持续的产业政策扶持，是否具有可持续性。A公司所收到的增值税退税与其主营业务密切相关、金额可确定（当期已经收到）且对公司损益产生持续影响，应该能够体现公司正常的经营业绩和盈利能力，因此应属于经常性损益。\n【相关案例之二】与取得政府补助直接相关的费用是否应计入非经常性损益\n（一）案例背景\n2x13年1月，A公司受邀参与国家某科研项目，国家因此给予A公司一定的补助，金额为100万元，用于补偿其以后发生的相关费用，假设符合政府补助定义，A公司将这100万元计入递延收益。2x13年，A公司因从事该科研项目的研发活动而发生相关费用120万元，计入当期损益。按照《企业会计准则第16号——政府补助》的相关规定，A公司将相关政府补助从递延收益转入当期损益（其他收益），并作为非经常性损益项目。A公司参与该科研项目所发生的相关费用仅为该项目的专项支出，如果A公司无须实施该项目，则不会发生上述费用。\n问题：A公司因从事上述科研项目的研发活动而发生的相关费用120万元，是否应作为非经常性损益项目？\n（二）案例解析\n公司在判断某事项是否属于非经常性损益时，不仅需参考《公开发行证券的公司信息披露解释性公告第1号——非经常性损益》（2023年修订）中所列举的示例，还应基于三项判断原则并结合该事项的具体情况，根据非经常性损益的定义作出判断。\n据A公司介绍，该科研项目与A公司的日常经营活动无密切关系，其可能形成的研究成果也无法直接应用于A公司的日常经营活动中。\n由于A公司所参与的该科研项目与其日常经营活动无密切关系，所发生的相关费用仅为该科研项目的专项支出，如果A公司无须实施该项目，则不会发生上述费用。因此，相关费用符合《公开发行证券的公司信息披露解释性公告第1号——非经常性损益》（2023年修订）中非经常性损益的定义，应作为非经常性损益项目。\n此外，由于《公开发行证券的公司信息披露解释性公告第1号——非经常性损益》（2023年修订）中所列举的示例没有关于上述费用的专门项目，因此，企业应将其作为“其他符合非经常性损益定义的损益项目”，并根据相关规定在附注中单独作出说明。\n【相关案例之三】汇兑损失是否属于非经常性损益\n（一）案例背景\nA公司为上市公司，2x10年A公司为进口设备而发生了日元借款，该日元借款按照期末汇率折算产生汇兑损失400万元。A公司将其作为非经常性损益，理由是汇率变动与公司的经营业务无直接关系。\nA公司年报显示，该公司取得的4年期日元借款年利率为4%，而同时取得的4年期人民币借款年利率为5.7%。\n问题：A公司上述汇兑损失是否属于非经常性损益？\n（二）案例解析\n非经常性损益的定义为“与公司正常经营业务无直接关系，以及虽与正常经营业务相关，但由于其性质特殊和偶发性，影响报表使用人对公司经营业绩和盈利能力作出正常判断的各项交易和事项产生的损益”。\nA公司因进口设备发生日元借款，属于公司正常经营过程中的固定资产投资和筹资行为，很难界定为与公司正常经营业务没有直接关系。此外，在理论上汇率波动源于两个国家的利率差。本案例中，A公司日元借款的年利率明显低于人民币借款，日元借款带来的利息费用也相应偏低，而汇率波动带来的汇兑损失在理论上和实际结果上都是对日元借款利息的调整，因此不能将二者剥离开来简单地因为日元借款汇兑损失的性质特殊就将其作为非经常性损益披露。\n【相关案例之四】资金占用费作为营业收入是否属于经常性损益\n（一）案例背景\nA公司为上市公司，根据A公司自身业务性质和营业执照范围，A公司属于非金融企业。A公司的子公司B的核心业务包含保理业务，即向客户提供一系列的销售融资、应收账款融资等综合金融服务。保理业务收入主要包括应收保理款的利息收入，实质上是向客户收取的资金占用费，一般按照融资规模的一定比例收取，因此保理服务费也作为与应收款项直接相关的费用。在B公司的财务报表中，B公司将保理业务收入作为营业收入列报。在A公司的合并财务报表中，A公司认定子公司B的保理业务属于集团日常经营活动的组成部分，也将保理业务收入列报为营业收入。\n问题：非金融企业收取资金占用费作为营业收入，是否可以作为经常性损益？\n（二）案例解析\n公司在编制合并财务报表时，应当将整个企业集团视为一个会计主体，按照统一的会计政策，反映企业集团整体财务状况、经营成果和现金流量。然而，在界定非经常性损益项目时，对于企业集团内的损益项目应基于单独公司进行判断。\n在对相关收入是否属于非经常性损益的判断过程中，上市公司自身的企业性质并不是决定性的判断因素，而仍应当从非经常性损益的定义出发，结合相关收入的具体情况进行分析和判断。同时，尽管在非经常性损益的规定中，举例提及“计入当期损益的对非金融企业收取的资金占用费”，但并不意味着资金占用费性质的收入必然属于非经常性损益，公司仍可以依据自身情况作出具体判断。\n在本案例中，如果保理业务构成A集团子公司B的核心业务，且该业务并非临时性、偶发性的，则在A公司合并财务报表中，子公司B从事保理业务取得的收入，可以作为经常性损益列报。\n【相关案例之五】企业集团中关于非经常性损益的判断\n（一）案例背景\nA公司是一家以生产制造为主业的上市公司。2x16年，A公司向独立第三方非金融企业提供银行委托贷款并按照市场利率收取资金占用费。在个别报表中，A公司将相关资金占用费作为非经常性损益进行了披露。A集团中包括一家持有金融牌照的子公司，可以提供贷款等金融服务，相关利息收入作为经常性损益进行披露。\n问题：A公司的资金占用费在合并报表中是否可以作为经常性损益？\n（二）案例解析\n根据证监会发布的《公开发行证券的公司信息披露解释性公告第1号——非经常性损益》（2023年修订）中的定义，非经常性损益是指与公司正常经营业务无直接关系，以及虽然与正常经营业务相关，但由于其性质特殊和偶发性，影响报表使用人对公司经营业绩和盈利能力作出正常判断的各项交易和事项产生的损益。同时，《公开发行证券的公司信息披露解释性公告第1号——非经常性损益》（2023年修订）提出了三项非经常性损益判断原则，并结合非经常性损益的定义，对常见的非经常性损益项目进行了列举，其中也包括本案例中对非金融企业收取资金占用费的情况。\n企业在编制合并财务报表时，应当将整个企业集团视为一个会计主体，按照统一的会计政策，反映企业集团整体财务状况、经营成果和现金流量。然而，在进行非经常性损益的判断中，对于企业集团内的损益项目应基于单独公司进行。\n在本案例中，子公司持有金融牌照从事常规性金融业务，收取的贷款利息等收入与其正常经营业务相关，可以作为经常性损益。从A公司自身业务性质来看，委托贷款业务与公司日常经营业务并无直接关系，应被划分为非经常性损益。在合并报表中，A公司向非金融企业收取的资金占用费并不能因为合并范围内有子公司存在相关经营范围而被重新划分为经常性损益。\n【相关案例之六】在等待期内分期确认的股权激励费用是否为非经常性损益\n（一）案例背景\nA公司为上市公司。2x16年A公司通过并实施了股权激励计划，设置了等待期。根据企业会计准则关于股份支付的规定，A公司将当期取得的服务计入成本或费用，在年报披露中，相关费用被披露为非经常性损益。\n问题：A公司在等待期内分期确认的股权激励费用确认为非经常性损益是否合理？\n（二）案例解析\n对于很多实施股权激励的公司而言，从其历史来看，公司并没有推出过类似计划；另外，由于单项股权激励计划涵盖一定期间，未来公司可能也不会频繁推出类似激励计划。由于上述原因，实务中有些公司认为股权激励计划具有一定的偶发性并且性质也具有一定的特殊性，将相关费用确认为非经常性损益。\n虽然在支付对价的方式上，股权激励计划是以股权工具或基于股权工具而确定的金额支付，与常见的工资、奖金等职工薪酬的形式存在差异。但是，无论是职工薪酬还是股权激励都仅是为了同一目的而采取的不同形式，根本上还是企业为获取职工服务而支付的对价，是与企业人工相关的费用。企业雇佣员工产生相应人工费用属于企业正常经营所必需的，并不符合非经常性损益的定义。因此，不应因股权激励采取的对价形式而将相关费用作为非经常性损益。\n【相关案例之七】商誉减值是否属于非经常性损益\n（一）案例背景\nA公司以2x13年6月30日为收购基准日，非同一控制下收购标的公司80%股权，转让款分两期支付，A公司以现金支付了第一期价款，第二期股权转让价款的金额根据未来盈利状况确定的最终交易总金额计算。并购日，公司基于对标的公司未来业绩的预测，确认了第二期股权应付款。由于标的公司2x13年和2x14年利润未达到承诺，第二期股权转让价款无须支付。2x14年年末A公司将第二期股权应付款结转至损益，此外计提了商誉减值准备。\n问题：因重组标的业绩未达承诺计提的商誉减值是否属于非经常性损益？\n（二）案例解析\n并购重组实务中，交易标的出售方一般会对交易完成后交易标的在一定期间的利润作出承诺。在标的资产未按预期实现承诺利润时，出售方会以股份或现金方式给予上市公司补偿。由于补偿仅针对并购重组交易完成后的特定期间，正常经营情况下，企业取得业绩补偿款不具有持续性，根据《公开发行证券的公司信息披露解释性公告第1号——非经常性损益》（2023年修订）的规定应确认为非经常性损益。同时，因并购重组产生的商誉，其减值与企业的其他长期资产（例如固定资产、无形资产等）减值性质相同，属于企业日常经营活动产生，应作为企业的经常性损益。\n【相关案例之八】房地产企业出售项目公司股权是否构成非经常性损益\n（一）案例背景\nA地产公司（以下简称A公司）于2x17年发生了以下两项交易：\n交易一：2x17年3月3日与B信托公司（以下简称B信托）签署股权转让协议，将全资子公司C公司100%的股权转让给B信托公司。C公司的主要资产为持有D公司65%的股权并拥有实际控制权。D公司主要资产为北京某商业大厦，其中部分出租部分自用（合并报表层面，自用部分作为固定资产和无形资产核算，出租部分作为投资性房地产核算）。A公司与B信托公司于2x17年7月3日完成C公司100%股权交割。A公司出售C公司100%股权形成投资收益2.03亿元。A公司把与商业大厦项目中自用部分的固定资产及无形资产相关的股权投资收益金额0.26亿元作为非经常性损益列示，将与出租部分的投资性房地产（以公允价值计量）科目相关的股权处置损益1.77亿元作为经常性损益列示。\n交易二：2x17年5月15日，A公司与甲公司签订股权转让协议，将其所持乙公司的100%股权转让给甲公司。乙公司主要资产为天津市某住宅项目100%权益，该项目包含M和B两地块。M地块一期已基本售罄，M地块二期已经取得土地使用权证，尚未开始建设。B地块已经取得土地使用权证、工程规划许可证和施工许可证，但自2x13年停工至今。本次股权出售于2x17年8月15日完成交割，A公司获得投资收益3.06亿元。A公司将出售乙公司100%股权取得的投资收益3.06亿元作为经常性损益列示。\n问题：A公司对于上述交易产生的损益是否属于非经常性损益？\n（二）案例解析\n房地产企业以转让子公司股权的形式转让一项物业资产时，在个别财务报表层面，相关处置损益会体现为股权处置损益，在投资收益中反映，该投资收益是作为经常性还是非经常性损益项目，目前实务中有两种处理观点：\n观点一：由于处置的是项目公司股权，属于《公开发行证券的公司信息披露解释性公告第1号——非经常性损益》（2023年修订）所列举的非经常性损益项目的“非流动性资产处置损益”，因此应当作为非经常性损益。\n观点二：不能简单地认为，只要处置公司股权，相关损益就一概列为非经常性损益，而应视具体案例结合非经常性损益定义具体分析。就房地产行业而言，出于税收或者其他一些因素的考虑，通过转让股权的方式实现对房地产存货或物业资产的转让，在实务中也很常见。公司应穿透该股权形式，根据项目公司所开发基础资产的性质和类别，分析该项转让是否与公司常规业务相同。通常而言，基础资产在合并财务报表可能的资产类别包括存货（原材料、半成品和产成品）、固定资产/无形资产、投资性房地产。如果公司常规业务是房地产项目开发完成后出售，则通过转让股权方式把一项待开发的土地使用权和部分开发成本一次性出售所取得的投资收益，应当作为非经常性损益。这与处置固定资产或者投资性房地产等长期资产适用的判断类似。但是，如果转让股权所对应的基础资产实质上是已开发完成的房屋存货，并且出售开发完的房屋属于公司的常规业务，则股权处置损益应列为经常性损益，公司应提供充足的证据（例如近些年出售类似项目子公司股权的频率足够高、金额足够大）证明其为常规业务，且出售项目公司股权为该公司的正常盈利模式，此情况下可作为经常性损益。\n上述观点二更符合《公开发行证券的公司信息披露解释性公告第1号——非经常性损益》（2023年修订）设立的原则。\n【相关案例之九】重组费用（如中介机构服务费）能否作为非经常性损益\n（一）案例背景\nT公司拟向某企业发行股份购买资产实施重大资产重组。T公司委托一家会计师事务所对重组期间的财务报表进行审计，委托一家证券公司作为本次重组的独立财务顾问。\n问题：券商、会计师等中介机构服务费能否作为非经常性损益？\n（二）案例解析\n《公开发行证券的公司信息披露解释性公告第1号——非经常性损益》（2023年修订）并未就该类费用支出的认定进行简单列举，企业需紧密围绕非经常性损益的定义，基于三项判断原则来考虑该项损益与企业的正常经营业务有无直接关系。\n并购重组是企业的正常经营活动，涉及的资产也属于经营性资产，券商、会计师等中介机构的费用是发生此类交易的必要合理支出，列为经常性损益项目更为合适。\n【相关案例之十】低价取得商住地块处置收益能否认定为经常性损益\n（一）案例背景\n甲公司系公路港基础设施及公路物流平台运营商，致力于打造包括全国化城市物流中心、智能化系统、支付平台三大基础设施在内的覆盖全国、互联互通的中国物流供应链服务平台。目前甲公司在全国各地投资运营和在建的公路港已达56个，另有数十个项目仍在洽谈中。各地公路港项目中有47个项目的盈利中包含“配套低价商住地块项目的补助收益”，是指当地政府为了吸引公路港项目在当地投资建设而以低于市场价给予的配套商住地块的开发收益。出于主业聚焦与专业定位，甲公司一般会将商住地块项目引入专业地产商进行项目合作，以合作开发、股权转让等形式实现项目收益。会计处理上作为股权转让投资收益等处理。\n近年来，地方财政在对公路港项目进行补贴时，地方政府较多采用低价转让配套商住地块的形式。因此，甲公司在2x19年度因转让低价取得的商住地块的收益较以前年度有显著增加。2x17年度、2x18年度和2x19年度，基于上述商业模式甲公司实现（或预计实现）的商住地补贴收益情况如表11-1所示。\n表11-1 甲公司实现（或预计实现）的商住地补贴收益单位：万元\n盈利来源报表项目明细项目2x17年度2x18年度2x19年度\n商住地补贴营业收入、成本合作开发收入、成本①15,869.8210,393.77928.30\n商住地补贴投资收益股权转让收益②146.80-43,337.11\n商住地补贴合计16,016.6210,393.7744,265.41\n\n注：①在以往年度作为经常性损益列报（公司正常经营业务）。\n②在以往年度作为非经常性损益列报。\n（二）案例解析\n根据《企业会计准则第16号——政府补助》准则规定，与企业日常活动相关的政府补助，应当按照经济业务实质，计入其他收益或冲减相关成本费用。与企业日常活动无关的政府补助，应当计入营业外收支。2018年2月22日，财政部发布了《关于政府补助准则有关问题的解读》，对日常活动予以界定。该解读指出，通常情况下，若政府补助补偿的成本费用是营业利润之中的项目，或该补助与日常销售等经营行为密切相关（如增值税即征即退等），则认为该政府补助与日常活动相关，并同时明确“其他收益”科目核算总额法下与日常活动相关的政府补助以及其他与日常活动相关且应直接计入该科目的项目。政府补助准则的修订表明企业的日常活动是个比较宽泛的概念，且与之相关的政府补助也从营业外利润移至营业利润中列示，即计入其他收益。\n《公开发行证券的公司信息披露解释性公告第1号——非经常性损益》（2023年修订）将计入当期损益的政府补助认定为非经常性损益，但与公司正常经营业务密切相关、符合国家政策规定、按照确定的标准享有、对公司损益产生持续影响的政府补助除外。如果企业选择按净额法对政府补助进行会计处理，政府补助对净利润的影响将分布在成本费用等科目，给计算非经常性损益带来较大的难度。我们认为，在现阶段实务操作中，如果计入当期损益的政府补助与公司正常经营活动相关且是公司商业盈利模式的一部分，则可认定为经常性损益。\n在本案例中，公司到目前为止共投资建设的56个公路港项目中，共有47个项目获得了配套商住地块补助收益，则表明该类投资是公司的正常经营活动。而商业盈利模式应结合公司在投资时的可行性分析报告进行分析，如果配套商住地块补助收益是公司的公路港投资盈利模式的重要组成部分，其有无、多寡，是影响投资决策的主要决定性因素，则表明该类政府补助是公司商业盈利模式的一部分，可认定为经常性损益，否则应认定为非经常性损益。\n【相关案例之十一】递延所得税计提比例调整是否属于非经常性损益\n（一）案例背景\nX公司在2x16年至2x18年期间被认定为高新技术企业，执行的所得税税率为15%。公司高新技术企业认定证书在2x19年10月到期后再次申报尚未获得认定，因此，公司在2x19年年报中执行的所得税税率为25%。\n2x18年末，X公司因资产减值和未实现的内部交易所形成的可抵扣暂时性差异余额为40,965,212.02元，按15%税率确认递延所得税资产6,144,781.80元。2x19年末，因资产减值和未实现的内部交易所形成的可抵扣暂时性差异余额为41,094,831.31元，按25%税率确认的递延所得税资产为10,273,707.83元，为此，公司2x19年度确认的递延所得税费用为-4,128,926.03元。\n问题：针对所得税税率变动导致的递延所得税费用变动金额，X公司是否应将其作为“根据税收、会计等法律、法规的要求对当期损益进行一次性调整对当期损益的影响”项目列入非经常性损益？\n（二）案例解析\n根据《企业会计准则第18号——所得税》的规定，确认递延所得税资产时，应当以预期收回该资产期间的适用所得税税率为基础计算确定。\n公司应结合导致高新资质发生变化的事项性质进行判断，若高新资质的变化属于因国家高新政策调整使得公司不满足相应要求、未来期间适用25%所得税税率的，公司应比照“因税收、会计等法律、法规的调整对当期损益产生的一次性影响”，将一次性调整部分金额作为非经常性损益；若属于公司自身生产经营变化导致不再满足国家高新政策的，公司不应将递延所得税资产的调整变化金额列报为非经常性损益。\n同时，公司在各个年度确认递延所得税资产时，应根据未来可获得的应纳税所得额，合理考虑可抵扣暂时性差异未来转回时的适用税率，不应简单将相关差异金额在不满足高新技术企业要求的年度时进行一次性调整（即确认递延所得税资产时应考虑可抵扣暂时性差异转回的时间及适用的税率情况）。"}]}, {"num": 12, "name": "合并财务报表", "cases": [{"title": "案例12-01 涉及委托经营管理时合并范围的确定", "content": "一、案例背景\nA公司为上市公司，B公司原为国有企业，当地国资委于2x11年与C公司签订协议，将B公司主要房屋、建筑物和机器设备等资产确定为实收资本，注册成立D公司并委托C公司在授权范围内组织日常生产经营和管理活动，但D公司的相关活动仍需要得到委托方，即当地国资委的批准。C公司对D公司的经营权为10年，从2x11年11月开始计算。D公司生产经营产生的利润或亏损，由C公司享有或承担40%，B公司享有或承担60%。B公司投入的注册资本完全由B公司享有，C公司不享有该部分资产的产权。\n经有关部门批准，A公司与C公司签订协议，A公司吸收合并C公司。吸收合并后，A公司未对D公司进行投资，但通过C公司与D公司的原协议持有D公司40%的收益权，而D公司的产权仍由B公司及当地国资委管理。\n2x14年12月，A公司与当地国资委签订《产权转让合同》，受让D公司全部产权，包括由当地国资委持有的D公司终极产权，以及当地国资委享有的D公司60%收益权和C公司享有的D公司40%收益权。对于D公司账面净资产与A公司投资成本之间的差额，A公司认为：C公司原组织、管理、控制D公司的生产经营，C公司对D公司形成控制。在A公司吸收合并C公司后继承了原C公司享有的对D公司的经营权和40%收益权，因此，A公司对D公司形成控制。A公司可以比照购买子公司其他股东持有的股权的核算原则，将上述差异冲减合并报表的资本公积。\n问题：A公司的上述会计处理是否正确？\n二、会计准则及相关规定\n《企业会计准则第33号——合并财务报表》（2014年修订）第七条对“控制”的定义如下：“控制是指投资方拥有对被投资方的权力，通过参与被投资方的相关活动而享有可变回报，并且有能力运用对被投资方的权力影响其回报金额。”\n《企业会计准则第33号——合并财务报表》（2014年修订）第十三条与第十四条进一步对表决权比例超过半数和未超过半数的情形作出了原则性规定：\n“第十三条 除非有确凿证据表明其不能主导被投资方相关活动，下列情况，表明投资方对被投资方拥有权力：\n（一）投资方持有被投资方半数以上的表决权的。\n（二）投资方持有被投资方半数或以下的表决权，但通过与其他表决权持有人之间的协议能够控制半数以上表决权的。\n第十四条 投资方持有被投资方半数或以下的表决权，但综合考虑下列事实和情况后，判断投资方持有的表决权足以使其目前有能力主导被投资方相关活动的，视为投资方对被投资方拥有权力：\n（一）投资方持有的表决权相对于其他投资方持有的表决权份额的大小，以及其他投资方持有表决权的分散程度。\n（二）投资方和其他投资方持有的被投资方的潜在表决权，如可转换公司债券、可执行认股权证等。\n（三）其他合同安排产生的权利。\n（四）被投资方以往的表决权行使情况等其他相关事实和情况。”\n《企业会计准则第33号——合并财务报表》（2014年修订）第十八条、第十九条引入了关于拥有决策权的投资者是委托人还是代理人的判断指引：\n“第十八条 投资方在判断是否控制被投资方时，应当确定其自身是以主要责任人还是代理人的身份行使决策权，在其他方拥有决策权的情况下，还需要确定其他方是否以其代理人的身份代为行使决策权。\n代理人仅代表主要责任人行使决策权，不控制被投资方。投资方将被投资方相关活动的决策权委托给代理人的，应当将该决策权视为自身直接持有。\n第十九条 在确定决策者是否为代理人时，应当综合考虑该决策者与被投资方以及其他投资方之间的关系。\n（一）存在单独一方拥有实质性权利可以无条件罢免决策者的，该决策者为代理人。\n（二）除（一）以外的情况下，应当综合考虑决策者对被投资方的决策权范围、其他方享有的实质性权利、决策者的薪酬水平、决策者因持有被投资方中的其他权益所承担可变回报的风险等相关因素进行判断。”\n《企业会计准则第33号——合并财务报表（应用指南）》（2014年修订）对控制关系中的“委托人”和“代理人”给出了进一步的指引：“代理人是相对于主要责任人而言的，代表主要责任人行动并服务于该主要责任人的利益。主要责任人可能将其对被投资方的某些或全部决策权授予代理人，但在代理人代表主要责任人行使决策权时，代理人并不对被投资方拥有控制。主要责任人的权力有时可以通过代理人根据主要责任人的利益持有并行使，但权力行使人不会仅仅因为其他方能从其行权中获益而成为代理人。在判断控制时，代理人的决策权应被视为由主要责任人直接持有，权力属于主要责任人而非代理人，因此，投资方应当将授予代理人的决策权视为自己直接持有的决策权，即使被投资方有多个投资方且其中两个或两个以上投资方有代理人。”\n三、案例解析\n控制是指投资方拥有对被投资方的权力，通过参与被投资方的相关活动而享有可变回报，并且有能力运用对被投资方的权力影响其回报金额。从这个定义可以看出其核心要素包含以下三个部分：\n1．投资方拥有对被投资方的权力。投资方享有现时权利使其目前有能力主导被投资方的相关活动，而不论其是否实际行使该权利，视为投资方拥有对被投资方的权力。\n2．投资方对被投资方享有可变回报。投资方自被投资方取得的回报可能会随着被投资方业绩变动而变动的，视为享有可变回报。投资方应当基于合同安排的实质而非回报的法律形式对回报的可变性进行评价。\n3．投资方有能力运用对被投资方的权力影响其回报金额。关于控制的内容，实务中存在一定的困惑，投资者需要对所有事项都有决定权还是仅仅对部分事项拥有决定权即可判断为存在控制，究竟哪些决策属于“财务和经营政策”的范畴。投资方应当在综合考虑所有相关事实和情况的基础上对是否控制被投资方进行判断。一旦相关事实和情况的变化导致对控制定义所涉及的相关要素发生变化的，投资方应当进行重新评估。相关事实和情况主要包括：（1）被投资方的设立目的；（2）被投资方的相关活动以及如何对相关活动作出决策；（3）投资方享有的权利是否使其目前有能力主导被投资方的相关活动；（4）投资方是否通过参与被投资方的相关活动而享有可变回报；（5）投资方是否有能力运用对被投资方的权力影响其PI报金额；（6）投资方与其他方的关系。在判断是否存在控制时，应首先判断投资方是否拥有对被投资方的权力，而在判断是否拥有权力时，应当仅考虑与被投资方相关的实质性权利，不考虑保护性权利。所谓实质性权利，是指持有人在对相关活动进行决策时有实际能力行使的可执行权利；而保护性权利，是指仅为了保护权利持有人利益却没有赋予持有人对相关活动决策权的一项权利。若投资方仅享有保护性权利，则投资方不拥有对被投资方的权力。一般来讲，保护性权利是指出于保护全部或部分投资者（尤其是小股东）利益的目的，对于与公司正常经营活动无关，或者因为其金额非常重大、性质非常特殊等原因，会严重影响公司正常业务的决策，适用更为谨慎的决策程序（如需全体股东表决通过等）。下面这些决议内容很可能属于保护性权利：对公司增加或者减少注册资本作出决议；对发行公司债券作出决议；对公司合并、分立、变更公司形式、解散和清算等事项作出决议；修改公司章程等。\n另外，实质性权利强调的是持有人在对相关活动进行决策时有实际能力行使的可执行权利，而不论其是否实际行使该权利。有的情况下，投资者可能主导被投资方相关活动的决策，但并非直接管理与运营这些相关活动，而将决策的执行委托给管理层或者其他代理人。例如某些承包经营的安排中，受托方根据委托方确定的相关活动决策，只负责所承包企业的日常经营活动；又如，一些酒店的业主会与酒店管理公司签订合约，将酒店的日常经营活动交给酒店管理公司去经营，业主对酒店的经营方针、规划、年度预算等拥有决策权，业主支付给酒店管理公司的管理费与酒店的经营业绩挂钩。在这些情况下，酒店管理公司很可能是以“代理人”的身份去执行委托人制定的政策。\n在实务中还需要注意K分持股比例和表决权比例，尤其是在某些企业类型中，表决权比例与持股比例通常是不一致的，例如，有限合伙企业中，经常可以看到这样的情形，普通合伙人的出资比例很低，但普通合伙人是执行合伙人，根据合伙协议的约定对合伙企业事务具有控制权；又如，中外合资经营企业中，董事会是最高权力机构，投资者的表决权体现为他们在董事会的席位，有可能与投资者的出资比例不相等。\n即使在表决权比例超过半数的情况下，也不能直接判断有控制权，实务中存在这样的情形：投资者在被投资单位的表决权比例超过半数，但是被投资单位的一部分重要财务或经营政策需要2/3或者全部表决一致才能通过。这种情形之下，投资者对被投资单位仍然没有控制权。\n控制的判断是一个较为复杂的问题，以上分析也不能涵盖所有的方面，但总的来说，都需要紧扣“控制”定义的核心要素，结合被投资单位的法律形式、投资合同、章程、董事会设置等方面综合考虑。\n在本案例中，A公司吸收合并C公司后，继承了C公司2x11年与当地国资委签订协议中约定的相关的权利和义务，即由A公司组织D公司生产经营、管理控制，A公司按照40%的比例享有或承担D公司生产经营产生的利润或亏损。因此，控制权判断的关键在于分析A公司（吸收合并前的C公司）对D公司的经营和管理是以主要责任人身份还是代理人身份进行。\n在本案例中，A公司（吸收合并前的C公司）仅仅能在授权范围内组织日常生产经营和管理活动，重大的财务和经营决策仍需要得到当地国资委的批准，更重要的是国资委可以单独罢免A公司（吸收合并前的C公司）对D公司的经营管理权，可见其经营管理权在实质上仍受到较大的限制和制约，只是承担代理人的角色。\n另一方面，根据案例背景，从“当地国资委于2x11年与C公司签订协议”看，“B公司投入的注册资本完全由B公司享有，C公司不享有该部分资产的产权”，“A公司吸收合并C公司后，未对D公司进行投资，仍通过原协议持有D公司40%收益权，而D公司的终极产权由当地国资委管理”。据此，我们认为，A公司实质上也并不享有D公司的财产权和剩余收益权，这部分权益由委托人，即当地国资委享有。\n综上所述，就经济实质而言，A公司（吸收合并前的C公司）实际上是受托进行日常经营管理活动，代表国资委对D公司的生产经营进行管理，即A公司并不能控制D公司。\n在A公司与当地国资委签订《产权转让合同》，受让D公司全部产权和剩余收益权后，D公司才成为A公司的全资子公司，A公司应从此时起将D公司纳入合并范围，并按照非同一控制下的企业合并进行相关会计处理。\n【相关案例之一】\n（一）案例背景\n为尽快扭亏，A公司2x16年与其控股股东B集团签订托管经营协议，由B集团将其旗下三家盈利的单位托管给A公司经营。托管协议主要条款为：\n1．托管范围：上述三家单位的整体经营权，包括上述三家单位资产、经营、投资、管理等经营活动事项。但未经B集团同意，A公司不得处置标的公司的重大资产。\n2．托管期限：2x16年1月1日至2x18年12月31日。在托管期届满后，双方可协商是否延长，协商一致同意延长的，双方应续签托管经营协议。\n3．损益归属：托管期内，托管资产范围内矿产、股权、土地、房产、设备等资产的法律权属关系不发生变化。上述三家单位在经营过程中产生的盈利或亏损均由A公司享受或承担，托管期内A公司进行的大修、改造、改扩建等项目投资形成的固定资产，产权归A公司所有，解除协议时由B集团按法定程序购买该项资产。\n4．托管费用：托管费用采用固定费率，标准为各单位税后利润的5%，按年计算和支付，并且为支持A公司发展，自2x16年起两年内免除A公司的托管费。\n问题：A公司是否应将B公司纳入2x16年度合并范围？\n（二）案例解析\n合并财务报表的合并范围应当以控制为基础予以确定。委托、受托经营业务中，是否将标的公司纳入合并报表范围，应根据《企业会计准则第33号——合并财务报表》（2014年修订）关于控制的定义和原则，基于标的公司权力和可变回报相关的所有事实和情况进行判断。一般情况下，除非有明确证据表明控制权确实发生了转移，上市公司不能通过委托或受托经营协议改变合并范围。\n在本案例中，A公司接受其控股股东B集团委托，受托管理B集团旗下三家单位，A公司是否可将受托标的纳入合并报表范围，应进行如下分析判断：\n第一，关于对标的公司是否拥有权力的判断。由于标的公司是持续经营的正常公司，影响该公司可变回报的相关活动一般包括企业的生产经营管理、投资管理、资产的管理与处置等。在判断是否对标的公司拥有权力时，除日常生产经营管理活动相关的权力外，还应当考虑是否拥有主导对公司价值产生重大影响的其他决策事项的权力。\n在本案例中，委托期限为3年，如延长需A公司与受托方协商一致，表明委托方或双方并无长期保持委托关系的意图，受托方仅能在较短或不确定的期间内对标的公司施加影响；同时也表明A公司并无权限单独决定其受托管理期限，不能自主决定其退出的时点；而且在受托期间未经委托方同意，A公司不得处置标的公司的重大资产，表明其通过资产的优化配置获得可变回报的权利受到限制。综上所述，并不能认为A公司对标的公司拥有权力。此外，某些委托经营合同中约定合同任何一方可以随时终止委托经营合同，在此情况下也表明受托方并不享有对标的公司的实质性权利。\n在实务中，还应着重分析A公司是否能从实质上享有对被委托单位相关活动的权力，如是否存在证据表明，其能够自主决定标的公司董事会等类似权力机构成员的任命、关键管理人员的任命以及被投资方的重大交易等重大事项；托管期间，受托单位能否以及如何全面、独立负责标的资产的生产、经营、投资、管理以及处置等经济活动，尤其在委托方是受托方控股股东的情况下，应评价其享有该类经营管理活动是作为主要责任人还是代理人身份。\n第二，关于享有可变回报的分析。标的公司获得的可变回报，不仅包括基于受托经营期间损益分配分享的回报，还应考虑因公司整体价值变动所分享和承担的报酬和风险。本案例中，委托经营协议虽然约定委托期间标的公司损益的绝大比例由A公司享有或承担，但其并不享有标的公司的整体价值：一方面，委托经营期限仅为3年，受托期间的可变回报相对于标的公司整体价值而言可能并不重大；另一方面，在受托退出时点，A公司并不享有受托单位的整体价值变动带来的可变回报，换言之，其并不承担或享有受托单位内在价值或市场价值的变化。\n综上所述，A公司并不能因受托经营而拥有主导标的公司相关活动的权力，也不享有标的公司的重大可变回报及其可变动性，不应将受托管理的标的公司纳入其合并财务报表范围。\n此外，实务中还应关注委托经营的商业目的和经济实质，如相较于委托方，受托方是否存在对被托管单位的管理或技术上的优势或经验，托管费用定价是否公允等。在该案例中，A公司受托经营并非出于其具有管理或技术上的优势和经验，而是为实现尽快扭亏为盈，其是否能对标的公司具有实质性权利存疑。该委托经营交易发生在受托方与其控股股东之间，实务中还应根据对该项委托经营的实质判断其是否构成与控股股东之间的一项权益性交易。\n【相关案例之二】\n（一）案例背景\nA公司在2x15年12月30日与C公司签订了“承包经营合同”，将全资子公司B公司的整体经营权承包给C公司。B公司为生产制造型企业。合同主要条款如下：\n承包期限：自接管日算起，至当年12月31日及其后连续5个自然年度。合同期满A公司收回B公司经营权。经A公司股东大会通过可以将B公司继续对外承包，承包费用和期限另行商定。\n承包费：承包费采用固定费用，按年结算和支付。根据承包经营资产现有整体经营水平、财务状况和未来使用效率和风险等因素，经双方协商，确定自接管日至当年年末12月31日及其后1个自然年度，C公司支付给A公司承包费100万元，第二年承包费200万元，第三年至第五年承包费每年300万元。首笔承包费在接管日起30日内付清，之后的承包费于每个承包年度第一个月内付清。\n损益归属：承包期内，承包资产范围内厂房、设备等资产的法律权属关系不发生改变，仍归属B公司。承包期内，B公司在生产经营过程中产生的盈利或亏损均由C公司享有或承担。在承包期结束后，对承包经营期间新增的债权债务关系在A公司收回B公司之后发生的坏账等损失及账外负债由C公司承担，A公司有权向C公司追偿。\n合同约定未经A公司书面同意，B公司不得对外担保，不得以B公司名义进行贷款或其他融资，不得处置B公司固定资产，不得签署超过承包期限的长期合同，不得超出经营需要招聘、安置员工。\n问题：A公司是否应将其对外委托管理的B公司纳入2x15年度合并范围？\n（二）案例解析\n合并财务报表的合并范围应当以控制为基础予以确定。委托、受托经营业务中，是否将标的公司纳入合并报表范围，应根据《企业会计准则第33号——合并财务报表》（2014年修订）关于控制的定义和原则，基于标的公司权力和可变回报相关的所有事实和情况进行判断。一般情况下，除非有明确证据表明控制权确实发生了转移，上市公司不能通过委托或受托经营协议而改变合并范围。\n在本案例中，A公司将B公司的整体经营权承包给C公司经营，A公司是否因为该项委托经营而不，再将标的公司B公司纳入合并报表范围，应结合委托经营协议条款进行如下分析判断：\n第一，关于对标的公司是否拥有权力的判断。在判断是否对标的公司拥有权力时，除日常生产经营管理活动相关的权力外，还应当考虑是否拥有主导对公司价值产生重大影响的其他决策事项的权力。\n在本案例中，一方面，从委托期限而言，该委托经营的委托期限为5年，表明委托方或双方并无长期保持委托关系的意图，受托方仅能在较短的期间内对标的公司施加影响；同时受托方并不能决定委托经营的期限，是否委托以及在5年委托期限到期后是收回管理还是继续委托其他方经营，由A公司全权决定，换言之，A公司有权决定标的公司的管理模式；另一方面，从受托期间的权利范围而言，由于在受托期间，未经委托方同意，承包期内，承包资产范围内厂房、设备等资产的法律权属关系不发生改变，受托方对标的公司的处置权等权利受到限制；同时未经A公司书面同意，标的公司不得对外担保，不得以标的公司名义进行贷款或其他融资，不得处置标的公司固定资产，不得签署超过承包期限的长期合同，不得超出经营需要招聘、安置员工，表明受托方在重大投资、融资等决策上存在限制，而A公司作为委托方在这些相关活动上具有实质性权利。\n第二，关于享有可变回报的分析。从标的公司获得的可变回报，不仅包括基于受托经营期间损益分配分享的回报，还应考虑因公司整体价值变动所分享和承担的报酬和风险。在本案例中，虽然受托方享有承包期内标的公司在生产经营过程中产生的盈利或亏损，但受托期间的盈亏相对于标的公司的整体回报（如整个剩余寿命期间）而言并不重大。除此之外，受托方并不享有除经营盈亏外的其他可变回报，如受托管理结束时该标的公司整体价值变动所可能带来的可变回报（如股权价值增加或减少），而作为委托方的A公司，其享有标的公司除经营期间盈亏外的所有可变回报，也享有标的公司的剩余权益。\n第三，关于是否有能力运用对被投资方的权力影响其回报金额的分析。从A公司角度而言，其将标的公司委托给其他方管理本身就是行使对标的公司的经营管理这项相关活动的权力，而且其还享有委托期间标的公司的资产处置、重大融资和投资等其他所有相关活动的权力，而这些权力将直接影响标的公司的整体价值（所有可变回报）。受托方享有的经营期间的盈亏只是A公司将标的公司委托给其经营的可变费用。\n综上所述，A公司虽然将B公司委托其他方经营，但并未丧失对B公司的控制权，应继续将其纳入合并范围。此外，实务中还应关注委托经营的商业目的和经济实质。例如，相较于委托方，受托方是否存在对被托管单位的管理或技术上的优势或经验，托管费用定价是否公允等。\n【相关案例之三】外包的业务是否纳入合并报表范围\n（一）案例背景\nA公司为上市公司，2x11年1月A公司与自然人李某签订承包合同，将子公司B公司整体承包给李某，B公司的核心资产为一条具有独立生产能力的通用设备生产线，且B公司现有一套生产线管理体系及稳定的生产管理团队。B公司生产线主要设备的预计尚可使用寿命为15年。承包期2年，从2x11年1月1日起至2x12年12月31日止，承包期内每年租金200万元，无论B公司实际业绩如何，李某均须在承包期内每年支付200万元给A公司。签订承包合同当日，两年的承包费总额占B公司资产的公允价值的比例并不重大。承包期间李某自主经营、自负盈亏、依法纳税，依法独立承担民事、行政与刑事等责任，保护所承包经营资产的安全，对其进行日常维修和保养，并在2年承包期限届满时将状态良好的生产线交还给A公司。此外，A公司有权通过B公司董事会对李某的经营管理行为进行监督，当李某的承包经营行为影响B公司形象或损害B公司合法权益时，A公司有权制止。李某未经A公司书面授权，不得将该业务委托给第三方进行经营，李某也不得在未取得A公司授权的情况下，擅自动用B公司的任何资产或者以B公司的名义对外借款。\n问题：A公司合并报表应该如何反映该承包经营事项？\n（二）案例解析\n在本案例中，B公司的核心资产为一条具有独立生产能力的通用设备生产线，且有一套生产线管理体系及稳定的生产管理团队，A公司应该分析是否对B公司存在控制。\n根据承包合同的安排，两年的承包期内李某自主经营、自负盈亏。A公司虽然有权对李某的经营管理行为进行监督，但基本上也仅限于一些保护性的监督，例如，当李某的承包经营行为影响B公司形象或损害B公司合法权益时，A公司有权制止。从这些安排上来看，A公司在两年承包期内的确不控制B公司的经营活动，B公司的经营成果不应该反映在A公司合并财务报表中。\n然而，B公司业务中的核心资产的剩余使用年限为15年，承包人李某仅仅承包2年，承包期占资产剩余寿命的比例非常小，且未经A公司同意，李某不得将该业务委托给第三方进行经营，也不得擅自动用B公司的任何资产或者以B公司的名义对外借款。李某必须在2年承包期限届满时将状态良好的生产线交还给A公司。这些安排都说明，B公司核心资产增值的潜在收益以及贬值的潜在风险仍然主要归A公司所有。从这个意义上来讲，B公司的核心资产、负债仍然应该反映在A公司的合并财务报表中才能完整地反映A公司整个集团所控制的资源。\n综上所述，本交易的经济实质可以看作A公司在保留对核心资产控制权的前提下，向李某让渡了B公司为期2年的生产经营管理权，并相应收取每年200万元的固定承包费作为对价。因此，A公司合并资产负债表中应该包括B公司的资产和负债，A公司合并利润表与合并现金流量表中则应该只体现固定的承包费收入，不包括B公司自身的经营成果和现金流量。"}, {"title": "案例12-02 非营利性组织是否应纳入合并范围", "content": "根据《企业会计准则》的规定，合并财务报表的合并范围应当以控制为基础予以确定。在被投资单位为非营利性组织的情况下，能否纳入合并范围，需要结合具体情况进行判断。\n一、案例背景\nA公司为信息系统行业的上市公司。2x12年1月，A公司与B高等普通大学（以下简称B大学）根据《中华人民共和国民办教育促进法实施条例》（国务院令第399号）和《独立学院设置与管理办法》（教育部令第26号）等法律法规的有关规定，签订合作办学协议，设立独立机电学院（以下简称机电学院）。机电学院具有法人资格，注册资本为1亿元，其中A公司出资7,000万元，持股70%，B大学以无形资产作价3,000万元出资，持股30%。机电学院对外招生，其性质为利用非国家财政性经费举办的实施本科学历教育的高等学校。\n机电学院最高决策机构是学院董事会，董事会成员共7人，其中A公司委派4名，B大学委派3名，A公司董事长同时任机电学院的董事长。聘任、解聘院长，修改学院章程，制定学院发展规划，审核学院预算、决算，决定机电学院的分立、合并、终止相关的决议须经全体董事2/3以上表决通过。除上述事项以外的其他决议由全体董事过半数表决通过。独立学院在扣除办学成本、预留发展基金以及按照国家有关规定提取其他必需的费用后，出资人可以按出资比例从办学结余中取得合理回报。\n问题：A公司是否应将机电学院纳入合并范围？\n二、会计准则及相关规定\n《企业会计准则第33号——合并财务报表》（2014年修订）第七条规定：“合并财务报表的合并范围应当以控制为基础予以确定。控制，是指投资方拥有对被投资方的权力，通过参与被投资方的相关活动而享有可变回报，并且有能力运用对被投资方的权力影响其回报金额”。\n《企业会计准则第33号——合并财务报表（应用指南）》（2014年修订）第44-45页规定：\n“可变回报的例子包括：\n1．股利、被投资方经济利益的其他分配（例如，被投资方发行的债务工具产生的利息）、投资方对被投资方投资的价值变动。\n2．因向被投资方的资产或负债提供服务而得到的报酬、因提供信用支持或流动性支持收取的费用或承担的损失、被投资方清算时在其剩余净资产中所享有的权益、税务利益，以及因涉入被投资方而获得的未来流动性。\n3．其他利益持有方无法得到的回报。例如，投资方将自身资产与被投资方的资产一并使用，以实现规模经济，达到节约成本、为稀缺产品提供资源、获得专有技术或限制某些运营或资产，从而提高投资方其他资产的价值。”\n三、案例解析\n《企业会计准则》对于“控制”的定义和判断并不拘泥于被投资单位的法律形式。投资方对于被投资单位是否具有控制权还是要回归控制的定义和基本原则来判断，即分析投资方是否具备主导被投资单位相关活动的权力以及是否能够从中获取可变回报。\n第一，应分析A公司是否对机电学院的财务和经营决策具有决定权。在本案例中，机电学院的最高权力机构为董事会，董事会成员共7人，其中A公司委派4名，B大学委派3名，A公司董事长同时任机电学院的董事长。学院的重大事项例如聘任、解聘院长，修改学院章程，制定学院发展规划，审核学院预算、决算，决定机电学院的分立、合并、终止相关的决议等须经全体董事2/3以上表决通过。因此，A公司首先应分析须经全体董事2/3以上通过才有效的事项究竟是与机电学院的财务和经营息息相关的实质性决策事项，还是仅为保护性决策事项。在判断控制的时候，应该只考虑实质性条款，不考虑保护性条款。\n一般来讲，设立保护性条款是为了保护全部或部分投资者（尤其是小股东）利益，对于与公司正常经营活动无关，或者因为其金额非常重大、性质非常特殊等原因，会严重影响公司正常业务的重大决策事项，适用更为谨慎的决策程序。通常而言，修改主体的章程，以及决定主体的分立、合并、终止会严重影响主体的正常经营活动，一般可以理解为保护性条款。\n值得进一步分析的是，在本案例中，机电学院聘任、解聘院长，制定学院发展规划，审核学院预算、决算也必须经全体董事2/3以上表决才能通过。通常认为，主体的发展规划、预算、决算事项与主体的正常经营活动息息相关，因此与之相关的条款通常会理解为实质性条款。因此，除非A公司和B大学之间存在其他合同安排，使A公司能够合法合规地独立主导学院的课程设置、师资安排、招生规模、招生要求、收费标准、办学成本等与机电学院的主要经济利益息息相关的正常经营活动，学院院长的职责范围也仅限于根据已确定的经营方针、规划，监督学院日常教学活动，且有确凿证据表明在投资双方进行合作协商设立学院时，已经就学院在存续期间的整体预算规模、经营规划达成了共识，否则，A公司不能单方面主导机电学院聘任、解聘院长，制定学院发展规划，审核学院预算、决算的事实，这将导致A公司对机电学院的控制权存在重大疑虑。\n第二，应分析A公司从机电学院获取利益的方式和程度。本案例中，机电学院有两个投资方，在扣除机电学院的办学成本、预留发展基金以及按照国家有关规定提取其他必需的费用后，A公司可以按其出资比例从办学结余中取得合理回报。此外，A公司通过投资举办机电学院，还可以为企业发展储备所需技术开发人才，利用与学院实验室的合作项目，为有效降低研发成本创造有利条件，获取其他利益相关方无法获取的回报。\n第三，应该考虑通过股权转让方式退出该项投资的可能，以及转让可能获得收益的情况。\n综上所述，在本案例中A公司是否能将机电学院纳入合并范围不能一概而论，而应紧扣控制定义的核心要素，结合上述要点，分析A公司是否具有主导机电学院的相关活动的权力，并通过参与机电学院的相关活动取得可变回报，而且能运用权力改变回报金额。\n【相关案例之一】非营利养老机构是否纳入合并范围\n（一）案例背景\nA公司所属行业为电信设备制造行业，主要为运营商提供移动通信网络优化覆盖设备、系统及相关服务。2x11年度，A公司独家出资300万元，在某市民政局登记，设立了一家居家养老服务中心（以下简称养老中心），提供居家家政服务、康复保健、法律维权、日间照料等居家养老服务。该中心的法律形式为民办非企业单位，属于非营利性组织。作为非营利性组织，养老中心既可以履行企业社会责任，又可以作为一个服务载体，推广A公司的老人手机产品，逐步扩大养老服务平台产品的销售规模。\n养老中心的法律形式为民办非企业单位，民办非企业单位作为一个民间非营利性组织，其不以营利为目的，且根据《民办非企业单位登记暂行办法》（民政部令〔1999〕18号），民办非企业单位须在其章程或合伙协议中载明该单位的盈利不得分配，解体时财产不得私分。根据养老中心的章程，其经费收入只能用于章程规定的业务，盈余不能进行分红。养老中心自设立以来，基本实现盈亏平衡，A公司预计养老中心在现有运营规模下，未来收入和费用也会基本持平。\n养老中心的最高权力机构为理事会，理事会由3名理事构成，其中A公司推荐2人，业务主管单位推荐1人。修改章程、解散、变更形式的决议必须经全体理事2/3以上通过方为有效，其他决议经全体理事过半数通过有效。\n问题：A公司是否应将养老中心纳入合并范围？\n（二）案例解析\n《企业会计准则》对于“控制”的定义和判断并不拘泥于法律形式。投资方对于被投资单位是否具有控制权还是要回归控制的定义和基本原则来判断，即分析投资方是否具备主导被投资单位相关活动的权力以及是否有能力影响可变回报金额。\n第一，应分析A公司是否具有对养老中心的财务和经营决策的决定权。在本案例中，养老中心的最高权力机构为理事会，理事会由3名理事构成，其中A公司推荐2人，理事会作出决议必须经全体理事过半数通过，重要事项的决议必须经全体理事2/3以上通过方为有效。因此，A公司首先应分析须全体理事2/3以上通过才有效的事项究竟是与养老中心的财务和经营息息相关的实质性决策事项，还是仅为保护性决策事项。一般而言，与被投资单位经营计划、投资方案、年度财务预算方案和决算方案、利润分配方案和弥补亏损方案、内部管理机构的设置、聘任或解聘公司经理及其报酬、公司的基本管理制度相关的事项为实质性决策事项。对修改章程、增加或减少注册资本、发行债券、合并、分立、解散或变更形式等与改变被投资单位的基本性质相关的事项可以理解为保护性决策事项。本案例中，养老中心必须经超过全体理事2/3以上通过才有效的事项涉及修改章程、解散和变更形式，上述事项与养老中心的日常正常经营活动无关，而仅与改变养老中心的现有法律形式等对养老中心而言性质极其特殊的事项相关，属于保护性决策事项。除上述保护性事项外，其他重大决议经全体理事过半数通过即为有效。由于A公司可以推荐3名理事中的2名，因此可以判断A公司享有对养老中心财务和经营政策的决定权。\n第二，应分析A公司从养老中心获取利益的方式和程度。就养老中心不能进行利润分配的事项而言，虽然控制的目的是获取经济利益，然而，企业会计准则讲解也明确指出，获取经济利益包括增加经济利益、维持经济利益、保护经济利益，或者降低所分担的损失等。因此，被投资单位无法进行利润分配，并非必然代表投资方无法获取经济利益。在本案例中，养老中心唯一的出资方为A公司，不存在其他经济利益相关方。除了履行社会责任外，A公司设立养老中心的经济目的是在养老中心推广使用A公司设计的老人手机产品，逐步扩大其养老服务平台产品的销售规模。由于不存在其他利益相关方，A公司实质上通过将自身产品运用于养老中心而从中获取了绝大多数的经济利益。\n第三，应该考虑通过股权转让方式退出该项投资的可能，以及转让可能获得收益的情况。\n综上所述，A公司享有主导养老中心相关活动的决定权，并能据以从养老中心的经营活动中获取可变回报，应将养老中心纳入合并范围。\n【相关案例之二】非营利性医疗机构是否纳入合并范围\n（一）案例背景\nA公司于2x14年4月收购了B医院100%的所有者权益，B医院为非营利性医院，非营利性医疗机构盈利只能用于自身发展，不能分红。收购完成后，A公司已将B医院与下属其他医院统筹管理，在业务培训、专家利用、集中采购等方面综合利用整体资源。A公司认为，B医院作为非营利性医院，公司无法对其盈利进行分配，且没有能力运用对B医院的权力影响其回报金额，2x14年未将B医院纳入合并报表。2x15年12月28日A公司与其所控制的一家下属全资医院C医院签署协议，C医院有权对B医院的人事、财务、采购及其他经营管理活动进行决策。A公司因此认定可以将B医院纳入2x15年合并报表范围。\n问题：A公司上述会计处理是否符合企业会计准则规定？\n（二）案例解析\n在实务中对非营利性组织是否纳入合并范围的判断，仍以控制为基础确定。控制，是指投资方拥有对被投资方的权力，通过参与被投资方的相关活动而享有可变回报，并且有能力运用对被投资方的权力影响其回报金额。\n企业会计准则对于“控制”的定义和判断并不拘泥于被投资单位的法律形式。投资方对于被投资单位是否具有控制权还是要回归控制的定义和基本原则来判断，即分析投资方是否具备主导被投资单位相关活动的权力以及是否能够从中获取可变回报。\n第一，应分析上市公司是否具有对非营利性组织的财务和经营等相关活动的决定权。此时，需要考虑非营利性组织的相关活动的构成、最高权力机构及决策机制。\n第二，应分析上市公司从非营利性组织获取利益的方式和程度。企业会计准则及相关规定也明确指出，获取可变回报包括：（1）股利、被投资方经济利益的其他分配（例如，被投资方发行的债务工具产生的利息）、投资方对被投资方投资的价值变动；（2）因向被投资方的资产或负债提供服务而得到的报酬、因提供信用支持或流动性支持收取的费用或承担的损失、被投资方清算时在其剩余净资产中所享有的权益、税务利益，以及因涉入被投资方而获得的未来流动性；（3）其他利益持有方无法得到的回报。例如，投资方将自身资产与被投资方的资产一并使用，以实现规模经济，达到节约成本、为稀缺产品提供资源、获得专有技术或限制某些运营或资产，从而提高投资方其他资产的价值。因此，被投资单位无法进行利润分配，并不必然代表投资方无法获取经济利益。\n第三，应该考虑通过股权等权益转让方式退出该项投资的可能，以及转让可能获得收益的情况。\n在本案例中A公司在与C医院签署协议前后，其所拥有的对B医院的权力、享有的可变回报等没有发生实质性变化，A公司在2x15年将B医院纳入合并范围，原则上在2x14年即应予以合并，除非A公司能够提供在2x14年不构成控制的其他依据。"}, {"title": "案例12-03 上市公司是否将其发起设立的基金纳入合并范围", "content": "一、案例背景\nA公司为上市公司，主要从事房地产开发业务。B公司为国际资深金融机构，在地产基金运作方面有丰富经验，是很多地产类股权投资基金的发起人和基金管理人，且与A公司无关联关系。2x13年2月，A公司、B公司各自出资3,000万元共同成立了基金管理公司C公司。2x13年6月，A公司、B公司、C公司共同发起设立了股权投资基金D（有限合伙企业），并面向社会机构投资者募集资金，其中：A公司、B公司各自出资2亿元，为有限合伙人；C公司出资6,000万元、为普通合伙人；社会机构投资者为有限合伙人。基金D的很多机构投资者与B公司建立有长期合作关系，出于对B公司投资管理能力的认可而选择基金Do基金D的募集资金总规模为50亿元，募集分期进行，首期募集资金为20亿元，于2x13年9月完成募集。2x13年10月，基金D使用首期募集资金中的16亿元购入E公司50%的股权，剩余募集资金进行其他股权投资，已经根据合同框架协议支付了部分项目的诚意金，就该等项目基金D正在与投资者协商第二期募集资金。此前，E公司为A公司出资成立的全资子公司，专门从事国内E地产项目的开发业务。\n基金D设有投资决策委员会，根据基金章程，投资决策委员会应以所有投资方的最佳利益为出发点进行决策，对基金的所有重大事项拥有广泛的决策权。投资决策委员会的成员由C公司任命，由A公司、B公司各委派2名代表组成。基金的重大事项，包括但不限于投资项目的选择、投资方案的确定、项目退出方案、收益分配、基金募集等，由投资决策委员会全体委员一致通过有效。此外，普通合伙人负责投资项目推荐以及基金的日常管理和运作，有限合伙人拥有的权利主要是建议权及知情权，其无权罢免普通合伙人。\n基金D的收益体现为持有E公司股权期间获取的股利收入，以及未来选择以处置股权方式退出时取得的投资利得。C公司按照基金资产总额的1.5%收取固定管理费，并在基金收益达到约定水平后，根据基金收益以及合同约定的方法计算并收取费用，该等固定费用以及与基金业绩挂钩的费用与市场类似服务的收费水平相当。\n在A公司与B公司的合作中，A公司的主要目的不是为旗下地产项目融通资金，而是希望与地产基金运作方面有丰富经验的国际资深金融机构合作，由传统的地产开发业务拓展至基金资产管理业务，将多年的地产开发经验用于资金运营管理中，并获取投资管理收益。B公司则是希望与在国内地产开发方面有丰富经验的A公司合作，运用B公司在国际资本市场运作和管理地产基金的能力和经验，筛选并投资中国境内的优质地产项目，并获取投资管理收益。\n基于上述目的，A公司与B公司合作设立基金D开展国内的地产项目投资。出于对E地产项目前景的良好预期，基金D选择以首期募集资金对E地产项目进行股权投资，同时，基金D也在对其他若干项目进行可行性研究，这些项目既包括A公司旗下的地产项目，也包括其他地产公司的地产项目，部分项目已经签订框架协议，进入实质性谈判阶段。\nE公司的最高权力机构是董事会。董事会由5名董事组成，其中包括董事长在内的3名董事由A公司委派、包括副董事长在内的2名董事由B公司委派。E公司的总经理由A公司委派。除下列事项由出席董事会会议的董事一致通过方可作出决议外，其他重大事项均由董事会基于相对多数原则作出决议：\n1．修订公司章程。\n2．批准注册资本的变更。\n3．批准股权的出售、处分、转让或其他退出决定。\n4．批准股东将其持有的全部或部分股权设立质押。\n5．批准公司的合并、分立、清算、解散或终止，批准变更公司的组织形式、经营范围或经营期限。\n6．公司以其自身名义对外提供担保。\n7．批准初始预算及对初始预算的修改，或预算范围以外的开支。\n8．派发股息或其他利润分配。\n9．批准公司签订任何与公司经营范围不符的合同。\n10．批准公司与其董事、投资方或主要管理人员或与该等人士有关联的人士进行任何交易（但在正常经营范围按照公平交易原则进行的商品房销售除外）。\n11．设立任何子公司或购买任何公司股份，或参与或终止参与任何合伙或合资公司。\n12．由董事会一致同意的其他须经所有董事批准事项（该等事项一致通过后即列入需董事会一致同意决议的事项）。\n上述第7条要求初始预算的批准、修改以及预算范围以外的开支由全体董事一致通过，其目的是对成本控制进行防护性监督。在选择E项目作为基金D首期募集资金的投资项目时，B公司已经对A公司制定的E项目初始预算进行了审阅和评价，B公司对初始预算的认可是其同意基金D对E项目进行股权投资的先决条件，该预算是项目开发过程中成本控制的基础。B公司对于预算的关注主要在成本的控制上。在制定初始预算时，A公司对于各项成本的预测较为谨慎，对于物价上涨、合同变更等可能会导致成本上涨的因素通过不可预见费的形式反映在成本预算中，目前不可预见费占除土地成本外的其他开发成本的比重约为5%，该比例相较于房地产行业的普遍水平而言，是较为充分和适当的。除非出现较为重大的事项，正常情况下成本支出不会超过初始预算。在出现这类重大情况时，B公司希望对导致预算变动的原因进行了解，并对需变更的预算金额进行审批。\n问题：A公司是否应将基金D及E公司纳入合并范围？\n二、会计准则及相关规定\n《企业会计准则第33号——合并财务报表》（2014年修订）第七条对“控制”的定义如下：“控制，是指投资方拥有对被投资方的权力，通过参与被投资方的相关活动而享有可变回报，并且有能力运用对被投资方的权力影响其回报金额。”\n《企业会计准则第33号——合并财务报表》（2014年修订）第十三条规定：“除非有确凿证据表明其不能主导被投资方相关活动，下列情况，表明投资方对被投资方拥有权力：\n（一）投资方持有被投资方半数以上的表决权的。\n（二）投资方持有被投资方半数或以下的表决权，但通过与其他表决权持有人之间的协议能够控制半数以上表决权的。”\n《企业会计准则第33号——合并财务报表》（2014年修订）第十四条对表决权比例未超过半数情况下的控制作出了原则性规定：\n“投资方持有被投资方半数或以下的表决权，但综合考虑下列事实和情况后，判断投资方持有的表决权足以使其目前有能力主导被投资方相关活动的，视为投资方对被投资方拥有权力：\n（一）投资方持有的表决权相对于其他投资方持有的表决权份额的大小，以及其他投资方持有表决权的分散程度。\n（二）投资方和其他投资方持有的被投资方的潜在表决权，如可转换公司债券、可执行认股权证等。\n（三）其他合同安排产生的权利。\n（四）被投资方以往的表决权行使情况等其他相关事实和情况。”\n《企业会计准则第40号——合营安排》第五条对“共同控制”的定义如下：“共同控制，是指按照相关约定对某项安排所共有的控制，并且该安排的相关活动必须经过分享控制权的参与方一致同意后才能决策。\n本准则所称相关活动，是指对某项安排的回报产生重大影响的活动。某项安排的相关活动应当根据具体情况进行判断，通常包括商品或劳务的销售和购买、金融资产的管理、资产的购买和处置、研究与开发活动以及融资活动等。”\n三、案例解析\n根据企业会计准则对于控制和共同控制的定义，一个企业只有在可以单方面主导被投资单位的相关活动时，才可能拥有被投资单位的控制权；如果任何一方都无法单方面主导被投资单位的相关活动，被投资单位的财务和经营政策需要相关投资方一致同意，则分享控制权的投资方对于被投资单位拥有共同控制。\n（一）A公司对于基金D的控制权分析\n作为股权投资基金，基金D的主要相关活动是投资项目的选择、投资方案的确定、项目的退出决策及方案、基金的募集方案等。根据基金章程，上述事项由投资决策委员会的全体委员一致通过有效。投资决策委员会由普通合伙人C公司的两方股东，即A公司和B公司，分别委派2名代表组成，而有限合伙人拥有的权利仅限于建议权和知情权，其无权罢免C公司。因此，从基金章程的规定上看，A公司无法单方面决定基金D的财务和经营政策，该等财务和经营政策由A公司和B公司共同决定，相应A公司对基金D不拥有控制权，而是与B公司共同控制基金D。\n上述分析与认定是基于基金章程的规定，在此之上，还应从双方的行业背景、双方合作设立基金的目的和意图出发，看一下上述分析与认定是否符合交易实质，要特别关注的是基金D是否存在需要作出实质性决策的投资事项，以及B公司是否具备实质参与基金D的相关决策、与A公司分享控制权的意愿和能力。\nB公司为国际知名金融机构，拥有丰富的地产基金投资、管理和运作经验，是很多地产类股权投资基金的发起人和基金管理人。此次与A公司合作成立基金管理公司并发起设立基金，B公司是希望将A公司在国内地产开发方面的经验与B公司在地产基金管理和运作方面的经验结合起来，共同筛选并投资国内优质地产项目，从而达到拓展国内地产基金业务、获取投资管理收益的目的。\nA公司的主业是国内地产开发，此次与B公司合作成立基金管理公司并发起设立基金，其主要目的不是旗下地产项目的资金融通，而是出于拓展地产基金资产管理业务的考虑。作为企业战略规划之一，A公司希望凭借其在国内地产开发领域的经验和知名度发展地产基金的资产管理业务，而B公司在地产基金投资、管理和运作方面的经验，以及B公司在国际资本市场上与机构投资者建立的长期合作关系等，对于A公司实现上述业务转型有较大的帮助。\n从上述合作目的来看，基金D的设立不是为了A公司的地产项目融通资金，而是为了对国内地产项目进行股权投资，通过对地产项目的投资管理获取收益。从基金D的投资对象上看，基金D的首期募集资金选择A公司旗下的E地产项目作为股权投资对象，是由于A公司和B公司都对该项目的盈利前景有良好预期而共同作出的投资选择，同时基金D也在对其他若干项目（既包括A公司旗下的地产项目，也包括其他地产公司的地产项目）进行可行性研究，而B公司一直积极参与投资项目筛选和评估，并在这过程中与A公司共同决策。\n同时，基金D的很多机构投资者与B公司建立有长期的合作关系，该等机构投资者出于对B公司投资能力的信任而选择投资基金D。相应地，为了维护市场形象，B公司需要对基金的投资对象进行严格的筛选和把关，以避免投资失败使其失去投资者的信任和良好的市场声誉。\n从以上分析可以看出，A公司和B公司的合作目的决定了基金D定位于国内地产项目的股权投资，而不是纯粹为A公司地产项目的融资平台，相应基金D需要在投资项目的选择、投资方案的确定、投资的退出等方面作出实质性决策。B公司参与该交易安排的目的、B公司在地产基金业务中惯常的参与模式以及具备的丰富经验、B公司维护市场形象及投资者关系的需要等都表明，对于基金D的重大财务和经营决策，B公司有参与决策、分享控制权的需求和能力。同时，A公司拓展基金资产管理业务的战略规划、A公司在国内地产开发行业的经验也表明，A公司对于基金D同样有参与决策、分享控制权的要求和能力。相应地，作为参与设立和设计基金D的发起人，A公司和B公司会积极谋求各自对于基金D的决策权，并在相互博弈中形成共同控制基金D的局面。\n此外，A公司与B公司在基金D持有的直接及间接权益相同，两者在基金D中享有的收益及承担的风险相当，这也在一定程度上说明两者在基金D中很可能享有相同的决策权。\n综上所述，基金章程关于基金决策机制的规定、双方的行业背景、双方合作的目的和意图等都表明，A公司和B公司共同控制基金D，相应A公司不应将基金D纳入合并范围，A公司对于基金D的投资应作为对合营企业的投资进行会计处理。\n值得注意的是，如果事实和情况表明，设立基金D的目的是为A公司的特定地产项目融资，B公司缺乏实质性参与基金决策的能力，B公司的主要作用是带来机构投资者并由此获取收益，则可能会在分析相关的事实和证据后得出不同的结论。\n（二）A公司对于E公司的控制权分析\n根据企业会计准则给出的控制的定义，判断A公司是否控制E公司，首先要确定A公司是否能够主导E公司的相关活动。\nE公司的最高权力机构是董事会，重大事项由董事会作出决定。根据E公司的公司章程，董事会进行决议的事项分为两类：一类是需要出席董事会会议的全体董事一致通过，另一类是出席董事会的董事过半数通过，由于E公司5名董事中的3名由A公司委派，A公司可以单方面决定第二类事项，但对于第一类要求全体董事一致通过的事项，A公司无法单方面决定。因此，问题的关键是对于E公司而言，哪些事项属于重大的相关活动，而这些事项是要求全体董事一致通过A公司无法单方面决定，还是仅要求半数以上董事通过A公司可以单方面决定。\nE公司是典型的地产开发企业，其正常经营过程中的财务和经营活动主要包括：项目规划设计、项目开发管理、预算制定及执行、现金流管理、融资决策、税收管理、销售策略制定及执行、竣工结算等，相应上述事项相关的决策构成E公司的主要的财务和经营政策。这些事项中，除预算制定及执行在公司章程中作为要全体董事一致通过的事项外，其余事项都可由A公司单方面决定。\nE公司的公司章程规定了11项要由全体董事一致通过的事项，其中第1项至第5项、第9项、第11项都是引起企业根本性改变的事项，与对外提供担保相关的第6项、与关联交易相关的第10项是为了防范高风险行为或非公平交易损害基金D的利益。很明显，这些事项都是企业正常经营之外出现的特殊情况，而不是企业正常经营过程中需要作出的财务和经营决策，就该等事项赋予基金D的权利主要是保护性的，其目的不是赋予基金D对于重大财务和经营政策的决定权。因此，A公司不会因为无法单方面决定此类事项而无法控制E公司。\n除上述事项外，E公司章程还规定“批准初始预算及对初始预算的修改，或预算范围以外的开支”要由全体董事一致通过。如上分析，预算的制定与执行、成本控制是地产企业主要的财务和经营活动，因此，A公司需要就此进行进一步的分析，以确定其是否可以单方面决定E公司的财务和经营政策，在本案例中，E公司原为A公司的全资子公司，A公司与B公司合作发起设立基金D并选择E公司作为基金D的股权投资对象。基金D的投资决策由A公司与B公司共同决定，在筛选、评估项目的过程中，B公司非常重视项目的初始预算，在同意基金D对E公司进行投资之前，B公司已充分审阅并认可项目的初始预算。同时，该初始预算对于各项成本的预测是较为谨慎的，已比较充分和适当地考虑了未来可能出现的导致成本上涨的因素。因此，就E项目而言，正常情况下项目的实际成本支出不会超过初始预算，修改初始预算或发生预算范围以外的开支只有在出现较为重大的特殊情况时才会发生，而这类特殊情况发生时允许基金D知晓并参与预算的调整，更多的是对于基金D权益的保护，是保护性条款，该条款不影响A公司对于E公司重大财务和经营政策的单方面决策权。\n同时，公司章程还规定“派发股息或其他利润分配”要由全体董事一致通过。该条款更多的是出于防止A公司单方面决定不公平利润分配或无理由拖延利润分配的时间，同样属于保护性安排。\n此外，除直接持有E公司50%股权外，A公司还通过其在基金D以及C公司的投资间接享有E公司的收益并承担E公司的风险。综合该等直接及间接权益，A公司在E公司享有的权益超过50%，是享有收益及承担风险最大的投资者，这与上述A公司有权决定E公司财务和经营政策的判断也是一致的。\n综上所述，尽管E公司的公司章程规定一系列事项要由全体董事一致通过，即A公司无法单方面决定此类事项，但这些事项并非E公司正常经营过程中的财务和经营政策，该安排的目的主要是保护非控股股东的权益，而不是分享对重大财务和经营政策的决策权。对于其他事项，由于A公司在董事会中的席位超过半数，A公司可以单方面作出决定。因此，1方面，对于E公司的财务和经营政策，A公司可以单方面作出决定，而不必征得其他方的同意，表明A公司拥有对E公司的权力；另一方面，作为持有E公司50%权益的股东，A公司可以通过股利分配、享有净资产剩余价值等方式从E公司的经营活动中获取可变回报，即A公司能够主导E公司的相关活动，并能据以从E公司的经营活动中获取可变回报，且有能力运用对E公司的权力影响其回报金额。可见，A公司拥有E公司的控制权，应将E公司纳入合并范围。"}, {"title": "案例12-04 有限合伙企业的普通合伙人是否应将有限合伙企业纳入合并范围", "content": "一、案例背景\nA公司主营投资活动，其作为普通合伙人参与设立一家有限合伙企业，投资比例为2%，并担任该有限合伙企业的执行事务合伙人：该有限合伙企业的有限合伙人按照分享收益的顺序分为三类：（1）优先级有限合伙人，由较为分散的社会投资者构成，出资比例共计83%，可以按预期收益率优先获取收益和收im本金；（2）次级有限合伙人，A公司是唯一的次级有限合伙人，出资比例为5%，享有的预期收益率高于优先级有限合伙人，但取得收益和收回本金的顺序均次于优先级有限合伙人；（3）劣后级有限合伙人，B公司为唯一的劣后级有限合伙人，出资比例为10%，在优先级有限合伙人和次级有限合伙人收回本金及预期收益后，与普通合伙人按照相对出资比例享有剩余财产。\n根据有限合伙企业的合伙协议，有限合伙企业的全部资金均以两年期委托贷款的方式投资于一家地产项目公司C公司（B公司的关联方），利息收入及到期收回的本金在按规定支付普通合伙人的管理费（与市场类似服务的收费水平相当）及有限合伙企业的其他费用后，按照规定的比例和顺序分配给合伙人。\n普通合伙人负责管理有限合伙企业的日常事务，收回到期的本金和利息并支付给合伙人。有限合伙企业的有限合伙人只在普通合伙人违约的情况下才能将其罢免。当C公司不能按合同约定偿还其对有限合伙企业的债务时，根据合伙协议，A公司应按照有限合伙企业董事会的决策管理违约贷款，向C公司追偿以及处置抵押资产。有限合伙企业的董事会由A公司与B公司委派的董事构成，董事会决议由全体董事一致通过有效。\n问题：A公司是否应将有限合伙企业纳入合并范围？\n二、会计准则及相关规定\n《企业会计准则第33号——合并财务报表》（2014年修订）第七条对“控制”的定义如下：“控制，是指投资方拥有对被投资方的权力，通过参与被投资方的相关活动而享有可变回报，并且有能力运用对被投资方的权力影响其回报金额。”\n《国际财务报告准则第1。号——合并财务报表》定义了“控制”并明确了拥有控制应具备的条件：\n“当投资者承担或有权获得来自因涉入被投资者所产生的汇变回报，并且凭借对被投资者的权力有能力影响该回报时，投资者控制被投资者。\n因此，当且仅当投资者满足以下条件时，投资者控制被投资者：\n（1）拥有对被投资者的权力；\n（2）因参与被投资者的活动而承担或有权获得可变回报；\n（3）通过对被投资者行使权力有能力影响所得到P1报的金额。”\n对于拥有控制要具备的条件之一“权力”。《企业会计准则第33号——合并财务报表》（2014年修订）第九条进行了规定：“投资方享有现时权利使其目前有能力主导被投资方的相关活动，而不论其是否实际行使该权利，视为投资方拥有对被投资方的权力。”\n《国际财务报告准则第10号——合并财务报表》也作了类似规定：\n“当投资者拥有现时权利，使其口前能够主导相关活动，即对被投资者回报具有重要影响的活动时，投资者对被投资者拥有权力。”\n“为了获得对被投资者的权力，投资者必须拥有赋予其当前能够主导相关活动的现时权利。”\n《企业会计准则第33号——合并财务报表（应用指南）》（2014年修订）和《国际财务报告准则第10号——合并财务报表》附录A都将“相关活动”定义为“对被投资者回报具有重大影响的活动”。\n同时，对于相关活动的界定，《企业会计准则第33号——合并财务报表（应用指南）》（2014年修订）和《国际财务报告准则第10号——合并财务报表》第B53段也给出类似的指引：“对于一些被投资者，相关活动仅在特定情况或者特定事件发生时存在。这类被投资者的活动及其回报在设计时就已确定，除非或者直至特定情况或特定事项发生。当这些特定情况或事项发生时，只有对被投资者回报具有重大影响的活动才能被视为相关活动。对于因具有相关活动决策能力而拥有权力的投资者，这些特定情况或事件不需要已经发生。决策权依赖于特定情况或特定事件发生这一事实本身不能被视为这些权利是保护性权利。”\n三、案例解析\n根据企业会计准则对于控制的定义，投资者只有在可以单方面决定被投资单位的财务和经营政策时，才可能拥有被投资单位的控制权。因此，在判断投资方是否控制被投资单位时，首先要确定被投资单位的相关活动。所谓相关活动，是指对被投资方的回报产生重大影响的活动。被投资方的相关活动应当根据具体情况进行判断，通常包括商品或劳务的销售和购买、金融资产的管理、资产的购买和处置、研究与开发活动以及融资活动等。准则对于控制的定义给出了系统、全面的指引。\n根据准则的规定，控制的条件之一是要拥有对于被投资方的权力，而权力是主导被投资方相关活动的现时权力，即为了获得对被投资者的权利，投资者必须拥有现时权利，使其能够主导被投资方的相关活动。相关活动，是对被投资者回报具有重大影响的活动。因此，A公司控制有限合伙企业的必要条件之一是A公司可以主导有限合伙企业的相关活动。\n在本案例中，有限合伙企业的活动包括两类：一类是日常活动，包括对委托贷款收取利息及本金，按照合伙协议约定的时间、比例和顺序向合伙人进行分配，以及有限合伙企业的其他日常事务；另一类是在特定事项发生时的活动，即在委托贷款违约不能偿还时管理违约贷款，向C公司追偿以及处置抵押资产。\n根据合伙协议，A公司作为普通合伙人，能够主导有限合伙企业的日常活动；在委托贷款出现违约时，管理违约贷款的相关决策由有限合伙企业的董事会全体董事一致通过作出决定，而有限合伙企业的董事会由A公司与B公司委派的董事构成，因此，A公司无法主导贷款违约后管理违约贷款的活动。\n准则将相关活动定义为“对被投资者回报具有重大影响的活动”。在本案例中，有限合伙企业的日常活动主要是收取利息和本金并按照合伙协议的规定向合伙人进行分配，这类活动是有限合伙企业按照合同规定“自动导航”状态下的活动，已经由合同事先确定和主导，对于有限合伙企业的回报没有重大影响。一旦委托贷款出现违约，如何管理违约贷款，如何向债务人追偿，以及如何处置抵押资产，将直接关系到有限合伙企业能否收回债权以及在多大程度上收回债权，从而对有限合伙企业的回报有重大影响。\n与日常活动存在不同，管理违约贷款的活动只有在贷款违约这一特定事件发生时才存在，但这并不影响此活动成为有限合伙企业的相关活动。应用指南中明确指出，对于活动及其回报在设计时就已确定的被投资者，相关活动仅在特定情况或者特定事件发生时才存在。\n综上所述，贷款违约后管理违约贷款的活动是有限合伙企业的相关活动，而A公司无法主导该活动。因此，A公司不具有对有限合伙企业的权力，不满足控制的必要条件，相应A公司无法控制有限合伙企业。\n值得注意的是，如果事实和情况表明A公司能够主导有限合伙企业的相关活动，则需要进一步分析A公司是否满足控制的其他条件，以确定A公司是否控制有限合伙企业。A公司通过管理费、作为次级有限合伙人获取的收益、作为普通合伙人获取的收益而享有有限合伙企业的可变回报，因此，应进一步分析A公司有无能力运用对有限合伙企业的权力影响其回报。这里应把上述途径享有的可变回报结合起来，考虑A公司享有的回报的规模和变动性，分析A公司是代表其自身行使权利，还是作为其他合伙人的代理人、代表其他合伙人行使权利。在分析A公司享有回报的规模和变动性时，应结合违约可能性、抵押品情况、A公司在有限合伙企业分享回报的顺序，测算有限合伙企业预期可以实现的回报，以及该回报中由A公司享有的绝对比例；同时应考虑有限合伙企业回报变动时，A公司享有的回报随之变动的程度，以及在不同回报情况下A公司享有回报的绝对比例。"}, {"title": "案例12-05 结构化主体纳入合并范围的判断", "content": "结构化主体，是指在确定其控制方时没有将表决权或类似权利作为决定因素而设计的主体。随着所有权和经营组织形式的多样化，上市公司参与合伙企业、信托计划、资产管理计划、资产支持证券、基金、理财产品等结构化主体的投资、发起设立或管理日益普遍和多样化。根据合并报表准则，对于发起设立、管理或投资的结构化主体，上市公司均应以控制为基础判断是否应将其纳入合并范围。\n一、案例背景\nA公司为一家建筑施T企业，B公司为一家资产管理公司，A公司与B公司共同出资成立有限合伙企业，双方出资比例分别为20%和80%；合伙企业无固定经营期限；A公司为合伙企业的普通合伙人及执行事务合伙人，B公司为有限合伙人。\n合伙协议约定，合伙企业拟投资项目为A公司及其子公司所负责建设的项目；普通合伙人根据投资决策委员会制定的战略投资方向进行项目筛选，执行项目调查、选择、谈判等工作；合伙企业设立投资决策委员会，由5名委员组成，普通合伙人提名4名，有限合伙人提名1名。相关决议须投资决策委员会2/3以上委员同意通过。合伙企业主要以贷款形式参与经投资决策委员会确定的项目，贷款的期限、利率和其他条件均由A公司确定。\n执行事务合伙人根据合伙企业实际收益情况，按实缴出资比例制定中期或年度收益分配方案，提交投资决策委员会审议通过后执行；在合伙企业清算时，将在支付所有费用偿付所有负债后，剩余的资产将按实缴出资比例向全体合伙人分配。\n问题：上述A公司持有合伙企业少数等比例份额情况下，是否应将该合伙企业纳入合并范围？\n二、会计准则及相关规定\n《企业会计准则第33号——合并财务报表》（2014年修订）第七条规定：“合并财务报表的合并范围应当以控制为基础予以确定。控制，是指投资方拥有对被投资方的权力，通过参与被投资方的相关活动而享有可变回报，并且有能力运用对被投资方的权力影响其回报金额。”\n《企业会计准则第33号——合并财务报表》（2014年修订）第八条规定：“投资方应当在综合考虑所有相关事实和情况的基础上对是否控制被投资方进行判断。一旦相关事实和情况的变化导致对控制定义所涉及的相关要素发生变化的，投资方应当进行重新评估。相关事实和情况主要包括：\n（一）被投资方的设立目的。\n（二）被投资方的相关活动以及如何对相关活动作出决策。\n（三）投资方享有的权利是否使其目前有能力主导被投资方的相关活动。\n（四）投资方是否通过参与被投资方的相关活动而享有可变回报。\n（五）投资方是否有能力运用对被投资方的权力影响其回报金额。\n（六）投资方与其他方的关系。”\n《企业会计准则第33号——合并财务报表（应用指南）》（2014年修订）中指出：“其他可变回报的例子包括……3．其他利益持有方无法得到的回报。例如，投资方将自身资产与被投资方的资产一并使用，以实现规模经济，达到节约成本、为稀缺产品提供资源、获得专有技术或限制某些运营或资产，从而提高投资方其他资产的价值。”\n三、案例解析\n在本案例中，A公司仅持有合伙企业20%的股权，其是否拥有合伙企业的控制权，应结合相关事实和情况分析如下：\n第一，合伙企业设立目的是为A公司及其子公司的工程施工项目提供资金。从设立目的而言，A公司更有动机也更有能力主导合伙企业的相关活动，该因素在判断控制的各环节都应予以考虑。\n第二，合伙企业的相关活动包括投资项目的筛选与决策以及所投资项目的管理。投资项目的筛选将直接影响未来投资回报；在确定投资项目后，以何种方式投资建设项目、对投资项目的管理方式和模式以及所投资项目的利润分配方式等安排都将在很大程度上影响合伙企业的可变回报。\n第三，对于投资项目的筛选与决策由投资决策委员会决策，公司占有2/3以上的表决权，在该活动上拥有实质性权利；所投项目的管理由执行事务合伙人（即A公司）代表合伙企业行使，且所投项目都是公司及其下属子公司承建的项目，公司在所投项目管理上也拥有实质性权利，即A公司拥有对合伙企业所有主要相关活动的实质性权力。\n第四，对于享有的可变回报，合并财务报表准则应用指南中指出，因参与被投资方的相关活动而享有的可变回报，应包括其他可变回报，如“其他利益持有方无法得到的回报。例如，投资方将自身资产与被投资方的资产一并使用，以实现规模经济，达到节约成本、为稀缺产品提供资源、获得专有技术或限制某些运营或资产，从而提高投资方其他资产的价值”。\n综上所述，A公司设立和参与该合伙企业的可变回报，一是通过持有20%的权益份额享有合伙企业的利润分配；二是其他可变回报，包括规模经济和成本节约带来的回报（如A公司可以根据需要，灵活地、最优化地将最低资金成本运用于其工程项目建设之中，通过资源优化配置节约成本）、通过管理合伙企业所投资项目以及影响其收益分配而获得可变回报（如可以通过对投资项目的筛选、合伙企业所投资项目的工程投入及建设成本的控制以及所投资项目收益在合伙企业和A公司其他单位之间的分配比例等获得可变回报）等，因此尽管根据持股比例享有的合伙企业利润分配较低，但其从该合伙企业所获得其他回报却是非常明显的。\n第五，与其他方的关系，资产管理公司作为有限合伙人，只享有投资决策委员会的一个席位，且投资决策委员会的相关决议需投资决策委员会2/3以上委员同意即可通过，可见其他方并不能在投资决策委员会上阻止A公司的主导权力。\n综上所述，除非存在其他明确的相反证据，A公司对合伙企业构成控制，应将其纳入合并范围。\n【相关案例之一】\n（一）案例背景\n2x14年，A公司与B股权投资管理合伙企业合资设立C并购基金（法律形式为有限合伙企业），存续期5年。根据双方签订的框架协议，该并购基金设立目的主要是作为A公司产业并购整合的平台，以股权形式投资于A公司产业链中上下游的公司。A公司作为C基金的唯一劣后级有限合伙人（LP）出资50%，B合伙企业作为普通合伙人（GP）出资0.01%，剩余部分由双方共同募集。\n该基金设立投资委员会，其中GP和A公司分别委派2名委员，项目的投资与退出决策均由投资委员会作出，必须经3名以上委员的同意方可通过，A公司拥有一票否决权。GP委派的代表人选需由A公司同意。\nGP每年向合伙企业按项目投资额的1%收取管理费。在每个项目退出时（每个项目的合伙人份额占比根据并购基金合伙人份额占比确定），并购基金对其可分配收益按如下顺序进行分配：（1）支付给GP的固定管理费及其他相关税费；（2）GP和优先级LP本金；（3）GP和优先级LP按固定收益率计算的投资收益；（4）劣后级LP投资本金；（5）上述之外剩余金额在GP和劣后级LP之间按20%和80%比例分配。\n此外，根据协议，对于所有投资项目在基金管理下运营满3年或基金到期清算前半年，GP有权选择要求A公司受让基金持有的该投资项目的全部或部分股权，受让价格应保证本金加上固定收益率。\n问题：A公司是否应将该并购基金纳入合并范围？\n（二）案例解析\n主导结构化主体相关活动的依据通常是合同安排或其他安排，在实务中存在多种形式，投资方作为有限合伙人还是普通合伙人参与结构化主体对于其是否“控制”并不是决定性因素。公司应根据被投资单位的管理和投资的决策机制等判断是否拥有权力，如果投资方拥有项目管理等活动的决策权或主导被投资单位经营方向的权力，并享有被投资单位重大可变回报及其可变动性，应将被投资单位纳入合并范围。\n在本案例中，A公司作为并购基金的唯一劣后级有限合伙人，是否需要合并该并购基金，应根据准则相关规定结合相关事实和情况从以下方面予以分析：\n第一，A公司设立该并购基金的目的是作为A上市公司产业并购整合平台，投资于其产业链中上下游的公司。同时，A上市公司在该并购基金设立时的安排，包括认购全部劣后级份额、承担劣后偿付的风险以及将以固定金额回购并购基金所投资股权的承诺，显示出A公司承担了重大的回报可变性，表明其有动机获取对并购基金的权力。\n第二，确定并购基金的相关活动是投资项目的选择、管理及退出。根据相关协议，并购基金筹集基金在投资方向范围内选择投资项目，对投资项目进行经营管理，并确定适当的退出方式。无论投资项目的选择、投资项目的经营管理还是投资项目的退出，都会直接影响并购基金的投资回报，因此影响并购基金可变回报的相关活动包括投资项目的选择、管理与退出等。\n根据相关协议，项目的投资与退出决策均由投资委员会作出，必须经3名以上委员的同意方可通过，虽然公司仅占半数表决权，但普通合伙人所委派的代表人需由A公司同意，且A公司对于投资委员会的决策具有一票否决权，从而实际上间接控制投资委员会。\n第三，投资方是否通过参与被投资方的相关活动而享有可变回报，且有能力运用对被投资方的权力影响其回报金额。\n从投资收益分配顺序而言，A公司作为劣后级有限合伙人，其本金的收回和浮动收益的分配顺序均在普通合伙人和优先级有限合伙人的本金和固定投资收益分配之后，相当于其以投资本金为限为普通合伙人和优先级有限合伙人的本金及收益的收回提供担保，同时其享有80%的超额收益；\n此外，其承诺在特定情形下按本金加上固定收益率回购基金拥有的被投资项目的股权，表明A公司承担了该并购基金绝大部分的风险和报酬波动，从可变回报的量级和可变动性而言都是重大的，且其可通过投资委员会的权利和项目管理等方面权利，带来可变回报。\n此外，《企业会计准则第33号——合并财务报表（应用指南）》（2014年修订）中指出因参与被投资方的相关活动而享有的可变回报，应包括其他可变回报，如“其他利益持有方无法得到的回报。例如，投资方将自身资产与被投资方的资产一并使用，以实现规模经济，达到节约成本、为稀缺产品提供资源、获得专有技术或限制某些运营或资产，从而提高投资方其他资产的价值”。A公司通过并购基金，以股权形式投资于A公司产业链中上下游的公司，能获得协同效应、规模经济等其他投资方无法得到的其他可变回报。\n第四，关于与其他方的关系，普通合伙人虽然为执行事务合伙人，并在投资委员会中派有代表，但其决策权比较有限，其获得的投资回报为1%的固定管理费和20%的超额业绩报酬，且普通合伙人有权选择要求A公司以本金加上固定收益率受让基金持有的该投资项目的全部或部分股权，从可变回报的量级和变动性相对A公司而言都不重大。\n综上所述，A上市公司虽为合伙企业的有限合伙人，但除非存在其他明确的相反证据，其很可能对该并购基金构成控制，应将其纳入合并范围。\n【相关案例之二】\n（一）案例背景\nA公司参与B公司发起设立的产业基金，产业基金首期规模为30亿元，A公司作为唯一劣后级有限合伙人，认购其中的10亿元劣后基金份额，其承担产业基金的损失以其本金为限。执行事务合伙人为B公司。根据产业基金的募集说明书，该产业基金投资标的为设立一家贸易公司，并向该贸易公司提供股东借款，以便贸易公司开展业务。贸易公司实行董事会领导下的总经理负责制，董事会由5名董事组成，均由产业基金委派。其中，2名应由B公司指定，3名应由A公司指定。贸易公司的经营、财务等相关活动的决策均由董事会作出。董事会议事机制为过半数表决通过。贸易公司的总经理人员由A公司推荐，董事会通过任免。\n问题：A公司是否应将该产业基金纳入合并范围？\n（二）案例解析\n主导结构化主体相关活动的依据通常是合同安排或其他安排，在实务中存在多种形式，投资方作为有限合伙人还是普通合伙人参与结构化主体对于其是否控制并不是决定性因素。公司应根据被投资单位的管理和投资的决策机制等判断是否拥有权力，如果投资方拥有项目管理等活动的决策权或主导被投资单位经营方向的权力，并享有被投资单位重大可变回报及其可变动性，应将被投资单位纳入合并范围。\n在本案例中，A公司作为产业基金的劣后级有限合伙人，是否需要合并该并购基金，应根据准则规定结合相关事实和情况从以下方面予以分析：\n第一，A公司参与发起设立该产业基金，从该产业基金设计安排来看，产业基金的主要目的是设立一家贸易公司，A公司负责产业基金设立的贸易公司的管理及运营，且A公司认购了该产业基金的全部劣后级份额、承担劣后偿付的风险，这表明其更有动机也更有能力主导产业基金的相关活动，该点在判断控制的各环节均应予以考虑。\n第二，产业基金投资标的为设立一家贸易公司，产业基金为该贸易公司提供股东借款，其相关活动包括对贸易公司的经营管理以及对贸易公司违约风险的管理。\n第三，产业基金投资的该贸易公司实行董事会领导下的总经理负责制，A公司在5个董事席位中占据3席，且董事会议事机制为过半数表决通过，因此A公司很可能能够通过控制贸易公司的董事会拥有主导产业基金投资和经营方向的权力，同时当贸易公司的股东借款发生违约时，对于股东借款拥有回收管理的权力。\n第四，A公司作为产业基金唯一劣后级，其将享有重大可变回报，且与其他投资方相比承担了更大的回报变动性。其拥有的对贸易公司管理及运营以及对贷款信用风险管理的权力，将影响其可变回报。\n综上所述，A公司很可能拥有对产业基金的控制权，应将其纳入合并范围。\n【相关案例之三】\n（一）案例背景\nB信托公司受托管理一项信托计划，期限为10年，信托财产将主要投资于上市公司股票质押贷款。该信托计划资金分为优先级信托资金和次级信托资金。信托计划存续期内，受托人有权设立优先级信托受益权开放期，但优先级信托资金和与该时点信托计划实际存续的次级信托资金的比例不超过9：1。由于基础资产是有较好质押物增信的债务投资，整体风险波动导致本金亏损达到10%以上的可能性较小。优先级受益人在申购信托单位时将设有预期年化收益率，享有预期信托收益和信托资金的优先分配权；次级份额不设固定收益率，用于吸收来自信用/利率风险的初始损失以保护优先级投资者，并且获取所有剩余回报；B信托公司收取0.7%的固定信托管理费。\nA证券公司认购B信托计划100%的次级信托单位。全体委托人指定A证券公司为信托计划的委托人代表，和受托人B信托公司共同对信托计划的投资进行决策并对投资项目进行管理。A证券公司和B信托公司对项目的共同管理，通过双方签署“合作协议”来约定。根据“合作协议”：投资管理执行小组由6名委员组成，其中A证券公司和B信托公司各委派3名。根据投资管理的执行条款，所有类型的投资决策都需要双方的委员同意才可执行。根据合同条款，由A证券公司负责推荐投资项目，B信托公司对A证券公司所推荐的项目所涉合法合规性、风险控制与保障措施是否达到信托计划要求进行审查，审查不符合条件的，有权决定不予立项；由A证券公司制定每期优先级信托单位发行安排，方案包括信托计划优先级信托单位的预期存续期限、预期收益率、期限错配比例等要素，但方案须由双方投资经理签字或加盖业务授权章确定后实施。\n问题：在上述享有共同管理权的情况下，A证券公司是否应合并B信托计划？\n（二）会计准则及相关规定\n《企业会计准则第33号——合并财务报表》（2014年修订）第十一条规定：“投资方在判断是否拥有对被投资方的权力时，应当仅考虑与被投资方相关的实质性权利，包括自身所享有的实质性权利以及其他方所享有的实质性权利。实质性权利，是指持有人在对相关活动进行决策时有实际能力行使的可执行权利。判断一项权利是否为实质性权利，应当综合考虑所有相关因素，包括权利持有人行使该项权利是否存在财务、价格、条款、机制、信息、运营、法律法规等方面的障碍；当权利由多方持有或者行权需要多方同意时，是否存在实际可行的机制使得这些权利持有人在其愿意的情况下能够一致行权；权利持有人能否从行权中获利等。某些情况下，其他方享有的实质性权利有可能会阻止投资方对被投资方的控制。这种实质性权利既包括提出议案以供决策的主动性权利，也包括对已提出议案作出决策的被动性权利。”\n《企业会计准则第33号——合并财务报表》（2014年修订）第十二条规定：“仅享有保护性权利的投资方不拥有对被投资方的权力。保护性权利，是指仅为了保护权利持有人利益却没有赋予持有人对相关活动决策权的一项权利。保护性权利通常只能在被投资方发生根本性改变或某些例外情况发生时才能够行使，它既没有赋予其持有人对被投资方拥有权力，也不能阻止其他方对被投资方拥有权力。”\n（三）案例解析\n在本案例中，A证券公司与B信托公司共同管理信托计划，A证券公司是否应合并该信托计划，实务界可能存在两种观点：\n一种观点认为不合并。其理由为：尽管A证券公司持有信托计划的100%的劣后级权益，承担了信托计划收益的绝大部分“可变动性”，但由于A证券公司与B信托公司是共同管理信托计划，且双方在决策机构中各占50%的席位，所有的投资决策和融资决策，均需要双方共同同意才可执行，A证券公司不拥有控制三要素中的权力；虽然B信托公司仅享有固定的管理费，但其管理费也将随着信托规模的扩大而增加，其因管理信托计划，也存在相应的声誉风险，其存在动力行使投资和融资决策权使信托计划收益最大化。因此A证券公司不拥有绝对的权力，不构成控制。\n另一种观点认为应合并。理由为：作为100%的劣后级权益人，A证券公司承担了信托计划的绝大部分“可变动性”，同时，B信托公司仅从该信托计划中获得与市场水平相当的固定的信托管理费。从信托产品的设计来看，对可变回报影响最大的相关活动为投资决策以及筹资决策（优先级信托单位发行安排）。从投资决策上而言，A证券公司负责推荐投资项目，而B信托公司仅对其所涉及的合法合规性、风险控制与保障措施是否达到要求而进行审查，该权利并非实质性权利；从融资决策上而言，A证券公司制定相应发行安排，包括与可变回报相关的期限、收益、错配等关键要素的设定，而B信托公司仅执行程序性审查盖章流程，不拥有融资决策的实质性权利。因此认为，A证券公司对B信托计划拥有实质性权利，并通过权利可获得重大部分可变回报，应合并信托计划。\n上述案例的关键是，要结合实务来判断B信托公司对项目所涉合法合规性、风险控制与保障措施等进行审查是否为一项实质性权利，如果只是根据法律法规要求或相关协议中已经明确约定的要求和条件进行程序性审批（如并未违反法律法规或协议中约定要求和条件就没有理由不予审批通过），则表明B信托公司的权利并非实质性权利，其仅作为代理人身份行使决策权，A证券公司应合并该信托计划。\n【相关案例之四】\n（一）案例背景\nA上市公司原持有W公司100%的股权。2x19年，A公司将所持W公司1%的股权转让给关联方B公司，交易作价200万元。同时，A公司与B公司共同出资设立一家有限合伙企业。A公司作为有限合伙人，以所持W公司99%股权出资作价1.99亿元，对应合伙份额99.5%，B公司作为普通合伙人，以货币认缴出资100万元，对应合伙份额0.5%。\n合伙企业的设立目的在于发展基于农业节水灌溉而衍生的大数据业务。合伙企业的投资标的限制为单一标的即W公司。W公司现处于创业期，研发产品尚在初期投入阶段，处于亏损周期。\n合伙企业协议约定，A公司作为有限合伙人是投资者身份，只以出资对合伙企业负有限责任，对合伙企业不具有经营管理权。B公司作为执行事务合伙人，行使合伙企业的日常管理职责。在执行事务合伙人未违反法律规定及合伙协议约定的情况下，A公司不能罢免执行事务合伙人；未经双方充分沟通达成一致，A公司亦无权自行更改合伙协议的关键性条款。合伙协议约定的收益分配原则为：普通合伙人为A公司承担保底收益3%以上的义务；如果收益超过6%，优先分配给A公司6%的收益，然后分配给普通合伙人25%的超额收益，剩余收益按照出资比例分配给全体合伙人。如果投资回报达不到每年3%的固定收益，由普通合伙人自合伙企业清算后的剩余财产予以弥补，仍不足以支付时，由普通合伙人以其自有资产予以弥补至3%。\n问题：上述交易完成后，A公司是否继续将W公司纳入合并范围？\n（二）会计准则及相关规定\n《企业会计准则第33号——合并财务报表》（2014年修订）第十五条规定：“当表决权不能对被投资方的回报产生重大影响时，如仅与被投资方的日常行政管理活动有关，并且被投资方的相关活动由合同安排所决定，投资方需要评估这些合同安排，以评价其享有的权利是否足够使其拥有对被投资方的权力。”\n《企业会计准则第33号——合并财务报表（应用指南）》（2014年修订）进一步指出：“由于主导结构化主体的相关活动不是来自表决权（或类似权利），而是由合同安排决定，这无形中加大了投资方有关是否拥有对该类主体权力的判断难度。本准则第十五条规定，投资方需要评估合同安排，以评价其享有的权利是否足够使其拥有对被投资方的权力。在评估时，投资方通常应考虑下列四个方面：\n（1）在设立被投资方时的决策及投资方的参与度。在评估被投资方的设立目的和设计时，投资者应考虑设立被投资方时的决策及投资方的参与度，以判断相关交易条款与参与特点是否为投资方提供了足以获得权力的权利。参与被投资方的设立本身虽然不足以表明参与方控制被投资方，但可能使参与方有机会获得使其拥有对被投资方权力的权利。\n（2）相关合同安排。投资方需考虑结构化主体设立之初的合同安排是否赋予投资方主导结构化主体相关活动的权利。例如，看涨期权、看跌期权、清算权等可能为投资方提供权力的合同安排。在评估对结构化主体是否拥有权力时，应当考虑投资方在这些合同安排中享有的决策权。\n（3）仅在特定情况或事项发生时开展的相关活动。结构化主体的活动及其回报在其设计时就已经明确，除非特定情况或事项发生。当特定情况或事项发生时，只有对结构化主体回报产生重大影响的活动才属于相关活动。相应地，对这些相关活动具有决策权的投资方才享有权力。决策权依赖于特定情况或特定事件的发生这一事实本身并不表示该权利为保护性权利。\n（4）投资方对被投资方作出的承诺。为确保结构化主体持续按照原定设计和计划开展活动，投资方可能会作出一些承诺（包括明确的承诺和暗示性的承诺），因而可能会扩大投资方承担的可变回报风险，由此促使投资方更有动机获取足够多的权利，使其能够主导结构化主体的相关活动。投资方作出的确保此类主体遵守原定设计经营的承诺可能是投资方拥有权力的迹象，但其本身并不赋予投资方权力，也不会阻止其他方拥有权力。\n另外，结构化主体在设立后的运营中，由其法律上的权力机构表决的事项通常仅与行政事务相关，表决权对投资方的回报往往不具有重大的直接联系。因此，投资方在评估结构化主体设立目的和设计时，应考虑其被专门设计用于承担回报可变性的类型、投资方通过参与其相关活动是否承担了部分或全部的回报可变性等。”\n（三）案例解析\n本案例所述的交易完成后，A公司是否继续将W公司纳入合并范围取决于A公司是否对其作为有限合伙人所参与设立的合伙企业存在控制。\nA公司在评估是否应将合伙企业纳入合并范围时，应考虑以下方面：\n一是合伙企业的设立目的在于发展基于农业节水灌溉而衍生的大数据业务，其投资标的限制为单一标的即W公司。从设立目的而言，A公司更有动机也更有能力主导合伙企业的相关活动，该因素在判断控制的各环节都应予以考虑。\n二是结构化主体的活动及其回报在其设计时就已经明确，除非特定情况或事项发生。当特定情况或事项发生时，只有对结构化主体回报产生重大影响的活动才属于相关活动。如果A公司以W公司99%的股权向合伙企业出资后，W公司未改变相关经营管理团队，则说明标的公司的相关活动很可能仍受A公司（LP）主导。合伙协议赋予B公司（GP）的经营管理权力只是形式上的权力，不构成对合伙企业控制判断的决定性因素。\n三是普通合伙人B公司是否实质承担了兜底责任。普通合伙人承担保底收益的安排，该条款是否具有实质性，取决于合伙企业的经营业绩实现情况以及普通合伙人的支付能力。对于承诺3%保底收益，需要进一步明确计算基数和实现的难易度，以判断其是否具有实质性。此外，还需明确条款约定的“普通合伙人以其自有资产予以弥补至3%”中的“自有资产”是否限于其投入的100万元出资，还是会以其他资产补足，以及普通合伙人B公司的具体财务状况和支付能力如何。如果B公司是壳公司，并不具备实质性的支付能力，则有限合伙人A公司才是实际上最终承担风险的一方。\n综上所述，除非存在其他明确的相反证据，A公司很可能对合伙企业拥有控制，应将其纳入合并范围，从而应继续将W公司纳入合并报表范围。"}, {"title": "案例12-06 控制时点的判断", "content": "一、案例背景\n2x14年A公司与B公司等战略投资者共同投资设立C公司。A公司以其闲置生产线出资，股权占比为50%；B公司及其他投资者以货币出资，股权占比分别为38%和12%。根据A公司与B公司以及其他投资者签订的“合作投资经营协议”，B公司对C公司进行内部承包经营，由其享有并承担C公司的全部经营损益，A公司及其他投资方收取固定回报。由于C公司正常生产经营、业务开展须以取得安全生产许可证为前提，协议同时约定A公司全权负责申请办理生产许可证相关事宜，如因A公司或政策原因未能取得生产许可证导致不能实现合作投资经营协议的目的时，所有前期费用均由A公司承担，其他方通过清算或者根据原始出资额将股权转让给A公司。\nC公司章程约定，C公司权力机构为董事会，董事会由5人组成，其中A公司委派3人。董事会审议事项采取4/5（含）多数通过来决定，但与取得安全生产许可证相关的一切事宜由A公司委派的董事独立决策，无须取得其他董事同意。C公司的经营管理层主要由作为承包经营方的股东B公司委派，包括总经理、财务总监等。\n最终，C公司安全生产准入问题未能得到解决，合作投资经营的目的无法实现，投资各方同意对C公司进行清算解散。2x15年7月31日，B公司及其他战略投资者将其持有的C公司股权转让给A公司。股权转让完成后，A公司持有C公司100%股权。A公司自2x15年8月1日起将C公司纳入合并范围，在此之前将对C公司的投资作为金融工具进行核算。\n问题：A公司将C公司纳入合并报表范围的时点是否合理？\n二、会计准则及相关规定\n《企业会计准则第33号——合并财务报表》（2014年修订）第七条规定：“合并财务报表的合并范围应当以控制为基础予以确定。控制，是指投资方拥有对被投资方的权力，通过参与被投资方的相关活动而享有可变回报，并且有能力运用对被投资方的权力影响其回报金额。本准则所称相关活动，是指对被投资方的回报产生重大影响的活动。被投资方的相关活动应当根据具体情况进行判断，通常包括商品或劳务的销售和购买、金融资产的管理、资产的购买和处置、研究与开发活动以及融资活动等。”\n《企业会计准则第33号——合并财务报表》（2014年修订）第八条规定：“投资方应当在综合考虑所有相关事实和情况的基础上对是否控制被投资方进行判断。一旦相关事实和情况的变化导致对控制定义所要求的相关要素发生变化的，投资方应当进行重新评估。相关事实和情况主要包括：（一）被投资方的设立目的。（二）被投资方的相关活动以及如何对相关活动做出决策。（三）投资方享有的权利是否使其目前有能力主导被投资方的相关活动（四）投资方是否通过参与被投资方的相关活动而享有可变回报。（五）投资方是否有能力运用对被投资方的权力影响其回报金额。（六）投资方与其他方的关系。”\n三、案例解析\n企业在其完整的生命周期内存在不同的发展阶段，主要包括发起设立、正常运营、经营模式转变直至破产清算，当企业处于这些不同的阶段时，其相关活动可能存在重大的区别。因此，投资企业对被投资企业是否存在控制的判断并非一成不变，而是可能随着被投资企业处于不同的发展阶段、涉及不同的相关活动而不同。正因如此，企业会计准则要求投资方一旦发现相关事实和情况的变化导致对控制定义所涉及的相关要素发生变化时，需要进行重新评估。被投资方的相关活动以及如何对相关活动作出决策这一因素也被作为相关事实和情况变化的具体举例在准则正文中予以明确：\n在本案例中，C公司的正常生产经营、业务开展须以取得安全生产许可证为前提，取得该许可证是一项实质性而非简单行政性的活动。因此，C公司至少存在两个发展阶段，即获取安全生产许可证前的前期筹建阶段和获取安全生产许可证后的正常生产经营阶段。2x14年，C公司尚处于设立初期，安全生产许可证尚未取得，其筹建阶段的主要相关活动即为安全生产许可证的申请办理活动。按照协议约定，该活动由A公司全权负责，这表明A公司在前期筹建阶段对C公司拥有权力。同时，协议约定如因A公司或政策原因不能取得生产许可证导致不能实现合作投资经营协议目的，所有前期费用由A公司承担，这一约定则表明A公司承担了前期筹建阶段全部的可变回报与风险。基于上述情况可以得出结论，A公司在C公司的前期筹建阶段一直对其具有控制，应自设立之日起就将其纳入合并财务报表的合并范围。\n在本案例中，如果最终C公司正常取得安全生产许可证，进入由B公司对C公司内部承包经营的正常生产经营阶段，则应关注委托经营的商业目的和经济实质，结合承包经营协议关于承包经营期限、重大投资、融资等决策上存在重大限制的具体约定；受托经营期间损益分配的回报，公司整体价值变动的报酬和风险的分享和承担等各项约定，就相关方对C公司相关活动的权力、享有可变回报以及是否有能力运用对被投资方的权力影响其回报金额进行综合分析，对C公司的实际控制方另行判断。\n【相关案例】\n（一）案例背景\n2x19年，上市公司Z公司向关联方N公司转让全资子公司D公司51%的股权，交易作价2.41亿元。N公司与Z公司由同一实际控制人控制。标的公司D公司的主要经营业务是股权投资，持有G上市公司1.79亿股股票，限售期至2x20年2月，此外无其他投资。根据Z公司与N公司签订的《股权转让协议》约定特定情形下，例如“甲方未能在协议生效两个月内完成工商变更，或乙方未能于2x20年4月30日前支付全部转让价款，可解除协议并放弃本交易。”\n股权转让交易过程涉及的相关时间节点如下：\n1．Z公司于2x19年6月26日召开股东大会审议通过上述关于转让D公司部分股权的议案；\n2．D公司股权变更的工商登记日期为2x19年8月6日；\n3．根据D公司于2x19年7月21日修订的章程和公司出具的情况说明，D公司的法定代表人、执行董事、总经理均为Z公司的财务总监，直至2x19年12月9日才对上述职位进行人员变更并完成工商登记；\n4．2x19年12月10日、11日，N公司向Z公司支付3笔股权转让款合计1.46亿元，占股权转让款总金额的比例为60.75%。\nZ公司认定于2x19年6月26日对D公司丧失控制权，剩余49%股权的公允价值为2.32亿元，于合并层面确认投资收益5.27亿元。\n问题：Z公司认定2x19年6月26日对D公司丧失控制权是否恰当？\n（二）案例解析\n本案例中，虽然该笔股权转让属于关联交易，触发解除协议并最终放弃交易的可能性不大，但是Z公司于2x19年6月26日股权转让议案通过股东大会后就直接认定丧失对D公司的控制权，缺乏充分、谨慎的判断。在关联方之间的股权转让交易中，判断控制权的具体转移时点往往相较非关联方之间的交易要更为困难。本案例中，考虑到标的公司的法定代表人、执行董事、总经理在2x19年6月26日仍为Z公司的财务总监，直至2x19年12月9日才被进行人员变更。也就是说，在该人员变更之前Z公司仍然有权力决定D公司的主要经营和财务政策，以及2x19年12月Z公司才收到超过半数的股权转让款。综上，在没有其他明确相反证据的情况下，可视为相关控制权至2x19年12月才发生转移。"}, {"title": "案例12-07 清算阶段的子公司是否纳入合并报表范围", "content": "一、案例背景\n2x11年2月，上市公司B公司与其他自然人股东出资设立子公司A公司，B公司持有A公司60%的股份，具有控制权，2x11年度将其纳入合并报表范围。2x12年12月，B公司由于内部业务整合，决定对A公司进行清算。2x13年1月，A公司通过股东会决议成立清算组，清算组由各股东组成。截至2x13年12月31日清算尚未完成，B公司未将A公司纳入2x12年、2x13年合并报表范围（假设A公司2x12年和2x13年期末净资产均大于零）。\n问题：B公司是否应将A公司纳入2x12年、2x13年合并报表范围？\n二、会计准则及相关规定\n《企业会计准则第33号——合并财务报表》（2014年修订）第七条规定：“合并财务报表的合并范围应当以控制为基础予以确定。控制，是指投资方拥有对被投资方的权力，通过参与被投资方的相关活动而享有可变回报，并且有能力运用对被投资方的权力影响其回报金额。\n本准则所称相关活动，是指对被投资方的回报产生重大影响的活动。被投资方的相关活动应当根据具体情况进行判断，通常包括商品或劳务的销售和购买、金融资产的管理、资产的购买和处置、研究与开发活动以及融资活动等。”\n《企业会计准则第33号——合并财务报表》（2014年修订）第十三条规定：“除非有确凿证据表明其不能主导被投资方相关活动，下列情况，表明投资方对被投资方拥有权力：\n（一）投资方持有被投资方半数以上的表决权的。\n（二）投资方持有被投资方半数或以下的表决权，但通过与其他表决权持有人之间的协议能够控制半数以上表决权的。”\n《企业会计准则第33号——合并财务报表》（2014年修订）第十七条规定：“投资方自被投资方取得的回报可能会随着被投资方业绩而变动的，视为享有可变回报。投资方应当基于合同安排的实质而非回报的法律形式对回报的可变性进行评价。”\n《企业会计准则第33号——合并财务报表（应用指南）》（2014年修订）指出，“其他可变回报的例子包括：\n1．股利、被投资方经济利益的其他分配（例如，被投资方发行的债务工具产生的利息）、投资方对被投资方投资的价值变动。\n2．因向被投资方的资产或负债提供服务而得到的报酬、因提供信用支持或流动性支持收取的费用或承担的损失、被投资方清算时在其剩余净资产中所享有的权益、税务利益，以及因涉入被
