<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>超级鹿鼎公 · 投资文集</title>
<style>
:root{--bg:#fdfaf6;--card:#fff;--border:#e5dccf;--text:#2c2416;--text2:#6b5e4a;--accent:#8b4513;--gold:#c4a64a}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:"PingFang SC","Hiragino Sans GB","Songti SC","STSong",serif;font-size:16px;line-height:1.9}
.header{background:linear-gradient(135deg,#2c1810,#4a3020,#6b3a20);color:#e8d5b7;padding:48px 32px;text-align:center;border-bottom:3px solid var(--gold)}
.header h1{font-size:28px;letter-spacing:6px;font-weight:500;margin-bottom:8px}
.header .tagline{font-size:13px;opacity:0.65;letter-spacing:2px}
.layout{display:flex;max-width:1300px;margin:0 auto}
.sidebar{width:180px;background:#fff;border-right:1px solid var(--border);padding:20px 0;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0;z-index:10}
.sidebar h3{font-size:9px;text-transform:uppercase;color:#b5a590;letter-spacing:2px;padding:0 16px 10px}
.sidebar a{display:block;padding:7px 16px;font-size:11px;color:var(--text2);text-decoration:none;border-left:3px solid transparent;transition:all 0.15s;cursor:pointer}
.sidebar a:hover{background:rgba(139,69,19,0.04)}
.sidebar a.active{background:rgba(139,69,19,0.06);color:var(--accent);border-left-color:var(--gold);font-weight:600}
.content{flex:1;padding:32px 40px 80px;max-width:850px}
.chapter-divider{text-align:center;margin:48px 0 32px;position:relative}
.chapter-divider::before{content:'';position:absolute;left:0;right:0;top:50%;height:1px;background:var(--border)}
.chapter-divider span{position:relative;display:inline-block;background:var(--bg);padding:0 20px;font-size:15px;color:var(--accent);font-weight:600;letter-spacing:2px}
.page-block{margin-bottom:32px;scroll-margin-top:20px}
.page-block .pg-label{font-size:10px;color:var(--text2);opacity:0.35;margin-bottom:8px}
.text-block{padding:20px 24px;background:var(--card);border-radius:8px;border:1px solid var(--border);margin-bottom:16px}
.text-block .post{margin-bottom:20px}
.text-block .post:last-child{margin-bottom:0}
.text-block .post .date{font-size:11px;color:var(--gold);margin-bottom:10px}
.text-block .post p{margin-bottom:8px;text-indent:2em}
.text-block .post p:last-child{margin-bottom:0}
.text-block .post .reply{font-size:14px;color:var(--text2);margin:4px 0 4px 16px;text-indent:0;padding-left:10px;border-left:2px solid var(--border)}
.text-block .post .reply .who{color:var(--accent);font-weight:600}
.text-block.toc{font-size:14px;line-height:2.2}
.text-block.toc .ch-title{font-weight:600;color:var(--accent);margin-top:14px;text-indent:0}
.text-block.toc .ch-item{margin:2px 0 2px 16px;text-indent:0;font-size:13px;color:var(--text2)}
.img-block{text-align:center;margin-bottom:16px}
.img-block img{max-width:100%;border:1px solid var(--border);border-radius:4px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.float-nav{position:fixed;bottom:24px;right:24px;display:flex;gap:6px;z-index:100}
.float-nav button{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:#fff;color:var(--text2);font-size:16px;cursor:pointer;transition:all 0.15s;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.float-nav button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.float-nav .pg-indicator{display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text2);opacity:0.5;background:#fff;border-radius:18px;padding:0 12px;border:1px solid var(--border);min-width:60px}
@media(max-width:900px){.sidebar{display:none}.content{padding:20px}.float-nav{bottom:16px;right:16px}}
</style>
</head>
<body>
<div class="header"><h1>超级鹿鼎公 · 投资文集</h1><div class="tagline">价值选股 · 趋势选时 · 估值定仓 · 波动降本</div></div>
<div class="layout"><nav class="sidebar" id="sidebar"></nav><main class="content" id="content">加载中...</main></div>
<div class="float-nav"><button onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button><span class="pg-indicator" id="floatPg"></span><button onclick="window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'})">↓</button></div>
<script>
console.log("SCRIPT LOADED");
var ocrData={};
var TOTAL=414,IMG_BASE='pages/';
var chapters=[{name:"关于本书",start:1,end:3},{name:"目录",start:4,end:9},{name:"一、投资的理念",start:10,end:63},{name:"二、技术分析及交易",start:64,end:84},{name:"三、大盘和个股",start:85,end:90},{name:"四、关于风险",start:91,end:103},{name:"五、产业与周期",start:104,end:186},{name:"六、煤炭和电力能源",start:187,end:240},{name:"七、人口与趋势",start:241,end:333},{name:"八、局势及竞争",start:334,end:351},{name:"九、闲言碎语",start:352,end:414}];
function pad(n){return String(n).padStart(3,'0')}

console.log("Fetching OCR data...");
fetch('ocr.json')
.then(function(r){return r.json()})
.then(function(data){
  console.log("OCR loaded:",Object.keys(data).length,"pages");
  ocrData=data;
  buildSidebar();
  renderAll();
  initScrollSpy();
  initLazyLoad();
})
.catch(function(e){console.log("OCR fetch error:",e);buildSidebar();renderAll();initScrollSpy()});

function buildSidebar(){
  var sb=document.getElementById('sidebar');
  sb.innerHTML='<h3>📖 目录</h3>';
  for(var i=0;i<chapters.length;i++){
    var ch=chapters[i];var a=document.createElement('a');
    a.innerHTML=ch.name+'<span style="font-size:9px;opacity:0.4;margin-left:4px">p.'+ch.start+'</span>';
    a.onclick=(function(pg){return function(e){e.preventDefault();var el=document.getElementById('pg'+pg);if(el)el.scrollIntoView({behavior:'smooth'})}})(ch.start);
    sb.appendChild(a);
  }
}

function initScrollSpy(){
  var ticking=false;
  window.addEventListener('scroll',function(){
    if(!ticking){requestAnimationFrame(function(){updateScrollSpy();ticking=false});ticking=true}
  });
}

function updateScrollSpy(){
  var links=document.querySelectorAll('.sidebar a');
  var best=0;
  for(var i=0;i<chapters.length;i++){
    var el=document.getElementById('pg'+chapters[i].start);
    if(el&&el.getBoundingClientRect().top<200)best=i;
  }
  for(var i=0;i<links.length;i++)links[i].classList.toggle('active',i===best);
  var blocks=document.querySelectorAll('.page-block');
  var minDist=Infinity,closestPg=1;
  for(var i=0;i<blocks.length;i++){
    var d=Math.abs(blocks[i].getBoundingClientRect().top-100);
    if(d<minDist){minDist=d;closestPg=parseInt(blocks[i].id.replace('pg',''))}
  }
  document.getElementById('floatPg').textContent='p.'+closestPg;
}

function renderAll(){
  var c=document.getElementById('content'),html='',lastChap='';
  for(var pg=1;pg<=TOTAL;pg++){
    var chap=chapters.find(function(ch){return pg===ch.start});
    if(chap&&chap.name!==lastChap){html+='<div class="chapter-divider"><span>'+chap.name+'</span></div>';lastChap=chap.name}
    html+='<div class="page-block" id="pg'+pg+'"><div class="pg-label">第 '+pg+' 页</div>';
    var t=ocrData[String(pg)];
    html+=t?renderText(pg,t):renderImg(pg);
    html+='</div>';
  }
  c.innerHTML=html;
  initLazyLoad();
}

function initLazyLoad(){
  var obs=new IntersectionObserver(function(entries){
    entries.forEach(function(e){if(e.isIntersecting){var img=e.target;if(img.dataset.src){img.src=img.dataset.src;obs.unobserve(img)}}})
  },{rootMargin:'200px'});
  document.querySelectorAll('img[data-src]').forEach(function(img){obs.observe(img)});
}

function renderText(n,text){
  var lines=text.split('\n').filter(function(l){return l.trim()});
  if(n>=4&&n<=8){
    var h='<div class="text-block toc">';
    for(var i=0;i<lines.length;i++){
      var ln=lines[i].replace(/[一—]+$/,'').trim();if(!ln)continue;
      if(ln.match(/^[一二三四五六七八九十]、/))h+='<div class="ch-title">'+ln+'</div>';
      else h+='<div class="ch-item">'+ln+'</div>';
    }
    return h+'</div>';
  }
  var h='<div class="text-block">';
  var posts=text.split(/(?=20\d{2}[-—]\d{2}[-—]\d{2})/);
  for(var i=0;i<posts.length;i++){
    var p=posts[i];if(!p.trim())continue;
    var pl=p.trim().split('\n'),dm=pl[0].match(/(20\d{2}[-—]\d{2}[-—]\d{2}.*)/);
    h+='<div class="post">';
    if(dm){h+='<div class="date">'+dm[1].replace(/[—]/g,'-')+'</div>';pl.shift()}
    for(var j=0;j<pl.length;j++){
      var cl=pl[j].trim();if(!cl)continue;
      if(cl.indexOf('网友')===0||cl.indexOf('鹿鼎公')===0){
        var who=cl.indexOf('网友')===0?'网友':'鹿鼎公';
        h+='<div class="reply"><span class="who">'+who+'：</span>'+cl.replace(/^(网友|鹿鼎公)[：:]\s*/,'')+'</div>';
      }else{h+='<p>'+cl+'</p>'}
    }
    h+='</div>';
  }
  return h+'</div>';
}

function renderImg(n){
  return '<div class="img-block"><img data-src="'+IMG_BASE+'p_'+pad(n)+'.webp" alt="p.'+n+'" src="" style="min-height:400px;background:#f5f0e8;border-radius:4px"></div>';
}
</script>
</body>
</html>
