银行的底线在哪里？未来业绩没有大幅度下降预期的8-9%现金分红价，就是股价的底锚。不信你去看看历史，几乎所有的好股票，即使在最烂的大熊市，都在这个区域之前构筑成底部。`;

  raw[22] = `2015-08-29 来自雪球
价值投资也好，趋势投资也好，做短差也好，其实本质上没区别，目的是一个：赚钱。关键在于你是否找到了适合自己的方法。吾之蜜糖，汝之毒药。`;

  raw[23] = `2015-09-18 来自雪球
价值选股，趋势选时，估值定仓，波动降本——大部分高手都是把这四条中的全部或者部分做到极致。俺是四条都做，但每条都做不到极致，所以收益也就中上水平。`;

  // Store
  for(const [pg, text] of Object.entries(raw)){

// ═══════════ INIT ═══════════
function init(){
  buildSidebar();
  goTo(1);
  document.addEventListener('keydown', function(e){
    if(e.target.tagName==='INPUT') return;
    if(e.key==='ArrowRight'||e.key===' ') navPage('next'),e.preventDefault();
    if(e.key==='ArrowLeft') navPage('prev'),e.preventDefault();
    if(e.key==='Home') goTo(1);
    if(e.key==='End') goTo(TOTAL);
  });
}

// ═══════════ SIDEBAR ═══════════
function buildSidebar(){
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '<h3>📖 目录导航</h3>';
  chapters.forEach((ch,i) => {
    const a = document.createElement('a');
    a.className = 'chap';
    a.setAttribute('data-chap', i);
    a.innerHTML = ch.name + '<span class="pg">p.'+ch.start+'-'+ch.end+'</span>';
    a.onclick = function(e){e.preventDefault();goTo(ch.start);};
    sb.appendChild(a);
  });
}

function updateSidebar(){
  document.querySelectorAll('.chap').forEach((el,i) => {
    const ch = chapters[i];
    el.classList.toggle('active', currentPage >= ch.start && currentPage <= ch.end);
  });
}

// ═══════════ PAGE RENDERING ═══════════
function goTo(n){
  if(n < 1) n = 1;
  if(n > TOTAL) n = TOTAL;
  currentPage = n;
  
  const content = document.getElementById('content');
  const hasOcr = ocrData[n];
  
  document.getElementById('pgInput').value = n;
  document.getElementById('pgIndicator').textContent = 'p.' + n;
  
  if(hasOcr){
    content.innerHTML = renderOcrPage(n, hasOcr);
  } else {
    content.innerHTML = renderImagePage(n);
  }
  
  updateSidebar();
  window.scrollTo({top:0, behavior:'smooth'});
  
  // Preload neighboring images
  if(!ocrData[n]) preloadImg(n);
  if(!ocrData[n+1]) preloadImg(n+1);
  if(!ocrData[n-1]) preloadImg(n-1);
}

function renderOcrPage(n, text){
  const chap = chapters.find(c => n >= c.start && n <= c.end);
  const chapName = chap ? chap.name : '';
  
  // Parse posts
  const lines = text.split('\n').filter(l => l.trim());
  
  // Check if it's TOC-like content
  if(n >= 4 && n <= 8){
    let html = '<div class="page-section">';
    html += '<div class="page-header"><span class="num">p.'+n+'</span><span class="chap-name">'+chapName+'</span></div>';
    html += '<div class="ocr-text" style="font-size:14px;line-height:2.2">';
    for(const line of lines){
      const clean = line.replace(/[一—]+$/,'').trim();
      if(!clean) continue;
      if(clean.match(/^[一二三四五六七八九]、/) || clean.match(/^\d+[.．]/)){
        html += '<p style="font-weight:600;color:var(--accent);margin-top:16px;text-indent:0">' + clean + '</p>';
      } else if(clean.match(/^\d+[.．]/) || clean.startsWith('·') || clean.startsWith('-')){
        html += '<p style="margin:2px 0 2px 20px;text-indent:0;font-size:13px;color:var(--text2)">' + clean + '</p>';
      } else {
        html += '<p>' + clean + '</p>';
      }
    }
    html += '</div></div>';
    return html;
  }
  
  // Regular post content
  let html = '<div class="page-section">';
  html += '<div class="page-header"><span class="num">p.'+n+'</span><span class="chap-name">'+chapName+'</span></div>';
  html += '<div class="ocr-text">';
  
  // Split into posts by date markers
  const fullText = lines.join('\n');
  const posts = fullText.split(/(?=20\d{2}[—-]\d{2}[—-]\d{2})/);
  
  for(const post of posts){
    if(!post.trim()) continue;
    const plines = post.trim().split('\n');
    const firstLine = plines[0] || '';
    const dateMatch = firstLine.match(/(20\d{2}[—-]\d{2}[—-]\d{2}.*)/);
    
    html += '<div class="post">';
    if(dateMatch){
      html += '<div class="date">📅 ' + dateMatch[1].replace(/[—-]/g,'-') + '</div>';
      plines.shift();
    }
    for(const line of plines){
      const clean = line.trim();
      if(!clean) continue;
      if(clean.startsWith('@网友') || clean.startsWith('鹿鼎公：') || clean.startsWith('鹿鼎公:')){
        const who = clean.startsWith('@') ? '网友' : '鹿鼎公';
        const txt = clean.replace(/^@网友[：:]?\s*/, '').replace(/^鹿鼎公[：:]\s*/, '');
        html += '<div class="reply"><span class="who">' + who + '：</span>' + txt + '</div>';
      } else if(clean.match(/^[\[【].*[\]】]$/)){
        html += '<p style="text-indent:0;font-weight:600;color:var(--accent)">' + clean + '</p>';
      } else {
        html += '<p>' + clean + '</p>';
      }
    }
    html += '</div>';
  }
  
  html += '</div></div>';
  return html;
}

function renderImagePage(n){
  const chap = chapters.find(c => n >= c.start && c <= c.end);
  const chapName = chap ? chap.name : '';
  return '<div class="page-section">' +
    '<div class="page-header"><span class="num">p.'+n+'</span><span class="chap-name">'+chapName+'</span></div>' +
    '<div class="img-page">' +
    '<img src="'+IMG_BASE+'p_'+pad(n)+'.webp" alt="p.'+n+'" onerror="this.parentElement.innerHTML=\'<p style=color:#b5a590;text-align:center;padding:40px>图片加载中…</p>\'">' +
    '<div class="cap">第 '+n+' 页（文字提取进行中，暂显示扫描图）</div>' +
    '</div></div>';
}

function preloadImg(n){
  if(n<1||n>TOTAL) return;
  const link = document.createElement('link');
  link.rel = 'preload'; link.as = 'image';
  link.href = IMG_BASE+'p_'+pad(n)+'.webp';
  document.head.appendChild(link);
}

// ═══════════ NAVIGATION ═══════════
function navPage(dir){
  if(dir==='prev') goTo(currentPage - 1);
  else goTo(currentPage + 1);
}

function scrollToToc(){
  goTo(4);
}

window.addEventListener('DOMContentLoaded', init);
</script>

</html>
